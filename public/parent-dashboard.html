<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Dashboard - Vibe Code Kidz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0a2a 0%, #1a1145 50%, #0f0a2a 100%);
      color: #e0e7ff;
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
    h1 {
      font-family: 'Orbitron', sans-serif;
      color: #e0e7ff;
      margin-bottom: 4px;
      font-size: 1.5rem;
    }
    .subtitle { color: rgba(224, 231, 255, 0.7); margin-bottom: 24px; font-size: 0.95rem; }
    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card h3 { margin-bottom: 12px; color: #e0e7ff; font-family: 'Orbitron', sans-serif; font-size: 1rem; }
    .child-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .info-item { background: rgba(139, 92, 246, 0.1); padding: 12px; border-radius: 10px; border: 1px solid rgba(139, 92, 246, 0.15); }
    .info-label { font-size: 11px; color: rgba(224, 231, 255, 0.5); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }
    .info-value { font-size: 18px; font-weight: 700; color: #e0e7ff; }
    .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4); }
    .btn-danger { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.35); }
    .btn-secondary { background: rgba(255, 255, 255, 0.08); color: #c4b5fd; border: 1px solid rgba(139, 92, 246, 0.2); }
    .btn-secondary:hover { background: rgba(139, 92, 246, 0.15); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .project-list { list-style: none; }
    .project-list li { padding: 8px 0; border-bottom: 1px solid rgba(139, 92, 246, 0.12); display: flex; justify-content: space-between; color: #c4b5fd; }
    .project-list li:last-child { border-bottom: none; }
    .login-section { text-align: center; padding: 80px 20px; }
    .login-section h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .login-section input {
      padding: 14px 18px;
      border: 2px solid rgba(139, 92, 246, 0.3);
      border-radius: 12px;
      font-size: 16px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: #e0e7ff;
      font-family: 'Nunito', sans-serif;
    }
    .login-section input::placeholder { color: rgba(224, 231, 255, 0.4); }
    .login-section input:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2); }
    .error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; border: 1px solid rgba(239, 68, 68, 0.25); }
    .success { background: rgba(34, 197, 94, 0.15); color: #86efac; padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; border: 1px solid rgba(34, 197, 94, 0.25); }
    .loading { text-align: center; padding: 40px; color: rgba(224, 231, 255, 0.5); }
    .empty { text-align: center; padding: 40px; color: rgba(224, 231, 255, 0.4); }
    .toggles { display: flex; gap: 16px; margin: 16px 0; flex-wrap: wrap; }
    .toggle-item { display: flex; align-items: center; gap: 8px; background: rgba(139, 92, 246, 0.08); padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(139, 92, 246, 0.12); }
    .toggle-item label { font-size: 14px; font-weight: 600; color: #c4b5fd; cursor: pointer; }
    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-switch .slider { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.15); border-radius: 24px; cursor: pointer; transition: 0.2s; }
    .toggle-switch .slider::before { content: ''; position: absolute; left: 2px; bottom: 2px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: 0.2s; }
    .toggle-switch input:checked + .slider { background: #22c55e; }
    .toggle-switch input:checked + .slider::before { transform: translateX(20px); }
    .sub-card {
      background: rgba(139, 92, 246, 0.08);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
      margin: 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .sub-info { display: flex; flex-direction: column; gap: 2px; }
    .sub-tier { font-weight: 800; font-size: 1.05rem; color: #e0e7ff; }
    .sub-detail { font-size: 0.82rem; color: rgba(224, 231, 255, 0.55); }
    .sub-free { color: rgba(224, 231, 255, 0.5); font-style: italic; font-size: 0.9rem; }
    .btn-sub { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif; transition: all 0.2s; background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
    .btn-sub:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4); }
    .btn-sub:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .trust-badge {
      text-align: center;
      padding: 16px;
      font-size: 13px;
      color: rgba(224, 231, 255, 0.45);
      margin-top: 32px;
      letter-spacing: 0.3px;
    }
    .trust-badge a { color: #8b5cf6; text-decoration: none; }
    .trust-badge a:hover { text-decoration: underline; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .header-bar a { color: #8b5cf6; text-decoration: none; font-size: 14px; font-weight: 600; }
    .header-bar a:hover { color: #a78bfa; }
    .logo-mark { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: rgba(224, 231, 255, 0.4); letter-spacing: 1px; margin-bottom: 2px; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">Loading...</div>
  </div>

  <script>
    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);
    const sessionToken = params.get('session');
    const dashboardToken = params.get('token');

    if (dashboardToken && !sessionToken) {
      window.location.href = '/api/parent-dashboard/auth-token?token=' + encodeURIComponent(dashboardToken);
    } else if (!sessionToken) {
      showLoginPage();
    } else {
      loadDashboard();
    }

    function showLoginPage() {
      app.innerHTML = `
        <div class="login-section">
          <p class="logo-mark">VIBE CODE KIDS</p>
          <h1>Parent Dashboard</h1>
          <p class="subtitle">Enter your email to receive a secure access link</p>
          <div id="loginMsg"></div>
          <input type="email" id="emailInput" placeholder="Your email address" />
          <br>
          <button class="btn btn-primary" onclick="requestAccess()">Send Access Link</button>
        </div>
      `;
    }

    async function requestAccess() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) return;
      const msg = document.getElementById('loginMsg');
      try {
        const res = await fetch('/api/parent-dashboard/request-access', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        msg.className = 'success';
        msg.textContent = data.message || 'Check your email for the access link!';
      } catch {
        msg.className = 'error';
        msg.textContent = 'Something went wrong. Please try again.';
      }
    }

    async function apiFetch(path) {
      const res = await fetch(`/api/parent-dashboard${path}`, {
        headers: { Authorization: `Bearer ${sessionToken}` },
      });
      if (!res.ok) {
        if (res.status === 401) { showLoginPage(); throw new Error('expired'); }
        throw new Error(await res.text());
      }
      return res.json();
    }

    async function loadDashboard() {
      try {
        const { children } = await apiFetch('/children?session=' + sessionToken);
        if (!children.length) {
          app.innerHTML = `
            <h1>Parent Dashboard</h1>
            <p class="subtitle">No children found for your email address.</p>
          `;
          return;
        }
        let html = `
          <div class="header-bar">
            <div><p class="logo-mark">VIBE CODE KIDS</p><h1>Parent Dashboard</h1><p class="subtitle">See what your child is creating. You're in control.</p></div>
            <a href="/">&#8592; Back to Vibe Code Kids</a>
          </div>`;
        for (const child of children) {
          var subSection = '';
          if (child.hasStripeSubscription) {
            var renewalText = child.membershipExpires ? 'Renews ' + new Date(child.membershipExpires).toLocaleDateString() : '';
            var priceText = child.tierPrice > 0 ? '$' + child.tierPrice + '/mo' : '';
            subSection = '<div class="sub-card">'
              + '<div class="sub-info">'
              + '<span class="sub-tier">' + escHtml(child.tierName) + ' Plan' + (priceText ? ' — ' + priceText : '') + '</span>'
              + (renewalText ? '<span class="sub-detail">' + renewalText + '</span>' : '')
              + '</div>'
              + '<button class="btn-sub" id="sub-btn-' + child.userId + '" onclick="manageSubscription(\'' + child.userId + '\')">Manage Subscription</button>'
              + '</div>';
          } else {
            subSection = '<div class="sub-card">'
              + '<span class="sub-free">Free plan — no active subscription</span>'
              + '</div>';
          }
          html += `
            <div class="card" id="child-${child.userId}">
              <h3>${escHtml(child.displayName)} (@${escHtml(child.username)})</h3>
              <div class="child-info">
                <div class="info-item"><div class="info-label">Age Bracket</div><div class="info-value">${child.ageBracket || 'N/A'}</div></div>
                <div class="info-item"><div class="info-label">Tier</div><div class="info-value">${escHtml(child.tierName)}</div></div>
                <div class="info-item"><div class="info-label">Last Login</div><div class="info-value">${child.lastLoginAt ? new Date(child.lastLoginAt).toLocaleDateString() : 'Never'}</div></div>
                <div class="info-item"><div class="info-label">Consent</div><div class="info-value">${child.consentStatus || 'N/A'}</div></div>
                <div class="info-item"><div class="info-label">Consent Date</div><div class="info-value">${child.consentDate ? new Date(child.consentDate).toLocaleDateString() : '—'}</div></div>
                <div class="info-item"><div class="info-label">Policy Version</div><div class="info-value">${child.consentVersion || '—'}</div></div>
              </div>` + subSection + `
              <div class="toggles">
                <div class="toggle-item">
                  <label class="toggle-switch">
                    <input type="checkbox" ${child.publishingEnabled ? 'checked' : ''} onchange="toggleSetting('${child.userId}', 'publishingEnabled')" />
                    <span class="slider"></span>
                  </label>
                  <label title="When OFF, your child can save games but not add them to the public Arcade">Public game sharing</label>
                </div>
                <div class="toggle-item">
                  <label class="toggle-switch">
                    <input type="checkbox" ${child.multiplayerEnabled ? 'checked' : ''} onchange="toggleSetting('${child.userId}', 'multiplayerEnabled')" />
                    <span class="slider"></span>
                  </label>
                  <label title="When OFF, your child cannot join multiplayer game rooms">Multiplayer access</label>
                </div>
              </div>
              <div class="actions">
                <button class="btn btn-secondary" onclick="viewActivity('${child.userId}')">View Activity</button>
                <button class="btn btn-primary" onclick="exportData('${child.userId}')">Export Data</button>
                <button class="btn btn-danger" onclick="deleteChild('${child.userId}', '${escHtml(child.displayName)}')">Delete Account &amp; All Data</button>
              </div>
              <div id="activity-${child.userId}" style="margin-top: 16px;"></div>
            </div>`;
        }
        html += `<div class="trust-badge">COPPA compliant &middot; Data encrypted &middot; No ads &middot; You're in control &middot; <a href="/privacy">Privacy Policy</a></div>`;
        app.innerHTML = html;
      } catch (e) {
        if (e.message !== 'expired') {
          app.innerHTML = `<div class="error">Failed to load dashboard. Please try again.</div>`;
        }
      }
    }

    async function viewActivity(userId) {
      const container = document.getElementById('activity-' + userId);
      container.innerHTML = '<div class="loading">Loading activity...</div>';
      try {
        const data = await apiFetch('/child/' + userId + '/activity?session=' + sessionToken);
        let html = `<h4 style="margin-bottom: 8px;">Activity Summary</h4>`;
        html += `<p>Projects: ${data.projectCount} | AI Generations: ${data.generationCount}</p>`;
        if (data.projects.length) {
          html += '<ul class="project-list">';
          for (const p of data.projects) {
            html += `<li><span>${escHtml(p.title)}</span><span>${p.likes} likes</span></li>`;
          }
          html += '</ul>';
        } else {
          html += '<p class="empty">No projects yet</p>';
        }
        container.innerHTML = html;
      } catch { container.innerHTML = '<div class="error">Failed to load activity</div>'; }
    }

    async function exportData(userId) {
      try {
        const res = await fetch('/api/parent-dashboard/child/' + userId + '/export?session=' + sessionToken, {
          method: 'POST',
          headers: { Authorization: `Bearer ${sessionToken}` },
        });
        const data = await res.json();
        const blob = new Blob([JSON.stringify(data.export, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `child-data-${userId}.json`;
        a.click();
      } catch { alert('Failed to export data.'); }
    }

    async function deleteChild(userId, name) {
      if (!confirm(`This will permanently delete ${name}'s account and all their projects. This can't be undone. Are you sure?`)) return;
      try {
        const res = await fetch('/api/parent-dashboard/child/' + userId + '?session=' + sessionToken, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${sessionToken}` },
        });
        if (res.ok) {
          const card = document.getElementById('child-' + userId);
          card.innerHTML = '<div class="success">All data deleted successfully.</div>';
        } else { alert('Failed to delete data.'); }
      } catch { alert('Failed to delete data.'); }
    }

    async function toggleSetting(userId, setting) {
      try {
        const res = await fetch('/api/parent-dashboard/child/' + userId + '/toggle?session=' + sessionToken, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${sessionToken}` },
          body: JSON.stringify({ setting }),
        });
        if (!res.ok) {
          alert('Failed to update setting.');
          loadDashboard();
        }
      } catch {
        alert('Failed to update setting.');
        loadDashboard();
      }
    }

    async function manageSubscription(userId) {
      var btn = document.getElementById('sub-btn-' + userId);
      if (btn) { btn.disabled = true; btn.textContent = 'Opening...'; }
      try {
        var res = await fetch('/api/parent-dashboard/child/' + userId + '/manage-subscription?session=' + sessionToken, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + sessionToken },
        });
        var data = await res.json();
        if (res.ok && data.url) {
          window.location.href = data.url;
        } else {
          alert(data.error || 'Could not open subscription management.');
          if (btn) { btn.disabled = false; btn.textContent = 'Manage Subscription'; }
        }
      } catch {
        alert('Something went wrong. Please try again.');
        if (btn) { btn.disabled = false; btn.textContent = 'Manage Subscription'; }
      }
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
