<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root { --game-primary:#fdcb6e; --game-secondary:#e17055; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#fdcb6e 0%,#f39c12 50%,#e17055 100%);
      min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden;  touch-action: none; }
    #game { border-radius:12px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.86.0/dist/phaser.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="game"></div>
<script>
const GW = 500, GH = 500;

class PetScene extends Phaser.Scene {
  constructor() { super('PetScene'); }

  preload() {
    const g = this.make.graphics({ add: false });

    // --- PET: Kawaii orange tabby cat (64×64) ---
    // Tail (behind body)
    g.fillStyle(0xE88A3A);
    g.fillCircle(56, 40, 4);
    g.fillRect(46, 38, 12, 5);
    g.fillStyle(0xC06828);
    g.fillRect(48, 39, 2, 3);
    g.fillRect(52, 39, 2, 3);
    // Body
    g.fillStyle(0xF4A040);
    g.fillEllipse(32, 46, 32, 18);
    // Body stripes
    g.fillStyle(0xD07030);
    g.fillRect(23, 38, 2, 10);
    g.fillRect(29, 37, 2, 12);
    g.fillRect(35, 37, 2, 12);
    g.fillRect(41, 38, 2, 10);
    // Head
    g.fillStyle(0xF4A040);
    g.fillCircle(32, 22, 18);
    // Ears outer
    g.fillTriangle(13, 18, 19, 2, 26, 15);
    g.fillTriangle(38, 15, 45, 2, 51, 18);
    // Ears inner (pink)
    g.fillStyle(0xFFB0C0);
    g.fillTriangle(15, 17, 19, 5, 25, 15);
    g.fillTriangle(39, 15, 45, 5, 49, 17);
    // Forehead stripes
    g.fillStyle(0xD07030);
    g.fillRect(28, 9, 2, 8);
    g.fillRect(31, 7, 2, 10);
    g.fillRect(34, 9, 2, 8);
    // Eyes (big kawaii)
    g.fillStyle(0xFFFFFF);
    g.fillCircle(24, 23, 7);
    g.fillCircle(40, 23, 7);
    g.fillStyle(0x2D1F0E);
    g.fillCircle(25, 24, 5);
    g.fillCircle(39, 24, 5);
    // Eye highlights
    g.fillStyle(0xFFFFFF);
    g.fillCircle(23, 21, 2.5);
    g.fillCircle(37, 21, 2.5);
    g.fillCircle(26, 26, 1);
    g.fillCircle(40, 26, 1);
    // Nose (pink)
    g.fillStyle(0xFF8888);
    g.fillTriangle(30, 30, 34, 30, 32, 33);
    // Mouth
    g.lineStyle(1.5, 0x8B6040);
    g.lineBetween(32, 33, 28, 36);
    g.lineBetween(32, 33, 36, 36);
    // Whiskers
    g.lineStyle(1, 0xC89060);
    g.lineBetween(14, 28, 22, 30);
    g.lineBetween(14, 32, 22, 32);
    g.lineBetween(42, 30, 50, 28);
    g.lineBetween(42, 32, 50, 32);
    // Blush (rosy cheeks)
    g.fillStyle(0xFFAAAA, 0.5);
    g.fillCircle(16, 30, 4);
    g.fillCircle(48, 30, 4);
    // Front paws
    g.fillStyle(0xF4A040);
    g.fillCircle(22, 56, 6);
    g.fillCircle(42, 56, 6);
    // Paw pads
    g.fillStyle(0xFFB0C0);
    g.fillCircle(22, 57, 2.5);
    g.fillCircle(42, 57, 2.5);
    g.generateTexture('pet', 64, 64);
    g.clear();

    // --- HEART (24×24) ---
    g.fillStyle(0xFF4466);
    g.fillCircle(8, 8, 6);
    g.fillCircle(16, 8, 6);
    g.fillTriangle(2, 10, 22, 10, 12, 22);
    g.fillStyle(0xFF8899, 0.5);
    g.fillCircle(7, 6, 2);
    g.generateTexture('heart', 24, 24);
    g.clear();

    // --- FOOD: Bowl of kibble (32×32) ---
    g.fillStyle(0x8B5E3C);
    g.fillEllipse(16, 24, 28, 14);
    g.fillStyle(0xA0714D);
    g.fillEllipse(16, 17, 30, 8);
    g.fillStyle(0x704A2C);
    g.fillEllipse(16, 17, 24, 5);
    g.fillStyle(0xC49A6C);
    g.fillCircle(10, 14, 3);
    g.fillCircle(17, 12, 3);
    g.fillCircle(23, 14, 3);
    g.fillStyle(0xB08050);
    g.fillCircle(13, 11, 2);
    g.fillCircle(20, 11, 2);
    g.generateTexture('food', 32, 32);
    g.clear();

    // --- TOY: Yarn ball (28×28) ---
    g.fillStyle(0xDD55AA);
    g.fillCircle(14, 14, 12);
    g.lineStyle(1.5, 0xEE88CC);
    g.lineBetween(5, 8, 23, 20);
    g.lineBetween(5, 20, 23, 8);
    g.lineBetween(14, 2, 14, 26);
    g.lineStyle(1, 0xCC3388);
    g.lineBetween(3, 14, 25, 14);
    g.lineBetween(7, 4, 21, 24);
    g.lineBetween(7, 24, 21, 4);
    g.fillStyle(0xFFBBDD, 0.4);
    g.fillCircle(10, 9, 4);
    g.generateTexture('toy', 28, 28);
    g.clear();

    // --- PARTICLE (8×8) ---
    g.fillStyle(0xFFCCDD);
    g.fillCircle(4, 4, 3);
    g.fillStyle(0xFFFFFF, 0.6);
    g.fillCircle(3, 3, 1);
    g.generateTexture('particle', 8, 8);
    g.destroy();
  }

  create() {
    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0xFFE4EC);

    this.hunger = 80; this.happiness = 80; this.energy = 80;
    this.gameOver = false;
    this.day = 1; this.dayTimer = 0;
    this.feedCooldown = 0; this.playCooldown = 0; this.sleepCooldown = 0;

    this.dayText = this.add.text(GW / 2, 15, 'Day 1', {
      fontSize: '18px', fill: '#8B4513', fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(5);

    this.createBar(70, 42, 0x27ae60, 'hunger');
    this.createBar(70, 62, 0xf1c40f, 'happiness');
    this.createBar(70, 82, 0x3498db, 'energy');

    this.add.text(15, 38, '🍎', { fontSize: '14px' });
    this.add.text(15, 58, '😊', { fontSize: '14px' });
    this.add.text(15, 78, '💤', { fontSize: '14px' });

    this.pet = this.add.image(GW / 2, GH / 2 - 20, 'pet').setScale(3).setDepth(3);
    this.moodText = this.add.text(GW / 2, GH / 2 - 100, 'Happy!', {
      fontSize: '20px', fill: '#27ae60', fontStyle: 'bold', stroke: '#fff', strokeThickness: 2
    }).setOrigin(0.5).setDepth(5);

    this.emitter = this.add.particles(0, 0, 'particle', {
      speed: { min: 40, max: 100 }, lifespan: 600, scale: { start: 1.5, end: 0 },
      emitting: false, quantity: 6, gravityY: -50
    }).setDepth(8);

    this.createButton(GW / 2 - 130, GH - 70, '🍎 Feed', 'feed', 0x27ae60);
    this.createButton(GW / 2, GH - 70, '🎾 Play', 'play', 0xf1c40f);
    this.createButton(GW / 2 + 130, GH - 70, '💤 Sleep', 'sleep', 0x3498db);

    this.depletionRate = 3;
  }

  createBar(x, y, color, key) {
    this.add.rectangle(x + 100, y + 6, 200, 12, 0xdddddd).setOrigin(0, 0.5);
    this[key + 'Bar'] = this.add.rectangle(x + 100, y + 6, 200 * (this[key] / 100), 12, color).setOrigin(0, 0.5).setDepth(2);
    this[key + 'Text'] = this.add.text(x + 310, y + 1, Math.round(this[key]) + '%', {
      fontSize: '12px', fill: '#555'
    }).setDepth(2);
  }

  updateBar(key, color) {
    const val = Math.max(0, Math.min(100, this[key]));
    this[key + 'Bar'].width = 200 * (val / 100);
    this[key + 'Text'].setText(Math.round(val) + '%');
  }

  createButton(x, y, label, action, color) {
    const bg = this.add.rectangle(x, y, 110, 44, color, 0.85).setInteractive({ useHandCursor: true })
      .setDepth(5);
    const txt = this.add.text(x, y, label, {
      fontSize: '15px', fill: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 1
    }).setOrigin(0.5).setDepth(6);
    const cdOverlay = this.add.rectangle(x, y, 110, 44, 0x000000, 0).setDepth(7);
    this[action + 'Overlay'] = cdOverlay;

    bg.on('pointerdown', () => {
      if (this.gameOver || this[action + 'Cooldown'] > 0) return;
      this.doAction(action, x);
    });
  }

  doAction(action, x) {
    try { this.sound.play('clickSfx'); } catch(e) {}
    if (action === 'feed') {
      this.hunger = Math.min(100, this.hunger + 25);
      this.updateBar('hunger');
      this.feedCooldown = 3;
      this.floatEmoji('🍎', x);
      this.emitter.setPosition(GW / 2, GH / 2 - 20);
      this.emitter.setParticleTint(0x27ae60);
      this.emitter.explode();
    } else if (action === 'play') {
      this.happiness = Math.min(100, this.happiness + 25);
      this.updateBar('happiness');
      this.playCooldown = 3;
      this.floatEmoji('⭐', x);
      this.tweens.add({
        targets: this.pet, angle: { from: -10, to: 10 }, duration: 100, yoyo: true, repeat: 3,
        onComplete: () => this.pet.angle = 0
      });
      try { this.sound.play('coinSfx'); } catch(e) {}
    } else if (action === 'sleep') {
      this.energy = Math.min(100, this.energy + 30);
      this.updateBar('energy');
      this.sleepCooldown = 3;
      this.floatEmoji('💤', x);
      this.tweens.add({
        targets: this.pet, scaleX: 2.8, scaleY: 3.2, duration: 500, yoyo: true
      });
      try { this.sound.play('powerupSfx'); } catch(e) {}
    }
  }

  floatEmoji(emoji, x) {
    const txt = this.add.text(x, GH / 2, emoji, { fontSize: '28px' }).setOrigin(0.5).setDepth(10);
    this.tweens.add({
      targets: txt, y: GH / 2 - 80, alpha: 0, duration: 800,
      onComplete: () => txt.destroy()
    });
  }

  update(time, delta) {
    if (this.gameOver) return;
    const dt = delta / 1000;

    this.hunger -= this.depletionRate * dt;
    this.happiness -= (this.depletionRate * 0.8) * dt;
    this.energy -= (this.depletionRate * 0.6) * dt;

    this.hunger = Math.max(0, this.hunger);
    this.happiness = Math.max(0, this.happiness);
    this.energy = Math.max(0, this.energy);

    this.updateBar('hunger');
    this.updateBar('happiness');
    this.updateBar('energy');

    for (const action of ['feed', 'play', 'sleep']) {
      if (this[action + 'Cooldown'] > 0) {
        this[action + 'Cooldown'] -= dt;
        this[action + 'Overlay'].fillAlpha = 0.4;
      } else {
        this[action + 'Overlay'].fillAlpha = 0;
      }
    }

    const avg = (this.hunger + this.happiness + this.energy) / 3;
    if (avg > 60) {
      this.moodText.setText('Happy!').setColor('#27ae60');
      this.pet.setScale(3 + Math.sin(time / 300) * 0.1);
    } else if (avg > 30) {
      this.moodText.setText('Content').setColor('#f39c12');
      this.pet.setScale(3);
    } else {
      this.moodText.setText('Sad...').setColor('#e74c3c');
      this.pet.setScale(2.8 + Math.sin(time / 500) * 0.05);
    }

    this.dayTimer += dt;
    if (this.dayTimer >= 60) {
      this.dayTimer -= 60;
      this.day++;
      this.dayText.setText('Day ' + this.day);
      this.depletionRate += 0.3;
    }

    if (this.hunger <= 0 || this.happiness <= 0 || this.energy <= 0) {
      this.endGame();
    }
  }

  endGame() {
    this.gameOver = true;
    let reason = 'hungry';
    if (this.happiness <= 0) reason = 'lonely';
    if (this.energy <= 0) reason = 'tired';

    this.add.rectangle(GW / 2, GH / 2, GW, GH, 0x000000, 0.7).setDepth(20);
    this.add.text(GW / 2, GH / 2 - 50, 'Your pet got too ' + reason + '!', {
      fontSize: '24px', fill: '#e74c3c', stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5).setDepth(21);
    this.add.text(GW / 2, GH / 2, 'You survived ' + this.day + ' days', {
      fontSize: '22px', fill: '#fff'
    }).setOrigin(0.5).setDepth(21);
    this.add.text(GW / 2, GH / 2 + 50, 'Click to try again', {
      fontSize: '16px', fill: '#aaa'
    }).setOrigin(0.5).setDepth(21);
    this.input.once('pointerdown', () => this.scene.restart());
  }
}

new Phaser.Game({
  type: Phaser.AUTO, width: GW, height: GH, parent: 'game',
  backgroundColor: '#FFE4EC', scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: PetScene
});
</script>
</body>
</html>
