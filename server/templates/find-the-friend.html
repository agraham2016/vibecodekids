<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #81ecec 0%, #74b9ff 50%, #a29bfe 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
    #game-container { border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .hint { margin-top: 12px; color: rgba(0,0,0,0.6); font-size: 13px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.86.0/dist/phaser.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="game-container"></div>
  <div class="hint">Find the hidden friend! Wrong clicks cost time • Find before time runs out</div>
  <script>
    var W = 800, H = 500;
    var GAME_TIME = 45000;
    var WRONG_PENALTY = 3000;
    var CRITTER_SIZE = 24;

    var CRITTER_DEFS = [
      { key: 'rabbit', bodyColor: 0xffffff, earColor: 0xfab1a0, eyeColor: 0x2d3436, nose: 0xfab1a0 },
      { key: 'bear', bodyColor: 0x795548, earColor: 0x5d4037, eyeColor: 0x2d3436, nose: 0x2d3436 },
      { key: 'elephant', bodyColor: 0x95a5a6, earColor: 0x7f8c8d, eyeColor: 0x2d3436, nose: 0x636e72 },
      { key: 'penguin', bodyColor: 0x2d3436, earColor: 0xffffff, eyeColor: 0x2d3436, nose: 0xf39c12 },
      { key: 'owl', bodyColor: 0x8e6c4f, earColor: 0x6d5139, eyeColor: 0xf1c40f, nose: 0xf39c12 },
      { key: 'monkey', bodyColor: 0x8d6e63, earColor: 0xfab1a0, eyeColor: 0x2d3436, nose: 0x5d4037 },
      { key: 'panda', bodyColor: 0xffffff, earColor: 0x2d3436, eyeColor: 0x2d3436, nose: 0x2d3436 },
      { key: 'dog', bodyColor: 0xd4a76a, earColor: 0xa0784c, eyeColor: 0x2d3436, nose: 0x2d3436 }
    ];

    class FindTheFriendScene extends Phaser.Scene {
      preload() {
        this.load.image('bear', '/assets/sprites/kenney-animals/Round/bear.png');
        this.load.image('dog', '/assets/sprites/kenney-animals/Round/dog.png');
        this.load.image('elephant', '/assets/sprites/kenney-animals/Round/elephant.png');
        this.load.image('penguin', '/assets/sprites/kenney-animals/Round/penguin.png');
        this.load.image('panda', '/assets/sprites/kenney-animals/Round/panda.png');
        this.load.image('owl', '/assets/sprites/kenney-animals/Round/owl.png');
        this.load.image('monkey', '/assets/sprites/kenney-animals/Round/monkey.png');
        this.load.image('rabbit', '/assets/sprites/kenney-animals/Round/rabbit.png');

        this.load.on('loaderror', (file) => {
          const c = document.createElement('canvas'); c.width = 64; c.height = 64;
          const ctx = c.getContext('2d');
          const grad = ctx.createRadialGradient(32, 28, 4, 32, 32, 24);
          grad.addColorStop(0, '#ff9ed8'); grad.addColorStop(1, '#d63384');
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.arc(32, 32, 24, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = '#a0204c'; ctx.lineWidth = 2; ctx.stroke();
          ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(24, 26, 4, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(40, 26, 4, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(25, 27, 2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(41, 27, 2, 0, Math.PI * 2); ctx.fill();
          this.textures.addCanvas(file.key, c);
        });
      }

      create() {
        var bg = this.add.graphics();
        // Sky
        bg.fillStyle(0x81ecec); bg.fillRect(0, 0, W, H);
        // Ground
        bg.fillStyle(0x55efc4); bg.fillEllipse(W / 2, H - 30, W * 0.9, 100);
        // Bushes
        bg.fillStyle(0x2ecc71, 0.6);
        for (var i = 0; i < 8; i++) {
          bg.fillCircle(Phaser.Math.Between(30, W - 30), Phaser.Math.Between(H - 90, H - 40), Phaser.Math.Between(20, 45));
        }
        // Clouds
        bg.fillStyle(0xffffff, 0.5);
        bg.fillCircle(150, 70, 40); bg.fillCircle(180, 60, 35); bg.fillCircle(210, 70, 30);
        bg.fillCircle(550, 90, 35); bg.fillCircle(580, 80, 30); bg.fillCircle(600, 90, 25);
        // Trees
        bg.fillStyle(0x6d5139); bg.fillRect(80, 180, 16, 60); bg.fillRect(680, 200, 16, 50);
        bg.fillStyle(0x27ae60); bg.fillCircle(88, 170, 35); bg.fillCircle(688, 190, 30);
        // Houses
        bg.fillStyle(0xfdcb6e, 0.5); bg.fillRect(300, 220, 80, 60);
        bg.fillStyle(0xe17055, 0.5); bg.fillTriangle(290, 220, 340, 185, 390, 220);

        this.startTime = Date.now();
        this.timeLeft = GAME_TIME;
        this.gameOver = false;
        this.found_count = 0;
        this.level = 1;

        this.hintText = this.add.text(12, 12, '', { fontSize: '18px', fill: '#6c5ce7', stroke: '#fff', strokeThickness: 3, fontStyle: 'bold' }).setDepth(10);
        this.timeText = this.add.text(W - 12, 12, Math.ceil(GAME_TIME / 1000) + 's', { fontSize: '22px', fill: '#2d3436', stroke: '#fff', strokeThickness: 3 }).setOrigin(1, 0).setDepth(10);
        this.levelText = this.add.text(W / 2, 12, 'Level 1', { fontSize: '20px', fill: '#6c5ce7', stroke: '#fff', strokeThickness: 3 }).setOrigin(0.5, 0).setDepth(10);
        this.msgText = this.add.text(W / 2, H / 2, '', { fontSize: '26px', fill: '#2d3436', stroke: '#fff', strokeThickness: 4, align: 'center' }).setOrigin(0.5).setDepth(20).setVisible(false);

        this.critterGroup = this.add.group();
        this.placeLevel();
      }

      placeLevel() {
        this.critterGroup.clear(true, true);

        var friendDef = CRITTER_DEFS[Phaser.Math.Between(0, CRITTER_DEFS.length - 1)];
        this.hintText.setText('Find the ' + friendDef.key + '!');

        var decoyDefs = CRITTER_DEFS.filter(function(d) { return d.key !== friendDef.key; });
        var numDecoys = Math.min(15 + this.level * 4, 35);
        var allSpots = [];

        var friendX = Phaser.Math.Between(60, W - 60);
        var friendY = Phaser.Math.Between(80, H - 80);
        allSpots.push({ x: friendX, y: friendY });

        // Place decoys first so friend can be on top or behind
        for (var i = 0; i < numDecoys; i++) {
          var x, y, tooClose;
          var attempts = 0;
          do {
            x = Phaser.Math.Between(40, W - 40);
            y = Phaser.Math.Between(60, H - 60);
            tooClose = false;
            for (var j = 0; j < allSpots.length; j++) {
              if (Phaser.Math.Distance.Between(x, y, allSpots[j].x, allSpots[j].y) < 36) { tooClose = true; break; }
            }
            attempts++;
          } while (tooClose && attempts < 30);
          allSpots.push({ x: x, y: y });
          var dKey = decoyDefs[Phaser.Math.Between(0, decoyDefs.length - 1)].key;
          var decoy = this.add.image(x, y, dKey).setDisplaySize(CRITTER_SIZE * 2, CRITTER_SIZE * 2).setInteractive({ useHandCursor: true });
          decoy.on('pointerdown', this.wrong.bind(this));
          this.critterGroup.add(decoy);
        }

        var friend = this.add.image(friendX, friendY, friendDef.key).setDisplaySize(CRITTER_SIZE * 2, CRITTER_SIZE * 2).setInteractive({ useHandCursor: true });
        friend.on('pointerdown', this.foundFriend.bind(this));
        this.critterGroup.add(friend);
        this.levelText.setText('Level ' + this.level);
      }

      foundFriend() {
        if (this.gameOver) return;
        this.found_count++;
        this.level++;
        this.cameras.main.flash(200, 0, 255, 100);

        if (this.level > 5) {
          this.gameOver = true;
          this.msgText.setText('YOU WIN! 🎉\nFound all 5 friends!\nTap to play again').setTint(0x55efc4).setVisible(true);
          this.input.once('pointerdown', function() { this.scene.restart(); }.bind(this));
        } else {
          this.timeLeft += 5000;
          this.placeLevel();
        }
      }

      wrong() {
        if (this.gameOver) return;
        this.timeLeft -= WRONG_PENALTY;
        this.cameras.main.shake(80, 0.008);
      }

      update(_, delta) {
        if (this.gameOver) return;
        this.timeLeft -= delta;
        var sec = Math.max(0, Math.ceil(this.timeLeft / 1000));
        this.timeText.setText(sec + 's');
        if (sec <= 10) this.timeText.setFill('#e74c3c');
        else this.timeText.setFill('#2d3436');
        if (this.timeLeft <= 0) {
          this.gameOver = true;
          this.msgText.setText("TIME'S UP! ⏰\nFound " + this.found_count + " friends\nTap to try again").setVisible(true);
          this.input.once('pointerdown', function() { this.scene.restart(); }.bind(this));
        }
      }
    }

    new Phaser.Game({
      type: Phaser.AUTO, width: W, height: H,
      parent: 'game-container', backgroundColor: '#81ecec',
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
      scene: FindTheFriendScene
    });
  </script>
</body>
</html>
