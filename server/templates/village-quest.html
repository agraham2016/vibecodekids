<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1d4ed8 0%, #4f46e5 50%, #7c3aed 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }
    #shell {
      position: relative;
      width: 800px;
      max-width: 100vw;
      max-height: 100vh;
    }
    #game-container {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.45);
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      min-width: 270px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.84);
      color: #f8fafc;
      line-height: 1.45;
      font-size: 14px;
    }
    #toast {
      position: absolute;
      top: 88px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 22;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.92);
      color: #fff;
      padding: 10px 14px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    #toast.visible { opacity: 1; }
    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 25;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.72);
    }
    #overlay.visible { display: flex; }
    .card {
      width: min(90vw, 430px);
      padding: 24px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.96);
      color: white;
      text-align: center;
      border: 2px solid rgba(255,255,255,0.12);
    }
    .card h1 { margin-bottom: 10px; }
    .card p { margin-bottom: 16px; line-height: 1.5; }
    .card button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #fde68a;
      color: #111827;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="shell">
    <div id="game-container"></div>
    <div id="hud"></div>
    <div id="toast"></div>
    <div id="overlay">
      <div class="card">
        <h1 id="overlay-title">Village Saved!</h1>
        <p id="overlay-copy">You finished the mayor's quests, leveled up, and helped the whole town.</p>
        <button id="restart-btn">Quest Again</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.86.0/dist/phaser.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      var hud = document.getElementById('hud');
      var toast = document.getElementById('toast');
      var overlay = document.getElementById('overlay');
      var restartBtn = document.getElementById('restart-btn');

      function showToast(text) {
        toast.textContent = text;
        toast.classList.add('visible');
        clearTimeout(showToast._timer);
        showToast._timer = setTimeout(function () {
          toast.classList.remove('visible');
        }, 1500);
      }

      restartBtn.addEventListener('click', function () {
        window.location.reload();
      });

      class VillageQuestScene extends Phaser.Scene {
        constructor() {
          super('VillageQuestScene');
        }

        create() {
          this.storyProgress = 0;
          this.questLog = [
            { id: 'apples', label: 'Collect 3 apples for the baker', done: false },
            { id: 'lanterns', label: 'Light 2 lanterns for the mayor', done: false },
            { id: 'gift', label: 'Bring the thank-you charm home', done: false },
          ];
          this.appleCount = 0;
          this.lanternCount = 0;
          this.level = 1;
          this.xp = 0;
          this.hp = 5;
          this.gameEnded = false;
          this.speed = 165;

          this.makeTextures();
          this.drawVillage();
          this.createPlayer();
          this.createQuestObjects();
          this.createNpcs();
          this.cursors = this.input.keyboard.createCursorKeys();
          this.updateHud();
        }

        makeTextures() {
          var scene = this;

          function createCanvasTexture(key, width, height, drawFn) {
            var canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, width, height);
            ctx.imageSmoothingEnabled = true;
            drawFn(ctx, width, height);
            scene.textures.addCanvas(key, canvas);
          }

          createCanvasTexture('hero-token', 32, 32, function(ctx, width, height) {
            ctx.save();
            ctx.globalAlpha = 0.18;
            ctx.fillStyle = '#1e3a8a';
            ctx.beginPath();
            ctx.ellipse(width / 2, height - 5, 9, 3.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            var cloak = ctx.createLinearGradient(0, 4, 0, height - 4);
            cloak.addColorStop(0, '#93c5fd');
            cloak.addColorStop(1, '#2563eb');
            ctx.fillStyle = cloak;
            ctx.beginPath();
            ctx.arc(width / 2, 16, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#1d4ed8';
            ctx.stroke();

            ctx.fillStyle = '#f8fafc';
            ctx.beginPath();
            ctx.arc(12, 12, 3, 0, Math.PI * 2);
            ctx.arc(20, 12, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.arc(13, 13, 1.3, 0, Math.PI * 2);
            ctx.arc(21, 13, 1.3, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#fef3c7';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(9, 22);
            ctx.quadraticCurveTo(16, 27, 23, 22);
            ctx.stroke();
          });

          createCanvasTexture('apple-token', 24, 24, function(ctx) {
            ctx.save();
            ctx.globalAlpha = 0.16;
            ctx.fillStyle = '#14532d';
            ctx.beginPath();
            ctx.ellipse(12, 20, 6, 2.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            var apple = ctx.createRadialGradient(9, 7, 2, 12, 12, 10);
            apple.addColorStop(0, '#fca5a5');
            apple.addColorStop(1, '#dc2626');
            ctx.fillStyle = apple;
            ctx.beginPath();
            ctx.arc(12, 12, 9, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#991b1b';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.fillStyle = '#166534';
            ctx.fillRect(11, 1, 2, 7);
            ctx.beginPath();
            ctx.ellipse(16, 5, 4, 2.5, -0.6, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.26)';
            ctx.beginPath();
            ctx.arc(9, 8, 2.5, 0, Math.PI * 2);
            ctx.fill();
          });

          createCanvasTexture('lantern-token', 28, 28, function(ctx) {
            ctx.save();
            ctx.globalAlpha = 0.14;
            ctx.fillStyle = '#78350f';
            ctx.beginPath();
            ctx.ellipse(14, 24, 7, 2.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            ctx.strokeStyle = '#92400e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(10, 5);
            ctx.lineTo(10, 20);
            ctx.lineTo(18, 20);
            ctx.lineTo(18, 5);
            ctx.stroke();

            var glow = ctx.createRadialGradient(14, 10, 2, 14, 12, 10);
            glow.addColorStop(0, '#fef3c7');
            glow.addColorStop(1, '#f59e0b');
            ctx.fillStyle = glow;
            ctx.fillRect(10.5, 6, 7, 12);

            ctx.strokeStyle = '#fef3c7';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(11, 5);
            ctx.quadraticCurveTo(14, 1, 17, 5);
            ctx.stroke();
          });

          createCanvasTexture('charm-token', 32, 32, function(ctx) {
            ctx.save();
            ctx.globalAlpha = 0.16;
            ctx.fillStyle = '#713f12';
            ctx.beginPath();
            ctx.ellipse(16, 26, 8, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            var charm = ctx.createRadialGradient(12, 10, 2, 16, 16, 11);
            charm.addColorStop(0, '#fde68a');
            charm.addColorStop(1, '#facc15');
            ctx.fillStyle = charm;
            ctx.beginPath();
            ctx.moveTo(16, 5);
            ctx.lineTo(21, 11);
            ctx.lineTo(27, 16);
            ctx.lineTo(21, 21);
            ctx.lineTo(16, 27);
            ctx.lineTo(11, 21);
            ctx.lineTo(5, 16);
            ctx.lineTo(11, 11);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = '#f8fafc';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.34)';
            ctx.beginPath();
            ctx.arc(12, 11, 3, 0, Math.PI * 2);
            ctx.fill();
          });

          createCanvasTexture('npc-token', 32, 32, function(ctx, width, height) {
            ctx.save();
            ctx.globalAlpha = 0.18;
            ctx.fillStyle = '#581c87';
            ctx.beginPath();
            ctx.ellipse(width / 2, height - 5, 9, 3.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            var robe = ctx.createLinearGradient(0, 4, 0, height - 4);
            robe.addColorStop(0, '#c4b5fd');
            robe.addColorStop(1, '#7c3aed');
            ctx.fillStyle = robe;
            ctx.beginPath();
            ctx.roundRect(4, 5, 24, 22, 7);
            ctx.fill();

            ctx.lineWidth = 2;
            ctx.strokeStyle = '#6d28d9';
            ctx.stroke();

            ctx.fillStyle = '#f8fafc';
            ctx.beginPath();
            ctx.arc(12, 13, 2.8, 0, Math.PI * 2);
            ctx.arc(20, 13, 2.8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#312e81';
            ctx.beginPath();
            ctx.arc(13, 14, 1.2, 0, Math.PI * 2);
            ctx.arc(21, 14, 1.2, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#ede9fe';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(11, 20);
            ctx.quadraticCurveTo(16, 23, 21, 20);
            ctx.stroke();
          });
        }

        drawVillage() {
          this.cameras.main.setBackgroundColor('#7dd3fc');

          var bg = this.add.graphics();
          bg.fillStyle(0x86efac, 1);
          bg.fillRect(0, 0, 800, 560);
          bg.fillStyle(0x93c5fd, 1);
          bg.fillRect(0, 0, 800, 120);

          bg.fillStyle(0xd6d3d1, 1);
          bg.fillRoundedRect(80, 248, 640, 64, 28);
          bg.fillRoundedRect(360, 90, 80, 380, 20);

          this.drawHouse(110, 150, 0xf59e0b);
          this.drawHouse(580, 150, 0xf97316);
          this.drawHouse(110, 370, 0x10b981);
          this.drawHouse(580, 370, 0x3b82f6);

          this.add.text(318, 38, 'Storybook Village', {
            fontFamily: 'Arial',
            fontSize: '24px',
            color: '#1e293b',
          });
        }

        drawHouse(x, y, roofColor) {
          var g = this.add.graphics();
          g.fillStyle(0xf5f5f4, 1);
          g.fillRoundedRect(x, y, 110, 84, 12);
          g.fillStyle(roofColor, 1);
          g.fillTriangle(x - 8, y + 10, x + 55, y - 34, x + 118, y + 10);
          g.fillStyle(0x92400e, 1);
          g.fillRect(x + 44, y + 44, 22, 40);
        }

        createPlayer() {
          this.player = this.physics.add.image(400, 280, 'hero-token');
          this.player.setCircle(12);
          this.player.setCollideWorldBounds(true);
        }

        createQuestObjects() {
          this.apples = this.physics.add.staticGroup();
          [[184, 118], [624, 116], [186, 434]].forEach(function (pos) {
            this.apples.create(pos[0], pos[1], 'apple-token');
          }, this);

          this.lanterns = this.physics.add.staticGroup();
          [[398, 156], [398, 404]].forEach(function (pos) {
            var lantern = this.lanterns.create(pos[0], pos[1], 'lantern-token');
            lantern.lit = false;
            lantern.setTint(0x64748b);
          }, this);

          this.charm = this.physics.add.staticImage(642, 432, 'charm-token');
          this.charm.setVisible(false);
          this.charm.body.enable = false;

          this.physics.add.overlap(this.player, this.apples, this.collectApple, null, this);
          this.physics.add.overlap(this.player, this.lanterns, this.lightLantern, null, this);
          this.physics.add.overlap(this.player, this.charm, this.collectCharm, null, this);
        }

        createNpcs() {
          this.npcs = this.physics.add.staticGroup();

          this.mayor = this.npcs.create(402, 254, 'npc-token');
          this.mayor.message = 'Mayor: Help the village and you will grow stronger.';

          this.baker = this.npcs.create(168, 242, 'npc-token');
          this.baker.message = 'Baker: I need 3 apples for the morning pies.';

          this.guard = this.npcs.create(636, 242, 'npc-token');
          this.guard.message = 'Guard: Light the lanterns so the road stays safe tonight.';

          this.physics.add.overlap(this.player, this.npcs, this.talkNpc, null, this);
        }

        talkNpc(player, npc) {
          if (this.gameEnded) return;
          showToast(npc.message);
        }

        collectApple(player, apple) {
          apple.destroy();
          this.appleCount += 1;
          this.gainXp(10);
          if (this.appleCount >= 3 && !this.questLog[0].done) {
            this.finishQuest(0, 'Baker quest done!');
          } else {
            showToast('Apple found! ' + this.appleCount + '/3');
          }
          this.updateHud();
        }

        lightLantern(player, lantern) {
          if (lantern.lit) return;
          lantern.lit = true;
          lantern.setTint(0xfde68a);
          this.lanternCount += 1;
          this.gainXp(12);
          if (this.lanternCount >= 2 && !this.questLog[1].done) {
            this.finishQuest(1, 'Lantern quest done!');
          } else {
            showToast('Lantern lit! ' + this.lanternCount + '/2');
          }
          this.updateHud();
        }

        collectCharm() {
          this.charm.setVisible(false);
          this.charm.body.enable = false;
          if (!this.questLog[2].done) {
            this.finishQuest(2, 'You found the thank-you charm!');
          }
          this.updateHud();
        }

        finishQuest(index, message) {
          this.questLog[index].done = true;
          this.storyProgress += 1;
          this.gainXp(18);
          showToast(message);

          if (this.questLog[0].done && this.questLog[1].done && !this.questLog[2].done) {
            this.charm.setVisible(true);
            this.charm.body.enable = true;
            showToast('The mayor revealed a charm near the blue house!');
          }

          if (this.storyProgress >= this.questLog.length) {
            this.endGame();
          }
        }

        gainXp(amount) {
          this.xp += amount;
          if (this.xp >= this.level * 30) {
            this.xp = this.xp - this.level * 30;
            this.level += 1;
            showToast('Level up! You are now level ' + this.level + '.');
          }
        }

        updateHud() {
          var lines = this.questLog.map(function (quest) {
            return (quest.done ? '[x] ' : '[ ] ') + quest.label;
          });

          hud.innerHTML =
            '<strong>Vibe 2D Village Quest</strong><br>' +
            'HP: ' + this.hp + ' | Level: ' + this.level + ' | XP: ' + this.xp + '<br>' +
            'Quest Log:<br>' + lines.join('<br>');
        }

        endGame() {
          this.gameEnded = true;
          overlay.classList.add('visible');
        }

        update() {
          if (this.gameEnded) return;

          this.player.setVelocity(0);
          if (this.cursors.left.isDown) this.player.setVelocityX(-this.speed);
          else if (this.cursors.right.isDown) this.player.setVelocityX(this.speed);
          if (this.cursors.up.isDown) this.player.setVelocityY(-this.speed);
          else if (this.cursors.down.isDown) this.player.setVelocityY(this.speed);

          if (this.player.body.velocity.length() > this.speed) {
            this.player.body.velocity.normalize().scale(this.speed);
          }
        }
      }

      new Phaser.Game({
        type: Phaser.AUTO,
        width: 800,
        height: 560,
        parent: 'game-container',
        backgroundColor: '#7dd3fc',
        physics: {
          default: 'arcade',
          arcade: { gravity: { y: 0 }, debug: false },
        },
        scene: [VillageQuestScene],
      });
    })();
  </script>
</body>
</html>
