<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #4a1a6b 0%, #2a1040 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; touch-action: none; }
    #game-container { border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.86.0/dist/phaser.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="game-container"></div>
  <script>
    const W = 800, H = 500;
    const COLS = 4, ROWS = 3;
    const CARD_W = 90, CARD_H = 100;
    const PAD = 30;
    const PAIRS = (COLS * ROWS) / 2;

    const ICONS = ['⭐', '🌟', '💎', '🔮', '🐾', '🌈'];
    const COLORS = [0xff4466, 0x44aaff, 0x44dd44, 0xffaa22, 0xdd44ff, 0x44ffdd];

    let cards, matched, flipped, moves, gameState;
    let scoreText, msgText;

    const config = {
      type: Phaser.AUTO, width: W, height: H, parent: 'game-container', backgroundColor: '#2a1040',
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
      scene: { preload, create, update }
    };

    function preload() {
    }

    function create() {
      const g = this.make.graphics({ add: false });
      g.fillStyle(0x5b4d9e);
      g.fillRoundedRect(0, 0, CARD_W, CARD_H, 8);
      g.generateTexture('cardBack', CARD_W, CARD_H);
      g.clear();
      g.fillStyle(0xffffff);
      g.fillRoundedRect(0, 0, CARD_W - 4, CARD_H - 4, 6);
      g.generateTexture('cardFront', CARD_W - 4, CARD_H - 4);
      g.destroy();

      const bg = this.add.graphics().fillStyle(0x2a1040).fillRect(0, 0, W, H);
      matched = 0;
      flipped = [];
      moves = 0;
      gameState = 'playing';

      const types = [];
      for (let i = 0; i < PAIRS; i++) types.push(i, i);
      Phaser.Utils.Array.Shuffle(types);

      cards = [];
      const startX = (W - (COLS * (CARD_W + 12) - 12)) / 2 + CARD_W / 2 + 6;
      const startY = 80;
      for (let i = 0; i < COLS * ROWS; i++) {
        const r = Math.floor(i / COLS), c = i % COLS;
        const x = startX + c * (CARD_W + 12);
        const y = startY + r * (CARD_H + 12);
        const pairId = types[i];
        const card = this.add.container(x, y);
        const back = this.add.image(0, 0, 'cardBack').setInteractive({ useHandCursor: true });
        const front = this.add.image(0, 0, 'cardFront').setVisible(false);
        front.setTint(COLORS[pairId % COLORS.length]);
        const icon = this.add.text(0, 0, ICONS[pairId % ICONS.length], { fontSize: '36px' }).setOrigin(0.5).setVisible(false);
        card.add([back, front, icon]);
        card.setData({ pairId, back, front, icon, flipped: false });
        back.on('pointerdown', () => flipCard(this, card));
        cards.push(card);
      }

      scoreText = this.add.text(W / 2, 28, 'Moves: 0', { fontSize: '22px', fill: '#ffcc00', stroke: '#000', strokeThickness: 2 }).setOrigin(0.5).setDepth(10);
      msgText = this.add.text(W / 2, H / 2, '', { fontSize: '28px', fill: '#fff', stroke: '#000', strokeThickness: 4, align: 'center' }).setOrigin(0.5).setDepth(20).setVisible(false);

      this.input.on('pointerdown', () => {
        if (gameState === 'gameover') this.scene.restart();
      });
      this.input.keyboard.on('keydown-SPACE', () => {
        if (gameState === 'gameover') this.scene.restart();
      });
    }

    function flipCard(scene, card) {
      if (gameState !== 'playing' || card.getData('flipped') || flipped.length >= 2) return;
      card.setData('flipped', true);
      card.getAt(0).setVisible(false);
      card.getAt(1).setVisible(true);
      card.getAt(2).setVisible(true);
      flipped.push(card);
      if (scene.cache.audio.exists('clickSfx')) scene.sound.play('clickSfx', { volume: 0.4 });

      if (flipped.length === 2) {
        moves++;
        scoreText.setText('Moves: ' + moves);
        const [a, b] = flipped;
        if (a.getData('pairId') === b.getData('pairId')) {
          if (scene.cache.audio.exists('coinSfx')) scene.sound.play('coinSfx', { volume: 0.5 });
          scene.tweens.add({ targets: [a, b], scale: 0, duration: 300, onComplete: () => {
            a.destroy(); b.destroy();
            matched++;
            flipped.length = 0;
            if (matched >= PAIRS) {
              gameState = 'gameover';
              msgText.setText('You win!\nMoves: ' + moves + '\nClick or SPACE to play again').setVisible(true);
            }
          }});
        } else {
          scene.time.delayedCall(800, () => {
            a.setData('flipped', false);
            b.setData('flipped', false);
            a.getAt(0).setVisible(true);
            a.getAt(1).setVisible(false);
            a.getAt(2).setVisible(false);
            b.getAt(0).setVisible(true);
            b.getAt(1).setVisible(false);
            b.getAt(2).setVisible(false);
            flipped.length = 0;
          });
        }
      }
    }

    function update() {}
    new Phaser.Game(config);
  </script>
</body>
</html>
