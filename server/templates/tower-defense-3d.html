<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); font-family: Arial, sans-serif; touch-action: none; }
    #game-container { width: 100vw; height: 100vh; }
    #hud {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      min-width: 220px; padding: 14px 16px; border-radius: 18px;
      background: rgba(17,24,39,0.82); color: #f8fafc;
      line-height: 1.5; font-size: 15px;
      box-shadow: 0 12px 30px rgba(15,23,42,0.35);
    }
    #toast {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      z-index: 20; padding: 12px 22px; border-radius: 999px;
      background: rgba(59,130,246,0.9); color: #fff; font-weight: bold;
      opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
    }
    #toast.visible { opacity: 1; }
    #win-screen {
      display: none; position: fixed; inset: 0; z-index: 25;
      align-items: center; justify-content: center; padding: 24px;
      background: rgba(15,23,42,0.75); color: #fff;
    }
    #win-screen.visible { display: flex; }
    .win-card {
      width: min(92vw, 420px); padding: 28px; border-radius: 24px;
      background: rgba(17,24,39,0.96); text-align: center;
      border: 2px solid rgba(255,255,255,0.14);
    }
    .win-card h1 { margin-bottom: 10px; font-size: 30px; }
    .win-card p { margin-bottom: 16px; line-height: 1.5; }
    .win-card button, #start-wave-btn {
      border: 0; border-radius: 999px; padding: 12px 20px;
      background: #22d3ee; color: #0f172a; font-weight: bold;
      font-size: 15px; cursor: pointer;
    }
    #start-wave-btn {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 15; box-shadow: 0 8px 20px rgba(34,211,238,0.35);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
  <div id="game-container"></div>
  <div id="hud"></div>
  <div id="toast"></div>
  <button id="start-wave-btn">Start Wave</button>
  <div id="win-screen">
    <div class="win-card">
      <h1 id="end-title">Victory!</h1>
      <p id="end-msg">You defended the base through all waves!</p>
      <button id="restart-btn">Play Again</button>
    </div>
  </div>
  <script>
(function () {
  var COLS = 8, ROWS = 6, TILE = 2;
  var MAX_TOWERS = 5, TOWER_COST = 50, KILL_REWARD = 25;
  var MAX_WAVES = 5, START_GOLD = 200, START_LIVES = 10;

  var scene, camera, renderer, clock;
  var hudEl = document.getElementById('hud');
  var toastEl = document.getElementById('toast');
  var winScreen = document.getElementById('win-screen');
  var startBtn = document.getElementById('start-wave-btn');
  var restartBtn = document.getElementById('restart-btn');

  var path = [
    [0,2],[1,2],[2,2],[2,3],[3,3],[4,3],[5,3],[5,4],[6,4],[7,4]
  ];
  var pathSet = {};
  path.forEach(function (p) { pathSet[p[0] + ',' + p[1]] = true; });
  var buildSpotSet = {
    '0,1': true,
    '0,3': true,
    '2,1': true,
    '2,4': true,
    '4,2': true,
    '4,4': true,
    '6,3': true,
    '6,5': true
  };
  var terrainFeatureMap = {
    '0,0': { url: '/assets/models/kenney-towerdefensekit/tile-tree-double.glb', rotationY: 0 },
    '1,0': { url: '/assets/models/kenney-towerdefensekit/tile-tree.glb', rotationY: Math.PI / 2 },
    '2,0': { url: '/assets/models/kenney-towerdefensekit/tile-dirt.glb', rotationY: 0 },
    '3,0': { url: '/assets/models/kenney-towerdefensekit/tile-hill.glb', rotationY: Math.PI / 2 },
    '4,0': { url: '/assets/models/kenney-towerdefensekit/tile-dirt.glb', rotationY: Math.PI },
    '5,0': { url: '/assets/models/kenney-towerdefensekit/tile-rock.glb', rotationY: 0 },
    '6,0': { url: '/assets/models/kenney-towerdefensekit/tile-tree.glb', rotationY: -Math.PI / 2 },
    '7,0': { url: '/assets/models/kenney-towerdefensekit/tile-tree-double.glb', rotationY: Math.PI },
    '1,1': { url: '/assets/models/kenney-towerdefensekit/tile-rock.glb', rotationY: Math.PI / 2 },
    '3,1': { url: '/assets/models/kenney-towerdefensekit/tile-dirt.glb', rotationY: 0 },
    '4,1': { url: '/assets/models/kenney-towerdefensekit/tile-tree.glb', rotationY: 0 },
    '6,1': { url: '/assets/models/kenney-towerdefensekit/tile-rock.glb', rotationY: Math.PI / 2 },
    '7,1': { url: '/assets/models/kenney-towerdefensekit/tile-tree.glb', rotationY: 0 },
    '1,4': { url: '/assets/models/kenney-towerdefensekit/tile-rock.glb', rotationY: 0 },
    '3,5': { url: '/assets/models/kenney-towerdefensekit/tile-dirt.glb', rotationY: 0 },
    '4,5': { url: '/assets/models/kenney-towerdefensekit/tile-hill.glb', rotationY: Math.PI },
    '5,5': { url: '/assets/models/kenney-towerdefensekit/tile-tree.glb', rotationY: Math.PI / 2 },
    '7,5': { url: '/assets/models/kenney-towerdefensekit/tile-crystal.glb', rotationY: 0 }
  };

  var state = {
    gold: START_GOLD, lives: START_LIVES, wave: 0,
    waveActive: false, towers: [], enemies: [], projectiles: [],
    towerCount: 0, spawnQueue: 0, spawnTimer: 0, gameOver: false
  };

  var tileGroup, raycaster, mouse, tileMeshes = [];
  var loader = new THREE.GLTFLoader();
  var modelCache = {};
  var pendingModelLoads = {};

  function cloneModel(model) {
    return model.clone(true);
  }

  function loadModel(url, onLoad, fallback) {
    if (modelCache[url]) {
      onLoad(cloneModel(modelCache[url]));
      return;
    }
    if (pendingModelLoads[url]) {
      pendingModelLoads[url].push({ onLoad: onLoad, fallback: fallback });
      return;
    }
    pendingModelLoads[url] = [{ onLoad: onLoad, fallback: fallback }];
    loader.load(url, function (gltf) {
      modelCache[url] = gltf.scene;
      var waiting = pendingModelLoads[url] || [];
      delete pendingModelLoads[url];
      waiting.forEach(function (entry) {
        try {
          entry.onLoad(cloneModel(modelCache[url]));
        } catch (err) {
          if (entry.fallback) entry.fallback(err);
        }
      });
    }, undefined, function (err) {
      var waiting = pendingModelLoads[url] || [];
      delete pendingModelLoads[url];
      waiting.forEach(function (entry) {
        if (entry.fallback) entry.fallback(err);
      });
    });
  }

  function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 18, 34);
    clock = new THREE.Clock();

    camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(8, 14, 18);
    camera.lookAt(8, 0, 4);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.getElementById('game-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    var dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(10, 20, 10);
    scene.add(dir);
    var fill = new THREE.DirectionalLight(0x8ec5ff, 0.25);
    fill.position.set(-8, 10, 14);
    scene.add(fill);

    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    addBoardBase();
    buildGrid();
    addBoardScenery();
    updateHUD();

    renderer.domElement.addEventListener('pointerdown', onTap);
    startBtn.addEventListener('click', startWave);
    restartBtn.addEventListener('click', function () { location.reload(); });
    window.addEventListener('resize', onResize);

    animate();
    showToast('Tap the glowing tower pads to build your defense!');
  }

  function getTileCenter(col, row) {
    return { x: col * TILE + 1, z: row * TILE + 1 };
  }

  function getPathIndex(col, row) {
    for (var i = 0; i < path.length; i++) {
      if (path[i][0] === col && path[i][1] === row) return i;
    }
    return -1;
  }

  function getPathTileDescriptor(col, row) {
    var idx = getPathIndex(col, row);
    if (idx === -1) return null;
    var prev = idx > 0 ? path[idx - 1] : null;
    var next = idx < path.length - 1 ? path[idx + 1] : null;

    if (!prev && next) {
      return {
        url: '/assets/models/kenney-towerdefensekit/tile-spawn.glb',
        rotationY: next[0] === col ? 0 : Math.PI / 2,
      };
    }
    if (!next && prev) {
      return {
        url: '/assets/models/kenney-towerdefensekit/tile-end.glb',
        rotationY: prev[0] === col ? 0 : Math.PI / 2,
      };
    }

    if (!prev || !next) {
      return {
        url: '/assets/models/kenney-towerdefensekit/tile-straight.glb',
        rotationY: 0,
      };
    }

    var dirs = {};
    dirs[(prev[0] - col) + ',' + (prev[1] - row)] = true;
    dirs[(next[0] - col) + ',' + (next[1] - row)] = true;

    if ((dirs['-1,0'] && dirs['1,0']) || (dirs['0,-1'] && dirs['0,1'])) {
      return {
        url: '/assets/models/kenney-towerdefensekit/tile-straight.glb',
        rotationY: dirs['0,-1'] ? Math.PI / 2 : 0,
      };
    }

    if (dirs['1,0'] && dirs['0,1']) {
      return { url: '/assets/models/kenney-towerdefensekit/tile-corner-round.glb', rotationY: 0 };
    }
    if (dirs['0,1'] && dirs['-1,0']) {
      return { url: '/assets/models/kenney-towerdefensekit/tile-corner-round.glb', rotationY: Math.PI / 2 };
    }
    if (dirs['-1,0'] && dirs['0,-1']) {
      return { url: '/assets/models/kenney-towerdefensekit/tile-corner-round.glb', rotationY: Math.PI };
    }
    return { url: '/assets/models/kenney-towerdefensekit/tile-corner-round.glb', rotationY: -Math.PI / 2 };
  }

  function addBoardDecoration(url, x, z, scale, rotationY) {
    loadModel(url, function (model) {
      model.position.set(x, 0.15, z);
      model.rotation.y = rotationY || 0;
      model.scale.set(scale, scale, scale);
      scene.add(model);
    }, null);
  }

  function addBoardBase() {
    var boardBase = new THREE.Mesh(
      new THREE.BoxGeometry(COLS * TILE + 2.2, 1.1, ROWS * TILE + 2.2),
      new THREE.MeshStandardMaterial({ color: 0x2d3b24, roughness: 1 })
    );
    boardBase.position.set(COLS, -0.58, ROWS);
    scene.add(boardBase);

    var outerGround = new THREE.Mesh(
      new THREE.CircleGeometry(15, 48),
      new THREE.MeshStandardMaterial({ color: 0x1c2719, roughness: 1 })
    );
    outerGround.rotation.x = -Math.PI / 2;
    outerGround.position.set(COLS, -1.14, ROWS);
    scene.add(outerGround);
  }

  function addBoardScenery() {
    var edgeDecor = [
      ['/assets/models/kenney-towerdefensekit/detail-tree-large.glb', -1.3, -0.9, 1.0, 0.3],
      ['/assets/models/kenney-towerdefensekit/detail-tree-large.glb', 17.1, -0.8, 1.05, -0.6],
      ['/assets/models/kenney-towerdefensekit/detail-tree-large.glb', -1.0, 12.8, 1.0, 0.8],
      ['/assets/models/kenney-towerdefensekit/detail-tree-large.glb', 17.0, 12.7, 1.08, -0.4],
      ['/assets/models/kenney-towerdefensekit/detail-rocks-large.glb', 8.0, -1.2, 1.1, 0],
      ['/assets/models/kenney-towerdefensekit/detail-rocks-large.glb', 8.2, 13.3, 1.2, 1.6],
      ['/assets/models/kenney-towerdefensekit/detail-crystal-large.glb', 3.4, -0.7, 0.95, 0.2],
      ['/assets/models/kenney-towerdefensekit/detail-crystal-large.glb', 13.8, 12.9, 0.9, -0.3]
    ];
    for (var i = 0; i < edgeDecor.length; i++) {
      addBoardDecoration(edgeDecor[i][0], edgeDecor[i][1], edgeDecor[i][2], edgeDecor[i][3], edgeDecor[i][4]);
    }
  }

  function isBuildSpot(col, row) {
    return !!buildSpotSet[col + ',' + row];
  }

  function getTerrainTileDescriptor(col, row) {
    var feature = terrainFeatureMap[col + ',' + row];
    if (feature) return feature;
    if (isBuildSpot(col, row)) {
      return {
        url: '/assets/models/kenney-towerdefensekit/tile-dirt.glb',
        rotationY: ((col + row) % 4) * (Math.PI / 2)
      };
    }
    return {
      url: '/assets/models/kenney-towerdefensekit/tile.glb',
      rotationY: ((col * 2 + row) % 4) * (Math.PI / 2)
    };
  }

  function buildGrid() {
    tileGroup = new THREE.Group();
    scene.add(tileGroup);
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var isPath = pathSet[c + ',' + r];
        var canBuild = !isPath && isBuildSpot(c, r);
        var terrainTile = getTerrainTileDescriptor(c, r);
        var geo = new THREE.BoxGeometry(TILE - 0.1, 0.3, TILE - 0.1);
        var mat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.01 });
        var mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(c * TILE + 1, 0, r * TILE + 1);
        mesh.userData = { col: c, row: r, isPath: isPath, canBuild: canBuild, hasTower: false, buildMarker: null };
        tileGroup.add(mesh);
        tileMeshes.push(mesh);
        var center = getTileCenter(c, r);

        (function (x, z, pathTile, terrainTileInfo) {
          var baseUrl = pathTile ? '/assets/models/kenney-towerdefensekit/tile-bump.glb' : terrainTileInfo.url;
          var baseRotation = pathTile ? 0 : (terrainTileInfo.rotationY || 0);
          loadModel(baseUrl, function (model) {
            model.scale.set(1, 1, 1);
            model.position.set(x, 0.15, z);
            model.rotation.y = baseRotation;
            scene.add(model);
          }, null);

          if (pathTile) {
            loadModel(pathTile.url, function (model) {
              model.scale.set(1, 1, 1);
              model.position.set(x, 0.15, z);
              model.rotation.y = pathTile.rotationY || 0;
              scene.add(model);
            }, null);
          }
        })(center.x, center.z, isPath ? getPathTileDescriptor(c, r) : null, terrainTile);

        if (canBuild) {
          (function (tile, x, z) {
            loadModel('/assets/models/kenney-towerdefensekit/selection-a.glb', function (model) {
              model.scale.set(0.74, 0.74, 0.74);
              model.position.set(x, 0.16, z);
              model.rotation.y = Math.PI / 4;
              scene.add(model);
              tile.userData.buildMarker = model;
            }, function () {
              var marker = new THREE.Mesh(
                new THREE.CylinderGeometry(0.52, 0.52, 0.06, 18),
                new THREE.MeshStandardMaterial({ color: 0x22d3ee, transparent: true, opacity: 0.45 })
              );
              marker.position.set(x, 0.18, z);
              scene.add(marker);
              tile.userData.buildMarker = marker;
            });
          })(mesh, center.x, center.z);
        }
      }
    }
  }

  function adjacentToPath(col, row) {
    var dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (var i = 0; i < dirs.length; i++) {
      if (pathSet[(col + dirs[i][0]) + ',' + (row + dirs[i][1])]) return true;
    }
    return false;
  }

  function onTap(e) {
    if (state.gameOver) return;
    var rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    var hits = raycaster.intersectObjects(tileMeshes);
    if (hits.length === 0) return;
    var tile = hits[0].object;
    var d = tile.userData;
    if (d.isPath || d.hasTower) return;
    if (!d.canBuild) return;
    if (state.towerCount >= MAX_TOWERS) { showToast('Max towers reached!'); return; }
    if (state.gold < TOWER_COST) { showToast('Not enough gold!'); return; }
    placeTower(d.col, d.row, tile);
  }

  function makeFallbackTower() {
    var g = new THREE.Group();
    var base = new THREE.Mesh(
      new THREE.CylinderGeometry(0.6, 0.7, 1.0, 8),
      new THREE.MeshStandardMaterial({ color: 0x8b5cf6 })
    );
    var turret = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.6, 0.35),
      new THREE.MeshStandardMaterial({ color: 0xa78bfa })
    );
    turret.position.y = 0.8;
    g.add(base); g.add(turret);
    return g;
  }

  function placeTower(col, row, tile) {
    state.gold -= TOWER_COST;
    state.towerCount++;
    tile.userData.hasTower = true;
    if (tile.userData.buildMarker) {
      scene.remove(tile.userData.buildMarker);
      tile.userData.buildMarker = null;
    }
    var group = new THREE.Group();
    group.position.set(col * TILE + 1, 0.15, row * TILE + 1);
    scene.add(group);
    state.towers.push({ mesh: group, col: col, row: row, cooldown: 0, range: 5 });

    loadModel('/assets/models/kenney-towerdefensekit/weapon-turret.glb', function (model) {
      model.scale.set(1, 1, 1);
      group.add(model);
    }, function () {
      var fb = makeFallbackTower();
      fb.position.y = 0.5;
      group.add(fb);
    });
    updateHUD();
  }

  function startWave() {
    if (state.waveActive || state.gameOver) return;
    state.wave++;
    if (state.wave > MAX_WAVES) return;
    state.waveActive = true;
    state.spawnQueue = 1 + state.wave * 2;
    state.spawnTimer = 0;
    startBtn.style.display = 'none';
    showToast('Wave ' + state.wave + ' incoming!');
    updateHUD();
  }

  function spawnEnemy() {
    var hp = 80 + state.wave * 20;
    var speed = 2.5 + state.wave * 0.3;
    var barBg = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 0.15, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x374151 })
    );
    barBg.position.y = 1.6;
    var barFg = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 0.15, 0.06),
      new THREE.MeshStandardMaterial({ color: 0x22c55e })
    );
    barFg.position.y = 1.6;
    var group = new THREE.Group();
    group.add(barBg); group.add(barFg);
    var sp = path[0];
    group.position.set(sp[0] * TILE + 1, 0.15, sp[1] * TILE + 1);
    scene.add(group);

    loadModel('/assets/models/kenney-blockycharacters/character-a.glb', function (model) {
      model.scale.set(0.7, 0.7, 0.7);
      group.add(model);
    }, function () {
      var fb = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 10, 10),
        new THREE.MeshStandardMaterial({ color: 0xef4444 })
      );
      fb.position.y = 0.5;
      group.add(fb);
    });

    state.enemies.push({
      mesh: group, bar: barFg, hp: hp, maxHp: hp,
      speed: speed, pathIdx: 0, alive: true
    });
  }

  function updateEnemies(dt) {
    for (var i = state.enemies.length - 1; i >= 0; i--) {
      var en = state.enemies[i];
      if (!en.alive) continue;
      var target = path[en.pathIdx + 1];
      if (!target) { enemyReachedBase(en, i); continue; }
      var tx = target[0] * TILE + 1, tz = target[1] * TILE + 1;
      var dx = tx - en.mesh.position.x, dz = tz - en.mesh.position.z;
      var dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 0.15) { en.pathIdx++; continue; }
      var step = en.speed * dt;
      en.mesh.position.x += (dx / dist) * step;
      en.mesh.position.z += (dz / dist) * step;
    }
  }

  function enemyReachedBase(en, idx) {
    en.alive = false;
    scene.remove(en.mesh);
    state.enemies.splice(idx, 1);
    state.lives--;
    updateHUD();
    if (state.lives <= 0) endGame(false);
  }

  function updateTowers(dt) {
    for (var t = 0; t < state.towers.length; t++) {
      var tw = state.towers[t];
      tw.cooldown -= dt;
      if (tw.cooldown > 0) continue;
      var best = null, bestDist = tw.range;
      for (var e = 0; e < state.enemies.length; e++) {
        var en = state.enemies[e];
        if (!en.alive) continue;
        var d = tw.mesh.position.distanceTo(en.mesh.position);
        if (d < bestDist) { bestDist = d; best = en; }
      }
      if (best) { fireProjectile(tw, best); tw.cooldown = 0.8; }
    }
  }

  function fireProjectile(tower, target) {
    var mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0xfbbf24 })
    );
    mesh.position.copy(tower.mesh.position);
    mesh.position.y = 1.4;
    scene.add(mesh);
    state.projectiles.push({ mesh: mesh, target: target, speed: 14 });
  }

  function updateProjectiles(dt) {
    for (var i = state.projectiles.length - 1; i >= 0; i--) {
      var p = state.projectiles[i];
      if (!p.target.alive) { scene.remove(p.mesh); state.projectiles.splice(i, 1); continue; }
      var dir = p.target.mesh.position.clone().sub(p.mesh.position);
      var dist = dir.length();
      if (dist < 0.4) {
        hitEnemy(p.target, 20 + state.wave * 5);
        scene.remove(p.mesh);
        state.projectiles.splice(i, 1);
      } else {
        dir.normalize().multiplyScalar(p.speed * dt);
        p.mesh.position.add(dir);
      }
    }
  }

  function hitEnemy(en, dmg) {
    en.hp -= dmg;
    var ratio = Math.max(0, en.hp / en.maxHp);
    en.bar.scale.x = ratio;
    if (en.hp <= 0) {
      en.alive = false;
      scene.remove(en.mesh);
      var idx = state.enemies.indexOf(en);
      if (idx !== -1) state.enemies.splice(idx, 1);
      state.gold += KILL_REWARD;
      updateHUD();
    }
  }

  function checkWaveComplete() {
    if (!state.waveActive) return;
    if (state.spawnQueue > 0) return;
    if (state.enemies.length > 0) return;
    state.waveActive = false;
    if (state.wave >= MAX_WAVES) { endGame(true); return; }
    showToast('Wave ' + state.wave + ' complete!');
    startBtn.style.display = '';
  }

  function endGame(won) {
    state.gameOver = true;
    startBtn.style.display = 'none';
    document.getElementById('end-title').textContent = won ? 'Victory!' : 'Defeat';
    document.getElementById('end-msg').textContent = won
      ? 'You defended the base through all ' + MAX_WAVES + ' waves!'
      : 'The enemies broke through. You survived ' + (state.wave - 1) + ' full waves.';
    winScreen.classList.add('visible');
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('visible');
    setTimeout(function () { toastEl.classList.remove('visible'); }, 2000);
  }

  function updateHUD() {
    hudEl.innerHTML =
      '<b>Wave:</b> ' + state.wave + '/' + MAX_WAVES +
      '<br><b>Gold:</b> ' + state.gold +
      '<br><b>Lives:</b> ' + state.lives +
      '<br><b>Towers:</b> ' + state.towerCount + '/' + MAX_TOWERS +
      '<br><span style="font-size:12px; opacity:0.8">Build on the glowing pads.</span>';
  }

  function onResize() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  }

  function animate() {
    requestAnimationFrame(animate);
    var dt = Math.min(clock.getDelta(), 0.05);
    if (!state.gameOver) {
      if (state.waveActive && state.spawnQueue > 0) {
        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0) { spawnEnemy(); state.spawnQueue--; state.spawnTimer = 1.0; }
      }
      updateEnemies(dt);
      updateTowers(dt);
      updateProjectiles(dt);
      checkWaveComplete();
    }
    renderer.render(scene, camera);
  }

  init();
})();
  </script>
</body>
</html>
