<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); font-family: Arial, sans-serif; touch-action: none; }
    #game-container { width: 100vw; height: 100vh; }
    #hud {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      min-width: 240px; padding: 14px 16px; border-radius: 18px;
      background: rgba(17,24,39,0.82); color: #f8fafc;
      line-height: 1.5; font-size: 15px;
      box-shadow: 0 12px 30px rgba(15,23,42,0.35);
    }
    #how-to {
      position: fixed; top: 16px; right: 16px; z-index: 10;
      width: min(280px, calc(100vw - 32px)); padding: 14px 16px; border-radius: 18px;
      background: rgba(17,24,39,0.82); color: #f8fafc;
      line-height: 1.45; font-size: 14px;
      box-shadow: 0 12px 30px rgba(15,23,42,0.35);
    }
    #how-to h3 { margin-bottom: 8px; font-size: 15px; }
    #toast {
      position: fixed; top: 92px; left: 50%; transform: translateX(-50%);
      z-index: 20; padding: 12px 22px; border-radius: 999px;
      background: rgba(59,130,246,0.9); color: #fff; font-weight: bold;
      opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
    }
    #toast.visible { opacity: 1; }
    #win-screen {
      display: none; position: fixed; inset: 0; z-index: 25;
      align-items: center; justify-content: center; padding: 24px;
      background: rgba(15,23,42,0.75); color: #fff;
    }
    #win-screen.visible { display: flex; }
    .win-card {
      width: min(92vw, 420px); padding: 28px; border-radius: 24px;
      background: rgba(17,24,39,0.96); text-align: center;
      border: 2px solid rgba(255,255,255,0.14);
    }
    .win-card h1 { margin-bottom: 10px; font-size: 30px; }
    .win-card p { margin-bottom: 16px; line-height: 1.5; }
    .win-card button, #start-wave-btn {
      border: 0; border-radius: 999px; padding: 12px 20px;
      background: #22d3ee; color: #0f172a; font-weight: bold;
      font-size: 15px; cursor: pointer;
    }
    #start-wave-btn {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 15; box-shadow: 0 8px 20px rgba(34,211,238,0.35);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
  <div id="game-container"></div>
  <div id="hud"></div>
  <div id="how-to">
    <h3>How to play</h3>
    <div>Tap or click glowing pads to build towers.</div>
    <div>Press Start Wave to send enemies down the path.</div>
    <div>Do not let them reach the crystal base.</div>
  </div>
  <div id="toast"></div>
  <button id="start-wave-btn">Start Wave</button>
  <div id="win-screen">
    <div class="win-card">
      <h1 id="end-title">Victory!</h1>
      <p id="end-msg">You defended the base through all waves!</p>
      <button id="restart-btn">Play Again</button>
    </div>
  </div>
  <script>
(function () {
  var COLS = 8, ROWS = 6, TILE = 2;
  var MAX_TOWERS = 6, TOWER_COST = 50, KILL_REWARD = 25;
  var MAX_WAVES = 5, START_GOLD = 200, START_LIVES = 10;

  var scene, camera, renderer, clock;
  var hudEl = document.getElementById('hud');
  var toastEl = document.getElementById('toast');
  var winScreen = document.getElementById('win-screen');
  var startBtn = document.getElementById('start-wave-btn');
  var restartBtn = document.getElementById('restart-btn');

  var path = [
    [0, 2], [1, 2], [2, 2], [2, 3], [3, 3], [4, 3], [5, 3], [5, 4], [6, 4], [7, 4]
  ];
  var buildSpots = [
    { col: 0, row: 1, theme: 'left-ridge' },
    { col: 0, row: 3, theme: 'left-grove' },
    { col: 2, row: 1, theme: 'upper-pass' },
    { col: 2, row: 4, theme: 'river-bend' },
    { col: 4, row: 2, theme: 'center-lookout' },
    { col: 4, row: 4, theme: 'lower-bend' },
    { col: 6, row: 3, theme: 'final-approach' },
    { col: 6, row: 5, theme: 'back-crystal' }
  ];
  var buildSpotMap = {};
  buildSpots.forEach(function (spot) {
    buildSpotMap[spot.col + ',' + spot.row] = spot;
  });

  var state = {
    gold: START_GOLD,
    lives: START_LIVES,
    wave: 0,
    waveActive: false,
    towers: [],
    enemies: [],
    projectiles: [],
    towerCount: 0,
    spawnQueue: 0,
    spawnTimer: 0,
    gameOver: false
  };

  var raycaster, mouse;
  var placementMeshes = [];
  var loader = new THREE.GLTFLoader();
  var modelCache = {};
  var pendingModelLoads = {};
  var pathCurve = null;
  var pathSamples = [];

  function cloneModel(model) {
    return model.clone(true);
  }

  function loadModel(url, onLoad, fallback) {
    if (modelCache[url]) {
      onLoad(cloneModel(modelCache[url]));
      return;
    }
    if (pendingModelLoads[url]) {
      pendingModelLoads[url].push({ onLoad: onLoad, fallback: fallback });
      return;
    }
    pendingModelLoads[url] = [{ onLoad: onLoad, fallback: fallback }];
    loader.load(url, function (gltf) {
      modelCache[url] = gltf.scene;
      var waiting = pendingModelLoads[url] || [];
      delete pendingModelLoads[url];
      waiting.forEach(function (entry) {
        try {
          entry.onLoad(cloneModel(modelCache[url]));
        } catch (err) {
          if (entry.fallback) entry.fallback(err);
        }
      });
    }, undefined, function (err) {
      var waiting = pendingModelLoads[url] || [];
      delete pendingModelLoads[url];
      waiting.forEach(function (entry) {
        if (entry.fallback) entry.fallback(err);
      });
    });
  }

  function worldPoint(col, row, y) {
    return new THREE.Vector3(col * TILE + 1, y || 0, row * TILE + 1);
  }

  function getTileCenter(col, row) {
    var p = worldPoint(col, row, 0);
    return { x: p.x, z: p.z };
  }

  function getPathWorldPoint(index, y) {
    var node = path[index];
    return worldPoint(node[0], node[1], y || 0);
  }

  function buildPathCurve() {
    var points = [];
    for (var i = 0; i < path.length; i++) {
      points.push(getPathWorldPoint(i, 0.18));
    }
    pathCurve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.45);
    pathSamples = pathCurve.getPoints(90);
  }

  function distanceToPath(x, z) {
    var best = Infinity;
    for (var i = 0; i < pathSamples.length; i++) {
      var dx = pathSamples[i].x - x;
      var dz = pathSamples[i].z - z;
      var dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < best) best = dist;
    }
    return best;
  }

  function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 18, 34);
    clock = new THREE.Clock();
    buildPathCurve();

    camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(8.5, 12.8, 18.5);
    camera.lookAt(8, 0, 5.2);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.getElementById('game-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.62));
    var dir = new THREE.DirectionalLight(0xfff4d6, 0.95);
    dir.position.set(8, 20, 10);
    dir.castShadow = true;
    scene.add(dir);
    var fill = new THREE.DirectionalLight(0x8ec5ff, 0.25);
    fill.position.set(-10, 10, 14);
    scene.add(fill);

    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    addTerrainBase();
    addPathCorridor();
    addPlacementPads();
    addMapScenery();
    addBaseStructures();
    updateHUD();

    renderer.domElement.addEventListener('pointerdown', onTap);
    startBtn.addEventListener('click', startWave);
    restartBtn.addEventListener('click', function () { location.reload(); });
    window.addEventListener('resize', onResize);

    animate();
    showToast('Build on the glowing pads, then send the wave.');
  }

  function addTerrainBase() {
    var lowerPlate = new THREE.Mesh(
      new THREE.CylinderGeometry(11.8, 13.5, 2.4, 52),
      new THREE.MeshStandardMaterial({ color: 0x20301c, roughness: 1 })
    );
    lowerPlate.position.set(COLS, -1.45, ROWS + 0.15);
    scene.add(lowerPlate);

    var groundGeo = new THREE.PlaneGeometry(24, 18, 32, 24);
    groundGeo.rotateX(-Math.PI / 2);
    var position = groundGeo.attributes.position;
    for (var i = 0; i < position.count; i++) {
      var localX = position.getX(i);
      var localZ = position.getZ(i);
      var worldX = localX + COLS;
      var worldZ = localZ + ROWS + 0.15;
      var ripple = Math.sin(worldX * 0.35) * 0.18 + Math.cos(worldZ * 0.27) * 0.14;
      var edge = Math.max(Math.abs(localX) / 12, Math.abs(localZ) / 9);
      var pathDepth = Math.max(0, 1.25 - distanceToPath(worldX, worldZ));
      position.setY(i, ripple - edge * 0.22 - pathDepth * 0.16);
    }
    groundGeo.computeVertexNormals();
    var ground = new THREE.Mesh(
      groundGeo,
      new THREE.MeshStandardMaterial({ color: 0x3d6130, roughness: 0.98, metalness: 0.02 })
    );
    ground.position.set(COLS, -0.12, ROWS + 0.15);
    scene.add(ground);

    var meadow = new THREE.Mesh(
      new THREE.CircleGeometry(9.8, 48),
      new THREE.MeshStandardMaterial({ color: 0x4d7d39, roughness: 1, transparent: true, opacity: 0.75 })
    );
    meadow.rotation.x = -Math.PI / 2;
    meadow.position.set(COLS, 0.02, ROWS + 0.15);
    scene.add(meadow);
  }

  function addPathCorridor() {
    var border = new THREE.Mesh(
      new THREE.TubeGeometry(pathCurve, 90, 1.15, 14, false),
      new THREE.MeshStandardMaterial({ color: 0x4a3422, roughness: 1 })
    );
    border.scale.y = 0.14;
    border.position.y = 0.18;
    scene.add(border);

    var road = new THREE.Mesh(
      new THREE.TubeGeometry(pathCurve, 90, 0.82, 14, false),
      new THREE.MeshStandardMaterial({ color: 0xb0885e, roughness: 1 })
    );
    road.scale.y = 0.08;
    road.position.y = 0.22;
    scene.add(road);

    for (var i = 8; i < pathSamples.length - 8; i += 16) {
      var sample = pathSamples[i];
      var marker = new THREE.Mesh(
        new THREE.CylinderGeometry(0.24, 0.3, 0.14, 10),
        new THREE.MeshStandardMaterial({ color: 0x8d6b47, roughness: 1 })
      );
      marker.position.set(sample.x, 0.26, sample.z);
      scene.add(marker);
    }
  }

  function addBaseStructures() {
    var startPoint = getPathWorldPoint(0, 0.25);
    var endPoint = getPathWorldPoint(path.length - 1, 0.25);

    loadModel('/assets/models/kenney-towerdefensekit/tile-spawn.glb', function (model) {
      model.position.copy(startPoint);
      model.scale.set(0.95, 0.95, 0.95);
      model.rotation.y = Math.PI / 2;
      scene.add(model);
    }, null);

    var baseGlow = new THREE.Mesh(
      new THREE.CylinderGeometry(0.7, 0.7, 0.12, 24),
      new THREE.MeshStandardMaterial({ color: 0x60a5fa, emissive: 0x1d4ed8, emissiveIntensity: 0.35 })
    );
    baseGlow.position.set(endPoint.x, 0.28, endPoint.z);
    scene.add(baseGlow);

    loadModel('/assets/models/kenney-towerdefensekit/wood-structure.glb', function (model) {
      model.position.set(endPoint.x, 0.2, endPoint.z + 0.25);
      model.rotation.y = Math.PI;
      model.scale.set(0.95, 0.95, 0.95);
      scene.add(model);
    }, null);
  }

  function addSceneryProp(url, x, y, z, scale, rotationY) {
    loadModel(url, function (model) {
      model.position.set(x, y, z);
      model.rotation.y = rotationY || 0;
      model.scale.set(scale, scale, scale);
      scene.add(model);
    }, null);
  }

  function addMapScenery() {
    var props = [
      ['/assets/models/kenney-towerdefensekit/detail-tree-large.glb', -1.2, 0.05, 0.2, 1.05, 0.25],
      ['/assets/models/kenney-towerdefensekit/detail-tree-large.glb', 17.4, 0.05, 12.2, 1.08, -0.35],
      ['/assets/models/kenney-towerdefensekit/detail-tree-large.glb', 15.4, 0.08, -0.9, 0.92, 0.6],
      ['/assets/models/kenney-towerdefensekit/detail-rocks-large.glb', 7.5, 0.06, -1.3, 1.05, 0.4],
      ['/assets/models/kenney-towerdefensekit/detail-rocks-large.glb', 10.6, 0.08, 13.2, 1.15, 1.3],
      ['/assets/models/kenney-towerdefensekit/detail-crystal-large.glb', 2.2, 0.08, 11.8, 0.9, 0.15],
      ['/assets/models/kenney-towerdefensekit/detail-crystal-large.glb', 14.2, 0.08, 1.4, 0.82, -0.2],
      ['/assets/models/kenney-towerdefensekit/detail-tree.glb', 4.1, 0.02, 9.7, 0.9, 0.9],
      ['/assets/models/kenney-towerdefensekit/detail-rocks.glb', 12.3, 0.02, 8.7, 1, -0.5],
      ['/assets/models/kenney-towerdefensekit/detail-dirt-large.glb', 5.5, 0.04, 1.1, 0.95, 0.1],
      ['/assets/models/kenney-towerdefensekit/detail-dirt-large.glb', 11.2, 0.04, 5.7, 1.05, -0.6]
    ];
    for (var i = 0; i < props.length; i++) {
      addSceneryProp(props[i][0], props[i][1], props[i][2], props[i][3], props[i][4], props[i][5]);
    }
  }

  function createPadMarker(center) {
    var group = new THREE.Group();
    group.position.set(center.x, 0.16, center.z);

    var halo = new THREE.Mesh(
      new THREE.TorusGeometry(0.8, 0.08, 10, 28),
      new THREE.MeshStandardMaterial({
        color: 0x67e8f9,
        emissive: 0x0891b2,
        emissiveIntensity: 0.45,
        transparent: true,
        opacity: 0.9
      })
    );
    halo.rotation.x = Math.PI / 2;
    group.add(halo);

    var disc = new THREE.Mesh(
      new THREE.CylinderGeometry(0.62, 0.62, 0.06, 20),
      new THREE.MeshStandardMaterial({ color: 0x173a53, transparent: true, opacity: 0.75 })
    );
    disc.position.y = 0.02;
    group.add(disc);

    loadModel('/assets/models/kenney-towerdefensekit/tower-round-base.glb', function (model) {
      model.position.y = 0.03;
      model.scale.set(0.58, 0.58, 0.58);
      group.add(model);
    }, null);

    scene.add(group);
    return group;
  }

  function addPlacementPads() {
    for (var i = 0; i < buildSpots.length; i++) {
      var spot = buildSpots[i];
      var center = getTileCenter(spot.col, spot.row);
      var collider = new THREE.Mesh(
        new THREE.CylinderGeometry(0.92, 0.92, 0.45, 20),
        new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.01 })
      );
      collider.position.set(center.x, 0.35, center.z);
      collider.userData = {
        col: spot.col,
        row: spot.row,
        canBuild: true,
        hasTower: false,
        buildMarker: createPadMarker(center)
      };
      placementMeshes.push(collider);
      scene.add(collider);
    }
  }

  function onTap(e) {
    if (state.gameOver) return;
    var rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    var hits = raycaster.intersectObjects(placementMeshes);
    if (hits.length === 0) return;
    var spot = hits[0].object;
    var data = spot.userData;
    if (data.hasTower || !data.canBuild) return;
    if (state.towerCount >= MAX_TOWERS) {
      showToast('Max towers reached!');
      return;
    }
    if (state.gold < TOWER_COST) {
      showToast('Not enough gold!');
      return;
    }
    placeTower(data.col, data.row, spot);
  }

  function makeFallbackTower() {
    var group = new THREE.Group();
    var base = new THREE.Mesh(
      new THREE.CylinderGeometry(0.56, 0.72, 0.95, 12),
      new THREE.MeshStandardMaterial({ color: 0x8b5cf6 })
    );
    var turret = new THREE.Mesh(
      new THREE.CylinderGeometry(0.16, 0.22, 0.9, 10),
      new THREE.MeshStandardMaterial({ color: 0xc4b5fd })
    );
    turret.rotation.z = Math.PI / 2;
    turret.position.set(0, 0.76, 0);
    group.add(base);
    group.add(turret);
    return group;
  }

  function placeTower(col, row, spotMesh) {
    state.gold -= TOWER_COST;
    state.towerCount++;
    spotMesh.userData.hasTower = true;
    if (spotMesh.userData.buildMarker) {
      scene.remove(spotMesh.userData.buildMarker);
      spotMesh.userData.buildMarker = null;
    }

    var center = getTileCenter(col, row);
    var towerGroup = new THREE.Group();
    towerGroup.position.set(center.x, 0.18, center.z);
    scene.add(towerGroup);
    state.towers.push({ mesh: towerGroup, col: col, row: row, cooldown: 0, range: 5.25 });

    loadModel('/assets/models/kenney-towerdefensekit/tower-round-base.glb', function (model) {
      model.scale.set(0.62, 0.62, 0.62);
      towerGroup.add(model);
    }, null);
    loadModel('/assets/models/kenney-towerdefensekit/weapon-turret.glb', function (model) {
      model.position.y = 0.05;
      model.scale.set(0.92, 0.92, 0.92);
      towerGroup.add(model);
    }, function () {
      var fallback = makeFallbackTower();
      fallback.position.y = 0.24;
      towerGroup.add(fallback);
    });

    updateHUD();
  }

  function startWave() {
    if (state.waveActive || state.gameOver) return;
    state.wave++;
    if (state.wave > MAX_WAVES) return;
    state.waveActive = true;
    state.spawnQueue = 1 + state.wave * 2;
    state.spawnTimer = 0;
    startBtn.style.display = 'none';
    showToast('Wave ' + state.wave + ' incoming!');
    updateHUD();
  }

  function spawnEnemy() {
    var hp = 80 + state.wave * 20;
    var speed = 2.45 + state.wave * 0.32;
    var barBg = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 0.15, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x374151 })
    );
    barBg.position.y = 1.65;
    var barFg = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 0.15, 0.06),
      new THREE.MeshStandardMaterial({ color: 0x22c55e })
    );
    barFg.position.y = 1.65;

    var group = new THREE.Group();
    group.add(barBg);
    group.add(barFg);
    var startPoint = getPathWorldPoint(0, 0.2);
    group.position.set(startPoint.x, startPoint.y, startPoint.z);
    scene.add(group);

    loadModel('/assets/models/kenney-blockycharacters/character-a.glb', function (model) {
      model.scale.set(0.72, 0.72, 0.72);
      group.add(model);
    }, function () {
      var fallback = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 10, 10),
        new THREE.MeshStandardMaterial({ color: 0xef4444 })
      );
      fallback.position.y = 0.5;
      group.add(fallback);
    });

    state.enemies.push({
      mesh: group,
      bar: barFg,
      hp: hp,
      maxHp: hp,
      speed: speed,
      pathIdx: 0,
      alive: true
    });
  }

  function updateEnemies(dt) {
    for (var i = state.enemies.length - 1; i >= 0; i--) {
      var enemy = state.enemies[i];
      if (!enemy.alive) continue;
      var target = path[enemy.pathIdx + 1];
      if (!target) {
        enemyReachedBase(enemy, i);
        continue;
      }
      var targetPoint = getPathWorldPoint(enemy.pathIdx + 1, enemy.mesh.position.y);
      var dx = targetPoint.x - enemy.mesh.position.x;
      var dz = targetPoint.z - enemy.mesh.position.z;
      var dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 0.16) {
        enemy.pathIdx++;
        continue;
      }
      var step = enemy.speed * dt;
      enemy.mesh.position.x += (dx / dist) * step;
      enemy.mesh.position.z += (dz / dist) * step;
      enemy.mesh.lookAt(targetPoint.x, enemy.mesh.position.y, targetPoint.z);
    }
  }

  function enemyReachedBase(enemy, idx) {
    enemy.alive = false;
    scene.remove(enemy.mesh);
    state.enemies.splice(idx, 1);
    state.lives--;
    updateHUD();
    if (state.lives <= 0) endGame(false);
  }

  function updateTowers(dt) {
    for (var i = 0; i < state.towers.length; i++) {
      var tower = state.towers[i];
      tower.cooldown -= dt;
      if (tower.cooldown > 0) continue;
      var target = null;
      var bestDist = tower.range;
      for (var j = 0; j < state.enemies.length; j++) {
        var enemy = state.enemies[j];
        if (!enemy.alive) continue;
        var dist = tower.mesh.position.distanceTo(enemy.mesh.position);
        if (dist < bestDist) {
          bestDist = dist;
          target = enemy;
        }
      }
      if (target) {
        fireProjectile(tower, target);
        tower.cooldown = 0.78;
      }
    }
  }

  function fireProjectile(tower, target) {
    var projectile = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0xfbbf24, emissive: 0xf59e0b, emissiveIntensity: 0.25 })
    );
    projectile.position.copy(tower.mesh.position);
    projectile.position.y = 1.3;
    scene.add(projectile);
    state.projectiles.push({ mesh: projectile, target: target, speed: 14 });
  }

  function updateProjectiles(dt) {
    for (var i = state.projectiles.length - 1; i >= 0; i--) {
      var projectile = state.projectiles[i];
      if (!projectile.target.alive) {
        scene.remove(projectile.mesh);
        state.projectiles.splice(i, 1);
        continue;
      }
      var direction = projectile.target.mesh.position.clone().sub(projectile.mesh.position);
      var dist = direction.length();
      if (dist < 0.42) {
        hitEnemy(projectile.target, 20 + state.wave * 5);
        scene.remove(projectile.mesh);
        state.projectiles.splice(i, 1);
      } else {
        direction.normalize().multiplyScalar(projectile.speed * dt);
        projectile.mesh.position.add(direction);
      }
    }
  }

  function hitEnemy(enemy, damage) {
    enemy.hp -= damage;
    var ratio = Math.max(0, enemy.hp / enemy.maxHp);
    enemy.bar.scale.x = ratio;
    if (enemy.hp <= 0) {
      enemy.alive = false;
      scene.remove(enemy.mesh);
      var idx = state.enemies.indexOf(enemy);
      if (idx !== -1) state.enemies.splice(idx, 1);
      state.gold += KILL_REWARD;
      updateHUD();
    }
  }

  function checkWaveComplete() {
    if (!state.waveActive) return;
    if (state.spawnQueue > 0) return;
    if (state.enemies.length > 0) return;
    state.waveActive = false;
    if (state.wave >= MAX_WAVES) {
      endGame(true);
      return;
    }
    showToast('Wave ' + state.wave + ' complete!');
    startBtn.style.display = '';
  }

  function endGame(won) {
    state.gameOver = true;
    startBtn.style.display = 'none';
    document.getElementById('end-title').textContent = won ? 'Victory!' : 'Defeat';
    document.getElementById('end-msg').textContent = won
      ? 'You defended the crystal base through all ' + MAX_WAVES + ' waves!'
      : 'The enemies broke through. You survived ' + (state.wave - 1) + ' full waves.';
    winScreen.classList.add('visible');
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('visible');
    setTimeout(function () {
      toastEl.classList.remove('visible');
    }, 2000);
  }

  function updateHUD() {
    hudEl.innerHTML =
      '<b>Wave:</b> ' + state.wave + '/' + MAX_WAVES +
      '<br><b>Gold:</b> ' + state.gold +
      '<br><b>Lives:</b> ' + state.lives +
      '<br><b>Towers:</b> ' + state.towerCount + '/' + MAX_TOWERS +
      '<br><span style="font-size:12px; opacity:0.8">Place towers on the glowing pads.</span>';
  }

  function onResize() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  }

  function animate() {
    requestAnimationFrame(animate);
    var dt = Math.min(clock.getDelta(), 0.05);
    if (!state.gameOver) {
      if (state.waveActive && state.spawnQueue > 0) {
        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0) {
          spawnEnemy();
          state.spawnQueue--;
          state.spawnTimer = 1.0;
        }
      }
      updateEnemies(dt);
      updateTowers(dt);
      updateProjectiles(dt);
      checkWaveComplete();
    }
    renderer.render(scene, camera);
  }

  init();
})();
  </script>
</body>
</html>
