<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #bfdbfe; font-family: Arial, sans-serif; touch-action: none; }
    #game-container { width: 100vw; height: 100vh; }
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      min-width: 270px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.78);
      color: #e2e8f0;
      line-height: 1.45;
      font-size: 15px;
    }
    #toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.92);
      color: #fff;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    #toast.visible { opacity: 1; }
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 25;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.7);
      color: #fff;
    }
    #overlay.visible { display: flex; }
    .card {
      width: min(92vw, 430px);
      padding: 28px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.96);
      text-align: center;
      border: 2px solid rgba(255,255,255,0.15);
    }
    .card h1 { margin-bottom: 10px; font-size: 30px; }
    .card p { margin-bottom: 16px; line-height: 1.5; }
    .card button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #bef264;
      color: #365314;
      font-weight: bold;
      cursor: pointer;
    }
    .action-btn {
      position: fixed;
      z-index: 15;
      min-width: 82px;
      min-height: 56px;
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(15, 23, 42, 0.72);
      color: #fff;
      font-weight: bold;
      padding: 10px 12px;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }
    #up-btn { left: 92px; bottom: 114px; }
    #left-btn { left: 16px; bottom: 46px; }
    #down-btn { left: 92px; bottom: 46px; }
    #right-btn { left: 168px; bottom: 46px; }
    #place-btn { right: 18px; bottom: 110px; }
    #remove-btn { right: 18px; bottom: 46px; }
    #cycle-btn { right: 114px; bottom: 46px; }
    @media (min-width: 900px) {
      .action-btn { opacity: 0.34; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="game-container"></div>
  <div id="hud"></div>
  <div id="toast"></div>
  <div id="overlay">
    <div class="card">
      <h1>Blueprint Complete!</h1>
      <p>Your cozy builder world now has walls, a roof, and a door. You finished the starter house and still have room to decorate more.</p>
      <button id="restart-btn">Build Again</button>
    </div>
  </div>
  <button id="up-btn" class="action-btn">Up</button>
  <button id="left-btn" class="action-btn">Left</button>
  <button id="down-btn" class="action-btn">Down</button>
  <button id="right-btn" class="action-btn">Right</button>
  <button id="place-btn" class="action-btn">Place</button>
  <button id="remove-btn" class="action-btn">Remove</button>
  <button id="cycle-btn" class="action-btn">Cycle</button>
  <script>
    (function () {
      var scene, camera, renderer, clock;
      var container = document.getElementById('game-container');
      var hud = document.getElementById('hud');
      var toast = document.getElementById('toast');
      var overlay = document.getElementById('overlay');
      var restartBtn = document.getElementById('restart-btn');

      var gridSize = 8;
      var cellSize = 3;
      var cursor = { x: 3, z: 3 };
      var buildMode = 'wall';
      var placedBlocks = new Map();
      var blueprintMarkers = [];

      var state = {
        wood: 12,
        glass: 6,
        roof: 6,
        wallPlaced: 0,
        roofPlaced: 0,
        doorPlaced: 0,
        finished: false
      };

      var requiredCounts = {
        wall: 6,
        roof: 4,
        door: 1
      };

      var blockColors = {
        wall: 0xf59e0b,
        roof: 0xef4444,
        door: 0x60a5fa
      };

      var cursorMesh;
      var pointerState = {
        up: false,
        left: false,
        down: false,
        right: false
      };

      function keyForCell(x, z) {
        return x + ':' + z;
      }

      function showToast(text) {
        toast.textContent = text;
        toast.classList.add('visible');
        clearTimeout(showToast._timer);
        showToast._timer = setTimeout(function () {
          toast.classList.remove('visible');
        }, 1300);
      }

      function blueprintTypeForCell(x, z) {
        if ((x === 2 || x === 4) && (z === 2 || z === 4)) return 'roof';
        if (x === 3 && z === 1) return 'door';
        if (x === 2 || x === 4 || z === 2 || z === 4) return 'wall';
        return null;
      }

      function createEnvironment() {
        var ground = new THREE.Mesh(
          new THREE.PlaneGeometry(80, 80),
          new THREE.MeshStandardMaterial({ color: 0x86efac })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        var path = new THREE.Mesh(
          new THREE.BoxGeometry(14, 0.08, 28),
          new THREE.MeshStandardMaterial({ color: 0xd6d3d1 })
        );
        path.position.set(0, 0.04, 1.5);
        path.receiveShadow = true;
        scene.add(path);

        for (var x = 0; x < gridSize; x++) {
          for (var z = 0; z < gridSize; z++) {
            var cell = new THREE.LineSegments(
              new THREE.EdgesGeometry(new THREE.BoxGeometry(cellSize - 0.05, 0.06, cellSize - 0.05)),
              new THREE.LineBasicMaterial({ color: 0xffffff })
            );
            cell.position.set((x - 3.5) * cellSize, 0.03, (z - 3.5) * cellSize);
            scene.add(cell);
          }
        }

        for (var i = 0; i < 8; i++) {
          var tree = new THREE.Group();
          var trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.35, 2.8, 10), new THREE.MeshStandardMaterial({ color: 0x92400e }));
          trunk.position.y = 1.4;
          var leaves = new THREE.Mesh(new THREE.SphereGeometry(1.3, 16, 16), new THREE.MeshStandardMaterial({ color: 0x16a34a }));
          leaves.position.y = 3.2;
          tree.add(trunk);
          tree.add(leaves);
          tree.position.set((i < 4 ? -16 : 16) + (i % 4) * 2.4, 0, -8 + (i % 4) * 7);
          tree.traverse(function (child) {
            child.castShadow = true;
            child.receiveShadow = true;
          });
          scene.add(tree);
        }

        blueprintMarkers = [];
        for (var bx = 0; bx < gridSize; bx++) {
          for (var bz = 0; bz < gridSize; bz++) {
            var type = blueprintTypeForCell(bx, bz);
            if (!type) continue;
            var marker = new THREE.Mesh(
              new THREE.BoxGeometry(cellSize - 0.35, 0.14, cellSize - 0.35),
              new THREE.MeshStandardMaterial({ color: blockColors[type], transparent: true, opacity: 0.22 })
            );
            marker.position.set((bx - 3.5) * cellSize, 0.08, (bz - 3.5) * cellSize);
            scene.add(marker);
            blueprintMarkers.push(marker);
          }
        }

        var resourcePile = new THREE.Mesh(
          new THREE.BoxGeometry(3.5, 1, 2.2),
          new THREE.MeshStandardMaterial({ color: 0x78350f })
        );
        resourcePile.position.set(-13, 0.5, 8);
        resourcePile.castShadow = true;
        scene.add(resourcePile);

        var glassPile = new THREE.Mesh(
          new THREE.BoxGeometry(2.4, 0.8, 2.4),
          new THREE.MeshStandardMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.6 })
        );
        glassPile.position.set(-13, 0.4, 4);
        glassPile.castShadow = true;
        scene.add(glassPile);

        var roofPile = new THREE.Mesh(
          new THREE.ConeGeometry(1.8, 1.6, 4),
          new THREE.MeshStandardMaterial({ color: 0xef4444 })
        );
        roofPile.rotation.y = Math.PI / 4;
        roofPile.position.set(-13, 0.8, 0);
        roofPile.castShadow = true;
        scene.add(roofPile);
      }

      function createCursor() {
        cursorMesh = new THREE.Mesh(
          new THREE.BoxGeometry(cellSize - 0.25, 0.18, cellSize - 0.25),
          new THREE.MeshStandardMaterial({ color: 0xf8fafc, emissive: 0x38bdf8, emissiveIntensity: 0.65, transparent: true, opacity: 0.85 })
        );
        cursorMesh.position.y = 0.14;
        scene.add(cursorMesh);
        updateCursor();
      }

      function updateCursor() {
        cursorMesh.position.x = (cursor.x - 3.5) * cellSize;
        cursorMesh.position.z = (cursor.z - 3.5) * cellSize;
      }

      function createBlock(type, x, z) {
        var key = keyForCell(x, z);
        if (placedBlocks.has(key)) return false;

        if (type === 'wall' && state.wood <= 0) return false;
        if (type === 'roof' && state.roof <= 0) return false;
        if (type === 'door' && state.glass <= 0) return false;

        var mesh;
        if (type === 'roof') {
          mesh = new THREE.Mesh(
            new THREE.ConeGeometry(1.15, 1.2, 4),
            new THREE.MeshStandardMaterial({ color: blockColors[type] })
          );
          mesh.rotation.y = Math.PI / 4;
          mesh.position.y = 1.2;
        } else if (type === 'door') {
          mesh = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 2.2, 0.3),
            new THREE.MeshStandardMaterial({ color: blockColors[type], transparent: true, opacity: 0.8 })
          );
          mesh.position.y = 1.1;
        } else {
          mesh = new THREE.Mesh(
            new THREE.BoxGeometry(2.2, 2.2, 0.45),
            new THREE.MeshStandardMaterial({ color: blockColors[type] })
          );
          mesh.position.y = 1.1;
        }

        mesh.position.x = (x - 3.5) * cellSize;
        mesh.position.z = (z - 3.5) * cellSize;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);

        placedBlocks.set(key, { type: type, mesh: mesh });
        if (type === 'wall') {
          state.wood -= 1;
          state.wallPlaced += 1;
        } else if (type === 'roof') {
          state.roof -= 1;
          state.roofPlaced += 1;
        } else if (type === 'door') {
          state.glass -= 1;
          state.doorPlaced += 1;
        }

        showToast('Placed ' + type);
        updateHud();
        checkVictory();
        return true;
      }

      function removeBlock() {
        var key = keyForCell(cursor.x, cursor.z);
        var block = placedBlocks.get(key);
        if (!block) return false;

        scene.remove(block.mesh);
        placedBlocks.delete(key);
        if (block.type === 'wall') {
          state.wood += 1;
          state.wallPlaced = Math.max(0, state.wallPlaced - 1);
        } else if (block.type === 'roof') {
          state.roof += 1;
          state.roofPlaced = Math.max(0, state.roofPlaced - 1);
        } else if (block.type === 'door') {
          state.glass += 1;
          state.doorPlaced = Math.max(0, state.doorPlaced - 1);
        }

        showToast('Removed ' + block.type);
        updateHud();
        return true;
      }

      function gatherMaterials() {
        state.wood += 2;
        state.glass += 1;
        state.roof += 1;
        showToast('Gathered more materials');
        updateHud();
      }

      function cycleMode() {
        buildMode = buildMode === 'wall' ? 'roof' : buildMode === 'roof' ? 'door' : 'wall';
        updateHud();
      }

      function updateHud() {
        hud.innerHTML =
          '<strong>Vibe 3D House Builder</strong><br>' +
          'Mode: ' + buildMode.toUpperCase() + ' | Cursor: ' + (cursor.x + 1) + ',' + (cursor.z + 1) + '<br>' +
          'Materials - Wood: ' + state.wood + ' | Glass: ' + state.glass + ' | Roof: ' + state.roof + '<br>' +
          'Blueprint - Walls: ' + state.wallPlaced + '/' + requiredCounts.wall +
          ' | Roof: ' + state.roofPlaced + '/' + requiredCounts.roof +
          ' | Door: ' + state.doorPlaced + '/' + requiredCounts.door + '<br>' +
          'Goal: place the cozy house pieces on the blueprint grid, then decorate more if you want';
      }

      function checkVictory() {
        if (state.wallPlaced >= requiredCounts.wall && state.roofPlaced >= requiredCounts.roof && state.doorPlaced >= requiredCounts.door) {
          state.finished = true;
          overlay.classList.add('visible');
        }
      }

      function resetGame() {
        placedBlocks.forEach(function (block) {
          scene.remove(block.mesh);
        });
        placedBlocks.clear();
        state.wood = 12;
        state.glass = 6;
        state.roof = 6;
        state.wallPlaced = 0;
        state.roofPlaced = 0;
        state.doorPlaced = 0;
        state.finished = false;
        buildMode = 'wall';
        cursor.x = 3;
        cursor.z = 3;
        overlay.classList.remove('visible');
        updateCursor();
        updateHud();
      }

      function moveCursor(dx, dz) {
        cursor.x = Math.max(0, Math.min(gridSize - 1, cursor.x + dx));
        cursor.z = Math.max(0, Math.min(gridSize - 1, cursor.z + dz));
        updateCursor();
        updateHud();
      }

      function bindHoldButton(id, key) {
        var el = document.getElementById(id);
        function setState(value, event) {
          if (event) event.preventDefault();
          pointerState[key] = value;
        }
        ['pointerdown', 'touchstart'].forEach(function (type) {
          el.addEventListener(type, function (event) { setState(true, event); });
        });
        ['pointerup', 'pointercancel', 'pointerleave', 'touchend'].forEach(function (type) {
          el.addEventListener(type, function (event) { setState(false, event); });
        });
      }

      function bindTapButton(id, handler) {
        var el = document.getElementById(id);
        ['click', 'pointerdown', 'touchstart'].forEach(function (type) {
          el.addEventListener(type, function (event) {
            event.preventDefault();
            handler();
          });
        });
      }

      function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xbfdbfe);
        camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 300);
        camera.position.set(17, 19, 19);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        clock = new THREE.Clock();

        scene.add(new THREE.AmbientLight(0xffffff, 0.75));
        var sun = new THREE.DirectionalLight(0xffffff, 0.95);
        sun.position.set(12, 22, 8);
        sun.castShadow = true;
        scene.add(sun);

        createEnvironment();
        createCursor();
        updateHud();

        bindHoldButton('up-btn', 'up');
        bindHoldButton('left-btn', 'left');
        bindHoldButton('down-btn', 'down');
        bindHoldButton('right-btn', 'right');
        bindTapButton('place-btn', function () { createBlock(buildMode, cursor.x, cursor.z); });
        bindTapButton('remove-btn', removeBlock);
        bindTapButton('cycle-btn', cycleMode);
        restartBtn.addEventListener('click', resetGame);

        document.addEventListener('keydown', function (event) {
          if (event.key === 'ArrowUp') moveCursor(0, -1);
          if (event.key === 'ArrowDown') moveCursor(0, 1);
          if (event.key === 'ArrowLeft') moveCursor(-1, 0);
          if (event.key === 'ArrowRight') moveCursor(1, 0);
          if (event.code === 'Space') createBlock(buildMode, cursor.x, cursor.z);
          if (event.key === 'x' || event.key === 'X') removeBlock();
          if (event.key === 'c' || event.key === 'C') cycleMode();
          if (event.key === 'g' || event.key === 'G') gatherMaterials();
        });

        window.addEventListener('resize', onResize);
        animate();
      }

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      var moveAccumulator = 0;
      function update(delta) {
        moveAccumulator += delta;
        if (moveAccumulator > 0.14) {
          if (pointerState.up) moveCursor(0, -1);
          if (pointerState.down) moveCursor(0, 1);
          if (pointerState.left) moveCursor(-1, 0);
          if (pointerState.right) moveCursor(1, 0);
          moveAccumulator = 0;
        }

        var lookTarget = new THREE.Vector3((cursor.x - 3.5) * cellSize, 0, (cursor.z - 3.5) * cellSize);
        camera.position.x = THREE.MathUtils.lerp(camera.position.x, 17 + lookTarget.x * 0.12, 0.08);
        camera.position.z = THREE.MathUtils.lerp(camera.position.z, 19 + lookTarget.z * 0.12, 0.08);
        camera.lookAt(lookTarget.x, 0, lookTarget.z);

        cursorMesh.material.emissiveIntensity = 0.45 + Math.sin(clock.elapsedTime * 4) * 0.2;
      }

      function animate() {
        requestAnimationFrame(animate);
        var delta = Math.min(clock.getDelta(), 0.05);
        update(delta);
        renderer.render(scene, camera);
      }

      init();
    })();
  </script>
</body>
</html>
