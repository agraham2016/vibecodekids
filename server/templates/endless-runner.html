<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden; touch-action: none;
    }
    #game-container { border-radius: 12px; overflow: hidden; box-shadow: 0 0 40px rgba(0,255,255,0.15); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.86.0/dist/phaser.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="game-container"></div>
  <script>
  var W = 800, H = 500;
  var GROUND_Y = 420;

  class RunnerScene extends Phaser.Scene {
    preload() {
      var g = this.make.graphics({ add: false });

      // Robot character — big glowing visor head, chunky metal body, jet boots
      // Head (dark helmet with wide cyan visor)
      g.fillStyle(0x1a1a2e); g.fillRoundedRect(4, 0, 24, 16, 6);
      g.fillStyle(0x00fff5); g.fillRoundedRect(6, 4, 20, 8, 3);
      g.fillStyle(0xffffff, 0.5); g.fillRect(8, 5, 6, 4);
      g.fillStyle(0xff00ff); g.fillCircle(24, 2, 3);
      // Body (purple chest plate with cyan energy core)
      g.fillStyle(0x6c5ce7); g.fillRoundedRect(6, 16, 20, 14, 3);
      g.fillStyle(0x00fff5); g.fillCircle(16, 22, 4);
      g.fillStyle(0xffffff, 0.4); g.fillCircle(15, 21, 2);
      // Arms
      g.fillStyle(0xa29bfe); g.fillRoundedRect(0, 18, 6, 10, 2);
      g.fillRoundedRect(26, 18, 6, 10, 2);
      g.fillStyle(0x00fff5, 0.5); g.fillRect(1, 26, 4, 2);
      g.fillRect(27, 26, 4, 2);
      // Legs with jet boots
      g.fillStyle(0x636e72); g.fillRect(8, 30, 6, 6);
      g.fillRect(18, 30, 6, 6);
      g.fillStyle(0xff6b35); g.fillRect(8, 35, 6, 4);
      g.fillRect(18, 35, 6, 4);
      g.fillStyle(0xffd700, 0.5); g.fillRect(9, 37, 4, 3);
      g.fillRect(19, 37, 4, 3);
      g.generateTexture('robot', 32, 40); g.clear();

      // Laser barrier — magenta vertical beam with posts
      g.fillStyle(0x636e72); g.fillRect(0, 0, 6, 40);
      g.fillStyle(0xff00ff, 0.7); g.fillRect(6, 4, 4, 32);
      g.fillStyle(0xff69b4, 0.4); g.fillRect(5, 2, 6, 36);
      g.fillStyle(0xff00ff); g.fillCircle(3, 3, 4); g.fillCircle(3, 37, 4);
      g.generateTexture('laser', 14, 40); g.clear();

      // Drone — flying obstacle, wider
      g.fillStyle(0x6c5ce7); g.fillEllipse(20, 12, 36, 16);
      g.fillStyle(0xa29bfe); g.fillEllipse(20, 10, 28, 10);
      g.fillStyle(0xff0000); g.fillCircle(12, 10, 3);
      g.fillStyle(0xff6b6b); g.fillCircle(12, 10, 2);
      g.fillStyle(0x636e72); g.fillRect(2, 18, 8, 3);
      g.fillRect(30, 18, 8, 3);
      g.generateTexture('drone', 40, 24); g.clear();

      // Energy orb — collectible (cyan/electric)
      g.fillStyle(0x00fff5, 0.3); g.fillCircle(12, 12, 12);
      g.fillStyle(0x00cec9); g.fillCircle(12, 12, 8);
      g.fillStyle(0x00fff5); g.fillCircle(12, 12, 5);
      g.fillStyle(0xffffff, 0.7); g.fillCircle(10, 9, 3);
      g.generateTexture('orb', 24, 24); g.clear();

      // Bolt — second collectible (magenta)
      g.fillStyle(0xff00ff, 0.3); g.fillCircle(10, 10, 10);
      g.fillStyle(0xe84393); g.fillCircle(10, 10, 7);
      g.lineStyle(2, 0xffffff);
      g.lineBetween(8, 4, 12, 10);
      g.lineBetween(12, 10, 8, 16);
      g.generateTexture('bolt', 20, 20); g.clear();

      // Ground tile — dark metallic platform with neon cyan strip and grid lines
      g.fillStyle(0x1a1a2e); g.fillRect(0, 0, 64, 80);
      g.fillStyle(0x2d3436); g.fillRect(0, 0, 64, 8);
      g.fillStyle(0x00fff5); g.fillRect(0, 0, 64, 3);
      g.fillStyle(0x00cec9, 0.3); g.fillRect(0, 3, 64, 5);
      g.fillStyle(0x6c5ce7, 0.08);
      g.fillRect(0, 16, 64, 2); g.fillRect(0, 32, 64, 2);
      g.fillRect(0, 48, 64, 2); g.fillRect(0, 64, 64, 2);
      g.fillRect(16, 8, 2, 72); g.fillRect(32, 8, 2, 72); g.fillRect(48, 8, 2, 72);
      g.generateTexture('ground-tile', 64, 80); g.clear();

      // Solid ground collision bar (invisible but real physics body)
      g.fillStyle(0x00fff5); g.fillRect(0, 0, W, 8);
      g.generateTexture('ground-bar', W, 8); g.clear();

      // Particle
      g.fillStyle(0xffffff); g.fillCircle(4, 4, 4);
      g.generateTexture('spark', 8, 8);

      g.destroy();
    }

    create() {
      this.score = 0;
      this.gameOver = false;
      this.baseSpeed = 240;
      this.gameSpeed = this.baseSpeed;
      this.jumpCount = 0;
      this.maxJumps = 2;
      this.dist = 0;

      // Deep purple gradient background
      var bg = this.add.graphics();
      bg.fillGradientStyle(0x0f0c29, 0x0f0c29, 0x302b63, 0x302b63);
      bg.fillRect(0, 0, W, H);

      // Stars
      this.stars = [];
      for (var i = 0; i < 60; i++) {
        var c = Math.random() < 0.3 ? 0x00fff5 : (Math.random() < 0.5 ? 0xff69b4 : 0xffffff);
        var s = this.add.circle(
          Phaser.Math.Between(0, W), Phaser.Math.Between(0, GROUND_Y - 80),
          Phaser.Math.Between(1, 2), c, Phaser.Math.FloatBetween(0.15, 0.6)
        );
        this.stars.push(s);
      }

      // Neon city silhouette
      this.cityGfx = this.add.graphics().setDepth(1);
      this.buildings = [];
      for (var x = 0; x < W + 200; x += Phaser.Math.Between(40, 100)) {
        this.buildings.push({
          x: x,
          w: Phaser.Math.Between(30, 70),
          h: Phaser.Math.Between(40, 180),
          hue: Phaser.Math.Between(0, 2)
        });
      }
      this.drawCity();

      // Ground visual (tileSprite — scrolls smoothly)
      this.groundSprite = this.add.tileSprite(W / 2, GROUND_Y + 40, W, 80, 'ground-tile').setDepth(2);

      // Ground physics — real static sprite (never use zone for collision, it's unreliable)
      this.groundBody = this.physics.add.staticSprite(W / 2, GROUND_Y + 4, 'ground-bar');
      this.groundBody.setAlpha(0).refreshBody();

      // Player
      this.player = this.physics.add.sprite(110, GROUND_Y - 30, 'robot');
      this.player.setBounce(0);
      this.player.setGravityY(200);
      this.player.body.setSize(20, 34);
      this.player.body.setOffset(6, 4);
      this.player.setDepth(5);

      // Groups
      this.obstacles = this.physics.add.group();
      this.pickups = this.physics.add.group();

      // Collisions
      this.physics.add.collider(this.player, this.groundBody, function() {
        this.jumpCount = 0;
      }.bind(this));
      this.physics.add.overlap(this.player, this.pickups, this.collectOrb, null, this);
      this.physics.add.overlap(this.player, this.obstacles, this.hitObstacle, null, this);

      // Particles
      this.sparkEmitter = this.add.particles(0, 0, 'spark', {
        speed: { min: 60, max: 180 }, lifespan: 350,
        scale: { start: 1, end: 0 }, emitting: false, quantity: 10,
        tint: [0x00fff5, 0x00cec9, 0xffffff]
      });
      this.trailEmitter = this.add.particles(0, 0, 'spark', {
        speed: { min: 10, max: 40 }, angle: { min: 160, max: 200 },
        lifespan: 300, scale: { start: 0.5, end: 0 },
        emitting: false, quantity: 2, tint: [0x00fff5, 0x6c5ce7]
      });

      // HUD
      this.scoreText = this.add.text(16, 14, 'ENERGY: 0', {
        fontSize: '20px', fill: '#00fff5', stroke: '#0f0c29', strokeThickness: 3
      }).setDepth(10);
      this.speedText = this.add.text(W - 16, 14, '1.0x', {
        fontSize: '15px', fill: '#ff69b4', stroke: '#0f0c29', strokeThickness: 3
      }).setOrigin(1, 0).setDepth(10);
      this.distText = this.add.text(W / 2, 14, '0m', {
        fontSize: '15px', fill: '#a29bfe', stroke: '#0f0c29', strokeThickness: 3
      }).setOrigin(0.5, 0).setDepth(10);
      this.msgText = this.add.text(W / 2, H / 2, '', {
        fontSize: '28px', fill: '#fff', stroke: '#0f0c29', strokeThickness: 4, align: 'center'
      }).setOrigin(0.5).setDepth(30).setVisible(false);

      // Input
      this.jumpKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
      this.upKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP);
      this.input.on('pointerdown', function() {
        if (this.gameOver) { this.scene.restart(); return; }
        this.tryJump();
      }.bind(this));

      // Spawn timers
      this.obsTimer = this.time.addEvent({
        delay: 1400, callback: this.spawnObstacle, callbackScope: this, loop: true
      });
      this.orbTimer = this.time.addEvent({
        delay: 900, callback: this.spawnPickups, callbackScope: this, loop: true
      });
    }

    tryJump() {
      if (this.gameOver) return;
      if (this.jumpCount < this.maxJumps) {
        this.player.setVelocityY(-430);
        this.jumpCount++;
        this.trailEmitter.emitParticleAt(this.player.x, this.player.y + 18);
      }
    }

    spawnObstacle() {
      if (this.gameOver) return;
      var type = Phaser.Math.Between(0, 2);
      var obs;
      if (type <= 1) {
        // Ground laser
        obs = this.obstacles.create(W + 20, GROUND_Y - 20, 'laser');
        obs.setDisplaySize(14, 40);
        obs.body.setSize(8, 36);
      } else {
        // Flying drone
        var flyY = Phaser.Math.Between(GROUND_Y - 100, GROUND_Y - 60);
        obs = this.obstacles.create(W + 30, flyY, 'drone');
        obs.setDisplaySize(40, 24);
        obs.body.setSize(32, 18);
        this.tweens.add({
          targets: obs, y: flyY - 15, duration: 600,
          yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });
      }
      obs.body.allowGravity = false;
      obs.body.immovable = true;
      obs.setVelocityX(-this.gameSpeed);
      obs.setDepth(4);
    }

    spawnPickups() {
      if (this.gameOver) return;
      var pattern = Phaser.Math.Between(0, 3);
      var baseX = W + 40;
      var isBolt = Math.random() < 0.25;
      var tex = isBolt ? 'bolt' : 'orb';
      var pts = isBolt ? 25 : 10;

      if (pattern === 0) {
        for (var i = 0; i < 4; i++) this.spawnOrb(baseX + i * 34, GROUND_Y - 50, tex, pts);
      } else if (pattern === 1) {
        for (var i = 0; i < 4; i++) this.spawnOrb(baseX + i * 30, GROUND_Y - 45 - i * 25, tex, pts);
      } else if (pattern === 2) {
        for (var i = 0; i < 5; i++) {
          var y = GROUND_Y - 65 - Math.abs(i - 2) * 22;
          this.spawnOrb(baseX + i * 28, y, tex, pts);
        }
      } else {
        this.spawnOrb(baseX, GROUND_Y - 110, 'bolt', 50);
      }
    }

    spawnOrb(x, y, tex, pts) {
      var c = this.pickups.create(x, y, tex);
      c.body.allowGravity = false;
      c.setVelocityX(-this.gameSpeed);
      c.setDepth(4);
      c.pts = pts;
      this.tweens.add({
        targets: c, y: y - 5, duration: 350,
        yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
      });
    }

    collectOrb(player, orb) {
      this.sparkEmitter.emitParticleAt(orb.x, orb.y);
      var pts = orb.pts || 10;
      orb.destroy();
      this.score += pts;
      this.scoreText.setText('ENERGY: ' + this.score);
      this.tweens.add({ targets: this.scoreText, scaleX: 1.15, scaleY: 1.15, duration: 70, yoyo: true });
    }

    hitObstacle(player, obs) {
      if (this.gameOver) return;
      this.gameOver = true;
      this.physics.pause();
      this.obsTimer.remove();
      this.orbTimer.remove();
      this.player.setTint(0xff0000);
      this.cameras.main.shake(250, 0.02);
      this.cameras.main.flash(200, 255, 0, 255, true);

      this.msgText.setText(
        'SYSTEM OFFLINE\nEnergy: ' + this.score +
        '\nDistance: ' + Math.floor(this.dist) + 'm' +
        '\nTap or SPACE to reboot'
      ).setVisible(true);
      this.input.keyboard.once('keydown-SPACE', function() { this.scene.restart(); }.bind(this));
    }

    drawCity() {
      var neonColors = [0x6c5ce7, 0xe84393, 0x00cec9];
      this.cityGfx.clear();
      for (var i = 0; i < this.buildings.length; i++) {
        var b = this.buildings[i];
        // Dark building
        this.cityGfx.fillStyle(0x1a1a2e, 0.8);
        this.cityGfx.fillRect(b.x, GROUND_Y - b.h, b.w, b.h);
        // Neon edge glow
        var nc = neonColors[b.hue];
        this.cityGfx.lineStyle(1, nc, 0.3);
        this.cityGfx.strokeRect(b.x, GROUND_Y - b.h, b.w, b.h);
        // Windows
        this.cityGfx.fillStyle(nc, 0.15);
        for (var wy = GROUND_Y - b.h + 8; wy < GROUND_Y - 6; wy += 14) {
          for (var wx = b.x + 4; wx < b.x + b.w - 4; wx += 10) {
            if (Math.random() < 0.6) this.cityGfx.fillRect(wx, wy, 5, 6);
          }
        }
      }
    }

    update(time, delta) {
      if (this.gameOver) return;

      // Jump input
      if (Phaser.Input.Keyboard.JustDown(this.jumpKey) || Phaser.Input.Keyboard.JustDown(this.upKey)) {
        this.tryJump();
      }

      // Distance and speed
      this.dist += (this.gameSpeed * delta) / 8000;
      this.distText.setText(Math.floor(this.dist) + 'm');
      this.gameSpeed = this.baseSpeed + Math.floor(this.dist / 25) * 5;
      this.speedText.setText((this.gameSpeed / this.baseSpeed).toFixed(1) + 'x');

      var delay = Math.max(600, 1400 - Math.floor(this.dist / 12) * 20);
      if (this.obsTimer) this.obsTimer.delay = delay;

      // Scroll ground
      this.groundSprite.tilePositionX += this.gameSpeed * delta / 1000;

      // Move obstacles and pickups
      this.obstacles.children.each(function(obs) {
        if (!obs || !obs.active) return;
        obs.setVelocityX(-this.gameSpeed);
        if (obs.x < -70) obs.destroy();
      }.bind(this));
      this.pickups.children.each(function(c) {
        if (!c || !c.active) return;
        c.body.velocity.x = -this.gameSpeed;
        if (c.x < -30) c.destroy();
      }.bind(this));

      // Parallax stars
      for (var i = 0; i < this.stars.length; i++) {
        this.stars[i].x -= this.gameSpeed * delta / 5000;
        if (this.stars[i].x < -5) this.stars[i].x = W + 5;
      }

      // Parallax city
      for (var i = 0; i < this.buildings.length; i++) {
        this.buildings[i].x -= this.gameSpeed * delta / 2500;
        if (this.buildings[i].x + this.buildings[i].w < -10) {
          this.buildings[i].x = W + Phaser.Math.Between(10, 60);
          this.buildings[i].h = Phaser.Math.Between(40, 180);
          this.buildings[i].w = Phaser.Math.Between(30, 70);
          this.buildings[i].hue = Phaser.Math.Between(0, 2);
        }
      }
      this.drawCity();

      // Robot trail effect while running
      if (this.player.body.touching.down && time % 80 < 16) {
        this.trailEmitter.emitParticleAt(this.player.x - 10, this.player.y + 14);
      }

      // Fell off screen
      if (this.player.y > H + 40) {
        this.hitObstacle(this.player, null);
      }
    }
  }

  new Phaser.Game({
    type: Phaser.AUTO, width: W, height: H,
    parent: 'game-container', backgroundColor: '#0f0c29',
    physics: { default: 'arcade', arcade: { gravity: { y: 800 }, debug: false } },
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: RunnerScene
  });
  </script>
</body>
</html>
