<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root {
      --game-primary: #00ffff;
      --game-secondary: #ff00ff;
      --game-bg: #0a0a20;
      --game-text: #fff;
      --game-accent: #ffd700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a20 0%, #1a0a30 50%, #0a1428 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden; touch-action: none;
    }
    #game-container { border-radius: 12px; overflow: hidden; box-shadow: 0 0 50px rgba(0,255,255,0.12), 0 0 100px rgba(255,0,255,0.06); }
    .hint {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.35); font-size: 13px; pointer-events: none;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.86.0/dist/phaser.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- GAME_TITLE -->Neon Dash<!-- /GAME_TITLE -->
  <!-- PLAYER_CHARACTER -->Robot Runner<!-- /PLAYER_CHARACTER -->
  <!-- OBSTACLES -->Lasers, Drones, Barriers, Saw Blades<!-- /OBSTACLES -->
  <div id="game-container"></div>
  <div class="hint">SPACE / UP = Jump &bull; DOWN = Slide &bull; Tap top/bottom on mobile</div>
  <script>
  (function() {
    var W = 800, H = 500;
    var GROUND_Y = 410;
    var LANE_FLOOR = GROUND_Y - 2;
    var SLIDE_HITBOX_H = 18;
    var PLAYER_X = 120;

    var ZONES = [
      { name: 'NEON CITY',    bg1: 0x0a0a20, bg2: 0x1a0a30, ground: 0x00ffff, accent: 0x00ffff, particle: 0x00fff5 },
      { name: 'MAGENTA GRID', bg1: 0x1a0020, bg2: 0x2a0040, ground: 0xff00ff, accent: 0xff69b4, particle: 0xff00ff },
      { name: 'SOLAR FLARE',  bg1: 0x1a1000, bg2: 0x2a1800, ground: 0xffa500, accent: 0xffd700, particle: 0xff6b35 },
      { name: 'DEEP SPACE',   bg1: 0x020210, bg2: 0x0a0a1e, ground: 0x6c5ce7, accent: 0xa29bfe, particle: 0x6c5ce7 },
      { name: 'EMERALD RUSH', bg1: 0x001a0a, bg2: 0x002a14, ground: 0x00ff88, accent: 0x55efc4, particle: 0x00ff88 }
    ];

    var PATTERNS = [
      [{ t: 'laser', d: 0 }],
      [{ t: 'drone', d: 0 }],
      [{ t: 'barrier', d: 0 }],
      [{ t: 'saw', d: 0 }],
      [{ t: 'laser', d: 0 }, { t: 'laser', d: 280 }],
      [{ t: 'laser', d: 0 }, { t: 'drone', d: 200 }],
      [{ t: 'drone', d: 0 }, { t: 'laser', d: 260 }],
      [{ t: 'barrier', d: 0 }, { t: 'laser', d: 300 }],
      [{ t: 'laser', d: 0 }, { t: 'barrier', d: 220 }, { t: 'laser', d: 440 }],
      [{ t: 'drone', d: 0 }, { t: 'drone', d: 200 }, { t: 'laser', d: 400 }],
      [{ t: 'saw', d: 0 }, { t: 'drone', d: 300 }],
      [{ t: 'laser', d: 0 }, { t: 'saw', d: 250 }, { t: 'barrier', d: 500 }]
    ];

    class RunnerScene extends Phaser.Scene {
      preload() {
        this.load.image('robot', '/assets/sprites/kenney-platformer/character_green_idle.png');
        this.load.image('orb', '/assets/sprites/kenney-platformer/coin_gold.png');
        this.load.image('spark', '/assets/sprites/common/particle.png');

        var g = this.make.graphics({ add: false });

        g.fillStyle(0x6c5ce7); g.fillRoundedRect(0, 6, 40, 14, 5);
        g.fillStyle(0x1e1e3a); g.fillRoundedRect(30, 2, 18, 14, 5);
        g.fillStyle(0x00fff5); g.fillRoundedRect(33, 5, 12, 8, 3);
        g.fillStyle(0xff6b35); g.fillRect(0, 16, 8, 5); g.fillRect(10, 18, 8, 4);
        g.generateTexture('robot-slide', 48, 22); g.clear();

        g.fillStyle(0x4a4a5e); g.fillRect(0, 0, 8, 44);
        g.fillStyle(0xff0040, 0.85); g.fillRect(8, 6, 5, 32);
        g.fillStyle(0xff0040); g.fillCircle(4, 4, 5); g.fillCircle(4, 40, 5);
        g.generateTexture('laser', 16, 44); g.clear();

        g.fillStyle(0x6c5ce7); g.fillEllipse(22, 14, 40, 18);
        g.fillStyle(0xa29bfe); g.fillEllipse(22, 12, 32, 12);
        g.fillStyle(0xff0000); g.fillCircle(14, 12, 3.5); g.fillCircle(30, 12, 3.5);
        g.generateTexture('drone', 44, 28); g.clear();

        g.fillStyle(0x4a4a5e); g.fillRect(0, 0, 60, 8);
        g.fillStyle(0x4a4a5e); g.fillRect(0, 0, 8, 36); g.fillRect(52, 0, 8, 36);
        g.fillStyle(0xff6b35, 0.7); g.fillRect(8, 4, 44, 4);
        g.generateTexture('barrier', 60, 40); g.clear();

        g.fillStyle(0xcccccc); g.fillCircle(16, 16, 12);
        g.fillStyle(0x999999); g.fillCircle(16, 16, 8);
        g.fillStyle(0xff0040); g.fillCircle(16, 16, 4);
        g.generateTexture('saw', 32, 32); g.clear();

        g.fillStyle(0xffd700, 0.3); g.fillCircle(12, 12, 12);
        g.fillStyle(0xffb700); g.fillCircle(12, 12, 8);
        g.lineStyle(3, 0xffffff);
        g.beginPath(); g.moveTo(14, 3); g.lineTo(9, 12); g.lineTo(14, 12);
        g.lineTo(10, 21); g.lineTo(16, 11); g.lineTo(12, 11); g.closePath(); g.strokePath();
        g.generateTexture('bolt', 24, 24); g.clear();

        g.fillStyle(0x00fff5, 0.2); g.fillCircle(14, 14, 14);
        g.lineStyle(3, 0x00fff5);
        g.beginPath(); g.moveTo(14, 2); g.lineTo(4, 8); g.lineTo(4, 16);
        g.lineTo(14, 26); g.lineTo(24, 16); g.lineTo(24, 8); g.closePath(); g.strokePath();
        g.generateTexture('shield-pu', 28, 28); g.clear();

        g.fillStyle(0xff0040, 0.2); g.fillCircle(14, 14, 14);
        g.fillStyle(0xff0040); g.fillRoundedRect(4, 6, 8, 18, 3); g.fillRoundedRect(16, 6, 8, 18, 3);
        g.fillStyle(0xcccccc); g.fillRoundedRect(4, 2, 20, 8, 4);
        g.generateTexture('magnet-pu', 28, 28); g.clear();

        g.fillStyle(0x12121e); g.fillRect(0, 0, 64, 90);
        g.fillStyle(0x00ffff); g.fillRect(0, 0, 64, 3);
        g.fillStyle(0x6c5ce7, 0.06);
        for (var gy = 14; gy < 90; gy += 16) g.fillRect(0, gy, 64, 1);
        for (var gx = 0; gx < 64; gx += 16) g.fillRect(gx, 7, 1, 83);
        g.generateTexture('ground-tile', 64, 90); g.clear();

        var cityW = 800, cityH = 200;
        g.fillStyle(0x0e0e1a, 0.9);
        for (var cx = 0; cx < cityW; cx += Phaser.Math.Between(35, 80)) {
          var bw = Phaser.Math.Between(25, 55); var bh = Phaser.Math.Between(30, 160);
          g.fillRect(cx, cityH - bh, bw, bh);
          g.fillStyle(0x6c5ce7, 0.12);
          for (var wy = cityH - bh + 6; wy < cityH - 4; wy += 12)
            for (var wx = cx + 3; wx < cx + bw - 3; wx += 8)
              if (Math.random() < 0.55) g.fillRect(wx, wy, 4, 5);
          g.fillStyle(0x0e0e1a, 0.9);
        }
        g.generateTexture('city-bg', cityW, cityH); g.clear();

        var nearW = 600, nearH = 120;
        g.fillStyle(0x16162a, 0.7);
        for (var px = 0; px < nearW; px += Phaser.Math.Between(50, 120)) {
          var pw = Phaser.Math.Between(8, 16); var ph = Phaser.Math.Between(30, 110);
          g.fillRect(px, nearH - ph, pw, ph);
          g.fillStyle(0x00fff5, 0.08); g.fillRect(px, nearH - ph, pw, 3);
          g.fillStyle(0x16162a, 0.7);
        }
        g.generateTexture('near-bg', nearW, nearH); g.clear();

        g.lineStyle(3, 0x00fff5, 0.6); g.strokeCircle(24, 28, 26);
        g.lineStyle(1, 0xffffff, 0.3); g.strokeCircle(24, 28, 22);
        g.generateTexture('shield-ring', 48, 56); g.clear();

        g.destroy();

        this.load.on('loaderror', (file) => {
          var c = document.createElement('canvas'); c.width = 64; c.height = 64;
          var ctx = c.getContext('2d');
          var grad = ctx.createRadialGradient(32, 28, 4, 32, 32, 24);
          grad.addColorStop(0, '#ff9ed8'); grad.addColorStop(1, '#d63384');
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.arc(32, 32, 24, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = '#a0204c'; ctx.lineWidth = 2; ctx.stroke();
          ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(24, 26, 4, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(40, 26, 4, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(25, 27, 2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(41, 27, 2, 0, Math.PI * 2); ctx.fill();
          this.textures.addCanvas(file.key, c);
        });
      }

      create() {
        this.score = 0;
        this.dist = 0;
        this.gameOver = false;
        this.baseSpeed = 260;
        this.gameSpeed = this.baseSpeed;
        this.jumpCount = 0;
        this.maxJumps = 2;
        this.isSliding = false;
        this.slideTimer = 0;
        this.shielded = false;
        this.shieldTimer = 0;
        this.magnetActive = false;
        this.magnetTimer = 0;
        this.currentZone = 0;
        this.bestDist = 0;
        this.bestScore = 0;
        this.comboCount = 0;
        this.comboTimer = 0;
        this.patternQueue = [];

        // Restore session-best from registry
        var saved = this.registry.get('bestDist');
        if (saved) this.bestDist = saved;
        var savedScore = this.registry.get('bestScore');
        if (savedScore) this.bestScore = savedScore;

        // --- Background layers (all tileSprites — no per-frame redraws) ---
        var zone = ZONES[0];
        this.bgGrad = this.add.graphics();
        this.drawBg(zone);

        this.starField = [];
        for (var i = 0; i < 70; i++) {
          var sc = Math.random() < 0.3 ? 0x00fff5 : (Math.random() < 0.5 ? 0xff69b4 : 0xffffff);
          var star = this.add.circle(
            Phaser.Math.Between(0, W), Phaser.Math.Between(0, GROUND_Y - 100),
            Phaser.Math.FloatBetween(0.5, 2), sc, Phaser.Math.FloatBetween(0.1, 0.5)
          );
          star.spd = Phaser.Math.FloatBetween(0.15, 0.5);
          this.starField.push(star);
        }

        this.cityBg = this.add.tileSprite(W / 2, GROUND_Y - 100, W, 200, 'city-bg').setAlpha(0.5).setDepth(1);
        this.nearBg = this.add.tileSprite(W / 2, GROUND_Y - 40, W, 120, 'near-bg').setAlpha(0.4).setDepth(2);

        // --- Ground ---
        this.groundTile = this.add.tileSprite(W / 2, GROUND_Y + 45, W, 90, 'ground-tile').setDepth(3);
        this.groundBody = this.add.rectangle(W / 2, GROUND_Y + 4, W, 8, 0x000000, 0);
        this.physics.add.existing(this.groundBody, true);

        // --- Player ---
        this.player = this.physics.add.sprite(PLAYER_X, LANE_FLOOR - 30, 'robot');
        this.player.setBounce(0);
        this.player.setGravityY(100);
        this.player.body.setSize(22, 42);
        this.player.body.setOffset(7, 4);
        this.player.setDepth(6);

        this.shieldSprite = this.add.image(PLAYER_X, LANE_FLOOR - 30, 'shield-ring').setDepth(7).setVisible(false).setAlpha(0.7);

        // --- Groups ---
        this.obstacles = this.physics.add.group();
        this.pickups = this.physics.add.group();
        this.powerups = this.physics.add.group();

        // --- Collisions ---
        this.physics.add.collider(this.player, this.groundBody, function() {
          this.jumpCount = 0;
          if (!this.isSliding) {
            this.player.setTexture('robot');
            this.player.body.setSize(22, 42);
            this.player.body.setOffset(7, 4);
          }
        }, null, this);

        this.physics.add.overlap(this.player, this.pickups, this.collectOrb, null, this);
        this.physics.add.overlap(this.player, this.obstacles, this.hitObstacle, null, this);
        this.physics.add.overlap(this.player, this.powerups, this.collectPowerup, null, this);

        // --- Particles ---
        this.sparkEmitter = this.add.particles(0, 0, 'spark', {
          speed: { min: 80, max: 220 }, lifespan: 400,
          scale: { start: 1.2, end: 0 }, emitting: false, quantity: 12,
          tint: [0x00fff5, 0x00cec9, 0xffffff]
        }).setDepth(8);

        this.trailEmitter = this.add.particles(0, 0, 'spark', {
          speed: { min: 10, max: 50 }, angle: { min: 150, max: 210 },
          lifespan: 350, scale: { start: 0.6, end: 0 },
          emitting: false, quantity: 1, tint: [0xff6b35, 0xffd700]
        }).setDepth(5);

        this.shieldBreakEmitter = this.add.particles(0, 0, 'spark', {
          speed: { min: 100, max: 300 }, lifespan: 500,
          scale: { start: 1.5, end: 0 }, emitting: false, quantity: 20,
          tint: [0x00fff5, 0x00cec9, 0x6c5ce7]
        }).setDepth(9);

        this.comboEmitter = this.add.particles(0, 0, 'spark', {
          speed: { min: 40, max: 100 }, angle: { min: 240, max: 300 },
          lifespan: 500, scale: { start: 0.8, end: 0 },
          emitting: false, quantity: 5, tint: [0xffd700, 0xffaa00]
        }).setDepth(8);

        // --- HUD ---
        this.scoreText = this.add.text(16, 12, 'ENERGY: 0', {
          fontSize: '22px', fontStyle: 'bold', fill: '#00fff5',
          stroke: '#0a0a20', strokeThickness: 4
        }).setDepth(20);

        this.distText = this.add.text(W / 2, 12, '0m', {
          fontSize: '16px', fill: '#a29bfe', stroke: '#0a0a20', strokeThickness: 3
        }).setOrigin(0.5, 0).setDepth(20);

        this.speedText = this.add.text(W - 16, 12, '1.0x', {
          fontSize: '14px', fill: '#ff69b4', stroke: '#0a0a20', strokeThickness: 3
        }).setOrigin(1, 0).setDepth(20);

        this.zoneText = this.add.text(W / 2, 38, ZONES[0].name, {
          fontSize: '13px', fill: '#00fff5', stroke: '#0a0a20', strokeThickness: 2
        }).setOrigin(0.5, 0).setDepth(20).setAlpha(0.6);

        this.comboText = this.add.text(PLAYER_X + 40, LANE_FLOOR - 80, '', {
          fontSize: '18px', fontStyle: 'bold', fill: '#ffd700',
          stroke: '#0a0a20', strokeThickness: 3
        }).setOrigin(0.5).setDepth(20).setVisible(false);

        this.powerupText = this.add.text(16, 40, '', {
          fontSize: '14px', fill: '#00fff5', stroke: '#0a0a20', strokeThickness: 3
        }).setDepth(20);

        this.msgText = this.add.text(W / 2, H / 2, '', {
          fontSize: '26px', fontStyle: 'bold', fill: '#fff',
          stroke: '#0a0a20', strokeThickness: 5, align: 'center', lineSpacing: 6
        }).setOrigin(0.5).setDepth(30).setVisible(false);

        // --- Input ---
        this.jumpKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        this.upKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP);
        this.downKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.DOWN);

        this.input.on('pointerdown', function(ptr) {
          if (this.gameOver) { this.scene.restart(); return; }
          if (ptr.y > H * 0.6) {
            this.startSlide();
          } else {
            this.tryJump();
          }
        }, this);

        // --- Spawn timers ---
        this.obsTimer = this.time.addEvent({
          delay: 1600, callback: this.spawnPattern, callbackScope: this, loop: true
        });
        this.orbTimer = this.time.addEvent({
          delay: 1000, callback: this.spawnPickups, callbackScope: this, loop: true
        });
        this.puTimer = this.time.addEvent({
          delay: 8000, callback: this.spawnPowerup, callbackScope: this, loop: true
        });
      }

      drawBg(zone) {
        this.bgGrad.clear();
        this.bgGrad.fillGradientStyle(zone.bg1, zone.bg1, zone.bg2, zone.bg2);
        this.bgGrad.fillRect(0, 0, W, H);
      }

      tryJump() {
        if (this.gameOver) return;
        if (this.isSliding) this.endSlide();
        if (this.jumpCount < this.maxJumps) {
          var force = this.jumpCount === 0 ? -480 : -380;
          this.player.setVelocityY(force);
          this.jumpCount++;
          this.trailEmitter.emitParticleAt(this.player.x, this.player.y + 20, this.jumpCount === 2 ? 4 : 2);
          if (this.jumpCount === 2) {
            this.cameras.main.shake(60, 0.005);
          }
        }
      }

      startSlide() {
        if (this.gameOver || this.isSliding) return;
        if (!this.player.body.touching.down) return;
        this.isSliding = true;
        this.slideTimer = 500;
        this.player.setTexture('robot-slide');
        this.player.body.setSize(44, SLIDE_HITBOX_H);
        this.player.body.setOffset(2, 4);
        this.player.y = LANE_FLOOR - SLIDE_HITBOX_H / 2 + 2;
      }

      endSlide() {
        if (!this.isSliding) return;
        this.isSliding = false;
        this.slideTimer = 0;
        this.player.setTexture('robot');
        this.player.body.setSize(22, 42);
        this.player.body.setOffset(7, 4);
      }

      spawnPattern() {
        if (this.gameOver) return;

        var diff = Math.min(Math.floor(this.dist / 200), 4);
        var available;
        if (diff < 1) {
          available = PATTERNS.slice(0, 4);
        } else if (diff < 2) {
          available = PATTERNS.slice(0, 7);
        } else if (diff < 3) {
          available = PATTERNS.slice(0, 10);
        } else {
          available = PATTERNS;
        }

        var pattern = Phaser.Utils.Array.GetRandom(available);
        for (var i = 0; i < pattern.length; i++) {
          var item = pattern[i];
          this.time.delayedCall(item.d * (240 / this.gameSpeed), function(type) {
            this.spawnSingleObstacle(type);
          }.bind(this), [item.t]);
        }
      }

      spawnSingleObstacle(type) {
        if (this.gameOver) return;
        var obs;
        switch (type) {
          case 'laser':
            obs = this.obstacles.create(W + 30, LANE_FLOOR - 22, 'laser');
            obs.body.setSize(10, 38);
            break;
          case 'drone':
            var dy = Phaser.Math.Between(LANE_FLOOR - 110, LANE_FLOOR - 70);
            obs = this.obstacles.create(W + 40, dy, 'drone');
            obs.body.setSize(36, 20);
            this.tweens.add({
              targets: obs, y: dy - 18, duration: 700,
              yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
            });
            break;
          case 'barrier':
            obs = this.obstacles.create(W + 40, LANE_FLOOR - 50, 'barrier');
            obs.body.setSize(52, 32);
            obs.body.setOffset(4, 4);
            break;
          case 'saw':
            obs = this.obstacles.create(W + 30, LANE_FLOOR - 16, 'saw');
            obs.body.setSize(24, 24);
            obs.body.setOffset(4, 4);
            obs.sawAngle = 0;
            break;
        }
        if (obs) {
          obs.body.allowGravity = false;
          obs.body.immovable = true;
          obs.setVelocityX(-this.gameSpeed);
          obs.setDepth(4);
          obs.obsType = type;
        }
      }

      spawnPickups() {
        if (this.gameOver) return;
        var baseX = W + 50;
        var isBolt = Math.random() < 0.18;
        var tex = isBolt ? 'bolt' : 'orb';
        var pts = isBolt ? 30 : 10;
        var pat = Phaser.Math.Between(0, 4);

        if (pat === 0) {
          for (var i = 0; i < 5; i++) this.makeOrb(baseX + i * 32, LANE_FLOOR - 45, tex, pts);
        } else if (pat === 1) {
          for (var i = 0; i < 5; i++) this.makeOrb(baseX + i * 30, LANE_FLOOR - 40 - i * 22, tex, pts);
        } else if (pat === 2) {
          for (var i = 0; i < 6; i++) {
            var y = LANE_FLOOR - 60 - Math.abs(i - 2.5) * 20;
            this.makeOrb(baseX + i * 28, y, tex, pts);
          }
        } else if (pat === 3) {
          for (var i = 0; i < 4; i++) this.makeOrb(baseX + i * 30, LANE_FLOOR - 100, tex, pts);
        } else {
          this.makeOrb(baseX, LANE_FLOOR - 120, 'bolt', 50);
        }
      }

      makeOrb(x, y, tex, pts) {
        var c = this.pickups.create(x, y, tex);
        c.body.allowGravity = false;
        c.setVelocityX(-this.gameSpeed);
        c.setDepth(4);
        c.pts = pts;
        c.baseY = y;
        this.tweens.add({
          targets: c, y: y - 6, duration: 400,
          yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });
      }

      spawnPowerup() {
        if (this.gameOver) return;
        var type = Math.random() < 0.5 ? 'shield-pu' : 'magnet-pu';
        var pu = this.powerups.create(W + 30, LANE_FLOOR - 90, type);
        pu.body.allowGravity = false;
        pu.setVelocityX(-this.gameSpeed);
        pu.setDepth(4);
        pu.puType = type;
        this.tweens.add({
          targets: pu, y: LANE_FLOOR - 100, duration: 600,
          yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });
        this.tweens.add({
          targets: pu, angle: 360, duration: 2000, repeat: -1
        });
      }

      collectOrb(player, orb) {
        var pts = orb.pts || 10;
        this.sparkEmitter.emitParticleAt(orb.x, orb.y);
        orb.destroy();
        this.comboCount++;
        this.comboTimer = 1200;
        var multiplier = Math.min(this.comboCount, 5);
        var finalPts = pts * multiplier;
        this.score += finalPts;
        this.scoreText.setText('ENERGY: ' + this.score);
        this.tweens.add({ targets: this.scoreText, scaleX: 1.12, scaleY: 1.12, duration: 60, yoyo: true });
        if (this.comboCount >= 3) {
          this.comboText.setText(this.comboCount + 'x COMBO!').setVisible(true).setAlpha(1);
          this.comboEmitter.emitParticleAt(player.x + 30, player.y - 20);
          this.tweens.add({ targets: this.comboText, alpha: 0, duration: 800, delay: 200 });
        }
      }

      collectPowerup(player, pu) {
        var type = pu.puType;
        this.sparkEmitter.emitParticleAt(pu.x, pu.y);
        pu.destroy();
        if (type === 'shield-pu') {
          this.shielded = true;
          this.shieldTimer = 6000;
          this.shieldSprite.setVisible(true);
        } else if (type === 'magnet-pu') {
          this.magnetActive = true;
          this.magnetTimer = 5000;
        }
        this.cameras.main.flash(150, 0, 255, 255, true);
      }

      hitObstacle(player, obs) {
        if (this.gameOver) return;
        if (this.shielded) {
          this.shielded = false;
          this.shieldTimer = 0;
          this.shieldSprite.setVisible(false);
          this.shieldBreakEmitter.emitParticleAt(player.x, player.y);
          this.cameras.main.shake(200, 0.015);
          if (obs) obs.destroy();
          return;
        }
        this.gameOver = true;
        this.physics.pause();
        if (this.obsTimer) this.obsTimer.remove();
        if (this.orbTimer) this.orbTimer.remove();
        if (this.puTimer) this.puTimer.remove();
        this.player.setTint(0xff0000);
        this.cameras.main.shake(300, 0.025);
        this.cameras.main.flash(250, 255, 0, 80, true);

        var finalDist = Math.floor(this.dist);
        var newBestDist = finalDist > this.bestDist;
        var newBestScore = this.score > this.bestScore;
        if (newBestDist) { this.bestDist = finalDist; this.registry.set('bestDist', finalDist); }
        if (newBestScore) { this.bestScore = this.score; this.registry.set('bestScore', this.score); }

        var lines = ['SYSTEM OFFLINE'];
        lines.push('Energy: ' + this.score + (newBestScore ? '  NEW BEST!' : '  Best: ' + this.bestScore));
        lines.push('Distance: ' + finalDist + 'm' + (newBestDist ? '  NEW BEST!' : '  Best: ' + this.bestDist + 'm'));
        lines.push('');
        lines.push('Tap or SPACE to reboot');

        this.msgText.setText(lines.join('\n')).setVisible(true);
        this.tweens.add({ targets: this.msgText, alpha: 1, duration: 300 });
        this.input.keyboard.once('keydown-SPACE', function() { this.scene.restart(); }, this);
      }

      update(time, delta) {
        if (this.gameOver) return;

        // --- Input ---
        if (Phaser.Input.Keyboard.JustDown(this.jumpKey) || Phaser.Input.Keyboard.JustDown(this.upKey)) {
          this.tryJump();
        }
        if (Phaser.Input.Keyboard.JustDown(this.downKey)) {
          this.startSlide();
        }

        // --- Slide timer ---
        if (this.isSliding) {
          this.slideTimer -= delta;
          if (this.slideTimer <= 0) this.endSlide();
        }

        // --- Shield timer ---
        if (this.shielded) {
          this.shieldTimer -= delta;
          this.shieldSprite.setPosition(this.player.x, this.player.y);
          this.shieldSprite.setAlpha(0.4 + 0.3 * Math.sin(time / 150));
          if (this.shieldTimer <= 0) {
            this.shielded = false;
            this.shieldSprite.setVisible(false);
          }
        }

        // --- Magnet timer + pull ---
        if (this.magnetActive) {
          this.magnetTimer -= delta;
          if (this.magnetTimer <= 0) this.magnetActive = false;
          var px = this.player.x, py = this.player.y;
          this.pickups.children.each(function(c) {
            if (!c || !c.active) return;
            var dx = px - c.x, dy = py - c.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 180) {
              var pull = 400 * (1 - dist / 180);
              c.body.velocity.x += (dx / dist) * pull * (delta / 1000);
              c.body.velocity.y += (dy / dist) * pull * (delta / 1000);
            }
          });
        }

        // --- Combo decay ---
        if (this.comboTimer > 0) {
          this.comboTimer -= delta;
          if (this.comboTimer <= 0) { this.comboCount = 0; this.comboText.setVisible(false); }
        }

        // --- Power-up HUD ---
        var puLines = [];
        if (this.shielded) puLines.push('SHIELD ' + Math.ceil(this.shieldTimer / 1000) + 's');
        if (this.magnetActive) puLines.push('MAGNET ' + Math.ceil(this.magnetTimer / 1000) + 's');
        this.powerupText.setText(puLines.join('  '));

        // --- Distance + speed curve ---
        this.dist += (this.gameSpeed * delta) / 7500;
        this.distText.setText(Math.floor(this.dist) + 'm');
        this.gameSpeed = this.baseSpeed + Math.min(Math.floor(this.dist / 20) * 4, 200);
        this.speedText.setText((this.gameSpeed / this.baseSpeed).toFixed(1) + 'x');

        var spawnDelay = Math.max(650, 1600 - Math.floor(this.dist / 10) * 15);
        if (this.obsTimer) this.obsTimer.delay = spawnDelay;

        // --- Zone transitions ---
        var newZone = Math.min(Math.floor(this.dist / 500), ZONES.length - 1);
        if (newZone !== this.currentZone) {
          this.currentZone = newZone;
          var zone = ZONES[newZone];
          this.drawBg(zone);
          this.zoneText.setText(zone.name).setAlpha(1);
          this.tweens.add({ targets: this.zoneText, alpha: 0.6, duration: 2000 });
          this.cameras.main.flash(300, 255, 255, 255, true);

          var gt = this.groundTile;
          this.tweens.add({ targets: gt, alpha: 0.3, duration: 200, yoyo: true, onComplete: function() { gt.setAlpha(1); } });
        }

        // --- Scroll parallax layers ---
        this.groundTile.tilePositionX += this.gameSpeed * delta / 1000;
        this.cityBg.tilePositionX += this.gameSpeed * delta / 4000;
        this.nearBg.tilePositionX += this.gameSpeed * delta / 2000;

        // Stars parallax
        for (var i = 0; i < this.starField.length; i++) {
          var st = this.starField[i];
          st.x -= this.gameSpeed * delta / 5000 * st.spd;
          if (st.x < -5) st.x = W + 5;
        }

        // --- Update obstacles ---
        this.obstacles.children.each(function(obs) {
          if (!obs || !obs.active) return;
          obs.setVelocityX(-this.gameSpeed);
          if (obs.obsType === 'saw') {
            obs.sawAngle = (obs.sawAngle || 0) + delta * 0.4;
            obs.setAngle(obs.sawAngle);
          }
          if (obs.x < -80) obs.destroy();
        }, this);

        // --- Update pickups ---
        this.pickups.children.each(function(c) {
          if (!c || !c.active) return;
          if (!this.magnetActive) c.body.velocity.x = -this.gameSpeed;
          if (c.x < -40) c.destroy();
        }, this);

        // --- Update powerups ---
        this.powerups.children.each(function(p) {
          if (!p || !p.active) return;
          p.setVelocityX(-this.gameSpeed);
          if (p.x < -40) p.destroy();
        }, this);

        // --- Boot trail ---
        if (this.player.body.touching.down && !this.isSliding) {
          if (time % 100 < delta) {
            this.trailEmitter.emitParticleAt(this.player.x - 12, this.player.y + 22, 2);
          }
        }

        // --- Fell off screen ---
        if (this.player.y > H + 50) {
          this.hitObstacle(this.player, null);
        }
      }
    }

    new Phaser.Game({
      type: Phaser.AUTO, width: W, height: H,
      parent: 'game-container', backgroundColor: '#0a0a20',
      physics: { default: 'arcade', arcade: { gravity: { y: 900 }, debug: false } },
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
      scene: RunnerScene
    });
  })();
  </script>
