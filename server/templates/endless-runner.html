<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff6b35 0%, #f7c948 50%, #1a1a2e 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden; touch-action: none;
    }
    #game-container { border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.86.0/dist/phaser.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="game-container"></div>
  <script>
  var W = 800, H = 500;
  var GROUND_Y = 430;
  var GROUND_H = 70;

  class RunnerScene extends Phaser.Scene {
    preload() {
      var g = this.make.graphics({ add: false });

      // Player (orange character with face and legs)
      g.fillStyle(0xff6b35); g.fillRoundedRect(4, 6, 24, 26, 5);
      g.fillStyle(0xffeaa7); g.fillCircle(16, 8, 9);
      g.fillStyle(0x2d3436); g.fillCircle(12, 7, 2); g.fillCircle(20, 7, 2);
      g.fillStyle(0xe17055); g.fillRect(13, 12, 6, 2);
      g.fillStyle(0xf7c948); g.fillRect(6, 18, 8, 4); g.fillRect(18, 18, 8, 4);
      g.fillStyle(0x2d3436); g.fillRoundedRect(8, 30, 6, 6, 2); g.fillRoundedRect(18, 30, 6, 6, 2);
      g.generateTexture('player', 32, 38); g.clear();

      // Obstacle — crate
      g.fillStyle(0x8d6e63); g.fillRoundedRect(2, 2, 28, 28, 3);
      g.fillStyle(0x6d4c41); g.fillRect(6, 6, 20, 20);
      g.lineStyle(2, 0xa0522d); g.lineBetween(6, 6, 26, 26); g.lineBetween(26, 6, 6, 26);
      g.generateTexture('crate', 32, 32); g.clear();

      // Tall obstacle — spiky
      g.fillStyle(0xe74c3c); g.fillRect(6, 10, 20, 38);
      g.fillStyle(0xc0392b);
      g.fillTriangle(16, 0, 6, 14, 26, 14);
      g.fillTriangle(8, 8, 0, 20, 16, 20);
      g.fillTriangle(24, 8, 16, 20, 32, 20);
      g.generateTexture('spike', 32, 48); g.clear();

      // Coin
      g.fillStyle(0xffd700); g.fillCircle(10, 10, 10);
      g.fillStyle(0xffa502); g.fillCircle(10, 10, 7);
      g.fillStyle(0xffe066); g.fillCircle(8, 8, 3);
      g.generateTexture('coin', 20, 20); g.clear();

      // Ground tile
      g.fillStyle(0x8B4513); g.fillRect(0, 0, 64, GROUND_H);
      g.fillStyle(0x2ecc71); g.fillRect(0, 0, 64, 10);
      g.fillStyle(0x27ae60); g.fillRect(0, 8, 64, 6);
      g.fillStyle(0xa0522d, 0.5); g.fillRect(12, 22, 8, 6); g.fillRect(40, 34, 10, 5);
      g.generateTexture('ground-tile', 64, GROUND_H); g.clear();

      // Particle
      g.fillStyle(0xffffff); g.fillCircle(4, 4, 4);
      g.generateTexture('particle', 8, 8);

      g.destroy();
    }

    create() {
      this.score = 0;
      this.gameOver = false;
      this.baseSpeed = 240;
      this.gameSpeed = this.baseSpeed;
      this.jumpCount = 0;
      this.maxJumps = 2;
      this.distanceTraveled = 0;

      // Background
      var bg = this.add.graphics();
      bg.fillGradientStyle(0x1a1a2e, 0x1a1a2e, 0x2d1b69, 0x2d1b69);
      bg.fillRect(0, 0, W, H);

      // Stars
      this.bgStars = [];
      for (var i = 0; i < 50; i++) {
        var star = this.add.circle(
          Phaser.Math.Between(0, W), Phaser.Math.Between(0, GROUND_Y - 60),
          Phaser.Math.Between(1, 2), 0xffffff, Phaser.Math.FloatBetween(0.2, 0.7)
        );
        this.bgStars.push(star);
      }

      // Parallax city silhouette
      this.cityGfx = this.add.graphics();
      this.cityBuildings = [];
      for (var x = 0; x < W + 200; x += Phaser.Math.Between(50, 110)) {
        var bh = Phaser.Math.Between(50, 160);
        var bw = Phaser.Math.Between(35, 65);
        this.cityBuildings.push({ x: x, w: bw, h: bh });
      }
      this.drawCity();

      // Ground — use tileSprite for smooth scrolling
      this.groundSprite = this.add.tileSprite(W / 2, GROUND_Y + GROUND_H / 2, W, GROUND_H, 'ground-tile');

      // Invisible static platform for physics
      this.groundBody = this.physics.add.staticImage(W / 2, GROUND_Y + 4);
      this.groundBody.setDisplaySize(W, 8).setVisible(false).refreshBody();

      // Player
      this.player = this.physics.add.sprite(100, GROUND_Y - 30, 'player');
      this.player.setBounce(0);
      this.player.setGravityY(200);
      this.player.body.setSize(22, 32);
      this.player.body.setOffset(5, 4);
      this.player.setDepth(5);

      // Groups
      this.obstacles = this.physics.add.group();
      this.coins = this.physics.add.group();

      // Collisions
      this.physics.add.collider(this.player, this.groundBody, function() {
        this.jumpCount = 0;
      }.bind(this));
      this.physics.add.overlap(this.player, this.coins, this.collectCoin, null, this);
      this.physics.add.overlap(this.player, this.obstacles, this.hitObstacle, null, this);

      // Particles
      this.sparkEmitter = this.add.particles(0, 0, 'particle', {
        speed: { min: 50, max: 150 }, lifespan: 300,
        scale: { start: 1, end: 0 }, emitting: false, quantity: 8,
        tint: [0xffd700, 0xffa502, 0xf7c948]
      });
      this.dustEmitter = this.add.particles(0, 0, 'particle', {
        speed: { min: 20, max: 60 }, angle: { min: 200, max: 340 },
        lifespan: 400, scale: { start: 0.6, end: 0 },
        emitting: false, quantity: 3, tint: [0x8B4513, 0xa0522d]
      });

      // HUD
      this.scoreText = this.add.text(16, 16, 'Score: 0', {
        fontSize: '22px', fill: '#f7c948', stroke: '#1a1a2e', strokeThickness: 3
      }).setDepth(10);
      this.speedText = this.add.text(W - 16, 16, '1.0x', {
        fontSize: '16px', fill: '#ff6b35', stroke: '#1a1a2e', strokeThickness: 3
      }).setOrigin(1, 0).setDepth(10);
      this.distText = this.add.text(W / 2, 16, '0m', {
        fontSize: '16px', fill: '#fff', stroke: '#1a1a2e', strokeThickness: 3
      }).setOrigin(0.5, 0).setDepth(10);
      this.msgText = this.add.text(W / 2, H / 2, '', {
        fontSize: '32px', fill: '#fff', stroke: '#1a1a2e', strokeThickness: 4, align: 'center'
      }).setOrigin(0.5).setDepth(30).setVisible(false);

      // Input — keyboard
      this.jumpKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
      this.upKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP);

      // Input — touch/click
      this.input.on('pointerdown', function(ptr) {
        if (this.gameOver) { this.scene.restart(); return; }
        this.tryJump();
      }.bind(this));

      // Spawn timers
      this.obstacleTimer = this.time.addEvent({
        delay: 1500, callback: this.spawnObstacle, callbackScope: this, loop: true
      });
      this.coinTimer = this.time.addEvent({
        delay: 1000, callback: this.spawnCoinGroup, callbackScope: this, loop: true
      });
    }

    tryJump() {
      if (this.gameOver) return;
      if (this.jumpCount < this.maxJumps) {
        this.player.setVelocityY(-420);
        this.jumpCount++;
        this.dustEmitter.emitParticleAt(this.player.x, this.player.y + 16);
      }
    }

    spawnObstacle() {
      if (this.gameOver) return;
      var type = Phaser.Math.Between(0, 1);
      var obs;
      if (type === 0) {
        obs = this.obstacles.create(W + 30, GROUND_Y - 16, 'crate');
        obs.body.setSize(26, 28);
      } else {
        obs = this.obstacles.create(W + 30, GROUND_Y - 24, 'spike');
        obs.setDisplaySize(32, 48);
        obs.body.setSize(20, 40);
      }
      obs.body.allowGravity = false;
      obs.body.immovable = true;
      obs.setVelocityX(-this.gameSpeed);
      obs.setDepth(4);
    }

    spawnCoinGroup() {
      if (this.gameOver) return;
      var pattern = Phaser.Math.Between(0, 2);
      var baseX = W + 40;
      if (pattern === 0) {
        for (var i = 0; i < 3; i++) this.spawnSingleCoin(baseX + i * 36, GROUND_Y - 40);
      } else if (pattern === 1) {
        for (var i = 0; i < 3; i++) this.spawnSingleCoin(baseX + i * 30, GROUND_Y - 40 - i * 28);
      } else {
        for (var i = 0; i < 5; i++) {
          var y = GROUND_Y - 60 - Math.abs(i - 2) * 24;
          this.spawnSingleCoin(baseX + i * 28, y);
        }
      }
    }

    spawnSingleCoin(x, y) {
      var c = this.coins.create(x, y, 'coin');
      c.body.allowGravity = false;
      c.setVelocityX(-this.gameSpeed);
      c.setDepth(4);
      this.tweens.add({
        targets: c, y: y - 6, duration: 400,
        yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
      });
    }

    collectCoin(player, coin) {
      this.sparkEmitter.emitParticleAt(coin.x, coin.y);
      coin.destroy();
      this.score += 10;
      this.scoreText.setText('Score: ' + this.score);
      this.tweens.add({ targets: this.scoreText, scaleX: 1.2, scaleY: 1.2, duration: 80, yoyo: true });
    }

    hitObstacle(player, obstacle) {
      if (this.gameOver) return;
      this.gameOver = true;
      this.physics.pause();
      this.obstacleTimer.remove();
      this.coinTimer.remove();
      this.player.setTint(0xff0000);
      this.cameras.main.shake(250, 0.02);

      this.msgText.setText(
        'GAME OVER\nScore: ' + this.score +
        '\nDistance: ' + Math.floor(this.distanceTraveled) + 'm' +
        '\nTap or SPACE to retry'
      ).setVisible(true);
      this.input.keyboard.once('keydown-SPACE', function() { this.scene.restart(); }.bind(this));
    }

    drawCity() {
      this.cityGfx.clear();
      for (var i = 0; i < this.cityBuildings.length; i++) {
        var b = this.cityBuildings[i];
        this.cityGfx.fillStyle(0x16213e, 0.6);
        this.cityGfx.fillRect(b.x, GROUND_Y - b.h, b.w, b.h);
        this.cityGfx.fillStyle(0xf7c948, 0.2);
        for (var wy = GROUND_Y - b.h + 8; wy < GROUND_Y - 6; wy += 16) {
          for (var wx = b.x + 5; wx < b.x + b.w - 5; wx += 12) {
            this.cityGfx.fillRect(wx, wy, 5, 7);
          }
        }
      }
    }

    update(time, delta) {
      if (this.gameOver) return;

      // Jump input
      if (Phaser.Input.Keyboard.JustDown(this.jumpKey) || Phaser.Input.Keyboard.JustDown(this.upKey)) {
        this.tryJump();
      }

      // Distance and speed progression
      this.distanceTraveled += (this.gameSpeed * delta) / 8000;
      this.distText.setText(Math.floor(this.distanceTraveled) + 'm');
      this.gameSpeed = this.baseSpeed + Math.floor(this.distanceTraveled / 20) * 4;
      this.speedText.setText((this.gameSpeed / this.baseSpeed).toFixed(1) + 'x');

      // Speed up spawn rate with distance
      var delay = Math.max(700, 1500 - Math.floor(this.distanceTraveled / 10) * 25);
      if (this.obstacleTimer) this.obstacleTimer.delay = delay;

      // Scroll ground
      this.groundSprite.tilePositionX += this.gameSpeed * delta / 1000;

      // Scroll obstacles and coins
      this.obstacles.children.each(function(obs) {
        if (!obs || !obs.active) return;
        obs.setVelocityX(-this.gameSpeed);
        if (obs.x < -60) obs.destroy();
      }.bind(this));
      this.coins.children.each(function(c) {
        if (!c || !c.active) return;
        c.body.velocity.x = -this.gameSpeed;
        if (c.x < -30) c.destroy();
      }.bind(this));

      // Parallax stars
      for (var i = 0; i < this.bgStars.length; i++) {
        this.bgStars[i].x -= this.gameSpeed * delta / 5000;
        if (this.bgStars[i].x < -5) this.bgStars[i].x = W + 5;
      }

      // Parallax city
      for (var i = 0; i < this.cityBuildings.length; i++) {
        this.cityBuildings[i].x -= this.gameSpeed * delta / 3000;
        if (this.cityBuildings[i].x + this.cityBuildings[i].w < -10) {
          this.cityBuildings[i].x = W + Phaser.Math.Between(10, 80);
          this.cityBuildings[i].h = Phaser.Math.Between(50, 160);
          this.cityBuildings[i].w = Phaser.Math.Between(35, 65);
        }
      }
      this.drawCity();

      // Running dust
      if (this.player.body.touching.down && time % 120 < 20) {
        this.dustEmitter.emitParticleAt(this.player.x - 8, this.player.y + 16);
      }

      // Player fell off screen
      if (this.player.y > H + 30) {
        this.hitObstacle(this.player, null);
      }
    }
  }

  new Phaser.Game({
    type: Phaser.AUTO, width: W, height: H,
    parent: 'game-container', backgroundColor: '#1a1a2e',
    physics: { default: 'arcade', arcade: { gravity: { y: 800 }, debug: false } },
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: RunnerScene
  });
  </script>
</body>
</html>
