<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }
    #game-container {
      min-width: 320px;
      min-height: 200px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #error-msg { display: none; color: #fff; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 8px; margin: 20px; }
    #error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="error-msg"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.70.0/phaser.min.js" crossorigin="anonymous"></script>
  <script>
    (function() {
      const errEl = document.getElementById('error-msg');
      function showErr(msg) { errEl.textContent = msg; errEl.classList.add('visible'); }

      if (typeof Phaser === 'undefined') {
        showErr('Phaser failed to load. Check your internet connection.');
        return;
      }

      let player, cursors, coins, enemies, platforms, scoreText, score = 0, gameOver = false;
      let touchLeft = false, touchRight = false, touchJump = false;

      function preload() {
        this.load.image('player', '/assets/sprites/kenney-platformer/character_green_idle.png');
        this.load.image('ground', '/assets/sprites/kenney-platformer/terrain_grass_block.png');
        this.load.image('platform', '/assets/sprites/kenney-platformer/block_plank.png');
        this.load.image('coin', '/assets/sprites/kenney-platformer/coin_gold.png');
        this.load.image('enemy', '/assets/sprites/kenney-platformer/slime_normal_rest.png');
        this.load.image('bgSky', '/assets/sprites/kenney-platformer/background_solid_sky.png');
        this.load.image('bgHills', '/assets/sprites/kenney-platformer/background_color_hills.png');
      }

      function create() {
        this.physics.world.setBounds(0, 0, 2400, 500);
        this.add.tileSprite(0, 0, 2400, 500, 'bgSky').setOrigin(0);
        this.add.tileSprite(0, 0, 2400, 500, 'bgHills').setOrigin(0);

        var tex = this.textures.get('ground');
        var f = tex && (tex.frames['__BASE'] || tex.frames[Object.keys(tex.frames)[0]]);
        var gw = f ? f.cutWidth : 70;
        var gh = f ? f.cutHeight : 70;

        platforms = this.physics.add.staticGroup();
        for (var x = 0; x < 2400; x += gw) {
          platforms.create(x + gw / 2, 500 - gh / 2, 'ground');
        }
        [[200,380],[400,300],[600,350],[750,250],[1000,320],[1200,260],
         [1400,380],[1600,300],[1800,250],[2000,340],[2200,280]
        ].forEach(function(p) {
          var plat = platforms.create(p[0], p[1], 'platform');
          plat.setDisplaySize(96, 24);
          plat.refreshBody();
        });

        player = this.physics.add.sprite(100, 400, 'player');
        player.setDisplaySize(48, 48);
        player.body.setSize(48, 48);
        player.setCollideWorldBounds(true);
        player.setBounce(0.1);

        coins = this.physics.add.group();
        [[200,340],[400,260],[600,310],[750,210],[1000,280],[1200,220],[1400,340],
         [1600,260],[1800,210],[2000,300],[2200,240],[300,440],[550,440],
         [900,440],[1300,440],[1700,440],[2100,440]
        ].forEach(function(c) {
          var coin = coins.create(c[0], c[1], 'coin');
          coin.setDisplaySize(28, 28);
          coin.body.setSize(28, 28);
          coin.setBounceY(0.3);
        });

        enemies = this.physics.add.group();
        [[380,270,340,460],[730,220,690,810],[1180,230,1140,1260],
         [1580,270,1540,1660],[1980,310,1940,2060]
        ].forEach(function(e) {
          var enemy = enemies.create(e[0], e[1], 'enemy');
          enemy.setDisplaySize(36, 36);
          enemy.body.setSize(36, 36);
          enemy.setCollideWorldBounds(true);
          enemy.setBounce(1, 0);
          enemy.setVelocityX(60);
          enemy.patrolMin = e[2];
          enemy.patrolMax = e[3];
        });

        this.physics.add.collider(player, platforms);
        this.physics.add.collider(coins, platforms);
        this.physics.add.collider(enemies, platforms);
        this.physics.add.overlap(player, coins, collectCoin, null, this);
        this.physics.add.overlap(player, enemies, hitEnemy, null, this);

        scoreText = this.add.text(16, 16, 'Score: 0', {
          fontSize: '22px', fontFamily: 'Segoe UI', fill: '#fff', stroke: '#333', strokeThickness: 3
        }).setScrollFactor(0).setDepth(10);

        this.cameras.main.setBounds(0, 0, 2400, 500);
        this.cameras.main.startFollow(player, true, 0.08, 0.08);

        var kb = this.input.keyboard;
        cursors = kb ? kb.createCursorKeys() : null;
        if (kb) {
          kb.on('keydown-SPACE', function() {
            if (gameOver) { gameOver = false; score = 0; this.scene.restart(); }
          }.bind(this));
        }
        if (this.game.canvas) {
          this.game.canvas.tabIndex = 1;
          this.game.canvas.style.outline = 'none';
        }
        this.input.on('pointerdown', function() {
          if (this.game.canvas && document.activeElement !== this.game.canvas) {
            this.game.canvas.focus();
          }
        }, this);

        var bw = 72, bh = 72, ba = 0.35, bd = 2000;
        var btnL = this.add.rectangle(60, 440, bw, bh, 0xffffff, ba).setScrollFactor(0).setDepth(bd).setInteractive({ useHandCursor: true });
        var btnR = this.add.rectangle(160, 440, bw, bh, 0xffffff, ba).setScrollFactor(0).setDepth(bd).setInteractive({ useHandCursor: true });
        var btnJ = this.add.rectangle(700, 440, bw, bh, 0xffffff, ba).setScrollFactor(0).setDepth(bd).setInteractive({ useHandCursor: true });
        this.add.text(60, 440, '\u25C0', { fontSize: '32px', fill: '#fff', stroke: '#333', strokeThickness: 2 }).setOrigin(0.5).setScrollFactor(0).setDepth(bd + 1);
        this.add.text(160, 440, '\u25B6', { fontSize: '32px', fill: '#fff', stroke: '#333', strokeThickness: 2 }).setOrigin(0.5).setScrollFactor(0).setDepth(bd + 1);
        this.add.text(700, 440, '\u25B2', { fontSize: '32px', fill: '#fff', stroke: '#333', strokeThickness: 2 }).setOrigin(0.5).setScrollFactor(0).setDepth(bd + 1);
        btnL.on('pointerdown', function() { touchLeft = true; });
        btnL.on('pointerup', function() { touchLeft = false; });
        btnL.on('pointerout', function() { touchLeft = false; });
        btnR.on('pointerdown', function() { touchRight = true; });
        btnR.on('pointerup', function() { touchRight = false; });
        btnR.on('pointerout', function() { touchRight = false; });
        btnJ.on('pointerdown', function() { touchJump = true; });
        btnJ.on('pointerup', function() { touchJump = false; });
        btnJ.on('pointerout', function() { touchJump = false; });
        this.input.on('pointerdown', function() {
          if (gameOver) { gameOver = false; score = 0; this.scene.restart(); }
        }.bind(this));
      }

      function update() {
        if (gameOver) return;
        var left = cursors && cursors.left.isDown;
        var right = cursors && cursors.right.isDown;
        var up = cursors && cursors.up.isDown;
        if (left || touchLeft) { player.setVelocityX(-200); player.setFlipX(true); }
        else if (right || touchRight) { player.setVelocityX(200); player.setFlipX(false); }
        else { player.setVelocityX(0); }
        if ((up || touchJump) && player.body.touching.down) {
          player.setVelocityY(-420);
          touchJump = false;
        }
        enemies.children.iterate(function(e) {
          if (!e || !e.active) return;
          if (e.x <= e.patrolMin) e.setVelocityX(60);
          else if (e.x >= e.patrolMax) e.setVelocityX(-60);
        });
      }

      function collectCoin(p, coin) {
        coin.destroy();
        score += 10;
        scoreText.setText('Score: ' + score);
        var sparkle = this.add.circle(coin.x, coin.y, 10, 0xffd700);
        this.tweens.add({ targets: sparkle, scale: 2, alpha: 0, duration: 300, onComplete: function() { sparkle.destroy(); } });
        if (coins.countActive(true) === 0) {
          scoreText.setText('YOU WIN! Score: ' + score + '\nPress SPACE');
          gameOver = true;
        }
      }

      function hitEnemy(p, enemy) {
        this.physics.pause();
        player.setTint(0xff0000);
        scoreText.setText('GAME OVER! Score: ' + score + '\nPress SPACE');
        gameOver = true;
      }

      try {
        var config = {
          type: Phaser.CANVAS,
          width: 800,
          height: 500,
          parent: 'game-container',
          backgroundColor: '#87CEEB',
          physics: { default: 'arcade', arcade: { gravity: { y: 800 }, debug: false } },
          scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
          scene: { preload: preload, create: create, update: update }
        };
        new Phaser.Game(config);
      } catch (e) {
        showErr('Error: ' + (e.message || String(e)));
      }
    })();
  </script>
</body>
</html>
