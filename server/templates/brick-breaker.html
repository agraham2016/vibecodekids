<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root {
      --game-primary: #00ffff;
      --game-secondary: #ff00ff;
      --game-bg: #0a0a2e;
      --game-text: #ffffff;
      --game-accent: #ff0055;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #05051a 0%, #0a0a2e 50%, #0f0a2a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }
    #game-container {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.25), 0 0 80px rgba(255, 0, 255, 0.12);
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.86.0/dist/phaser.min.js" crossorigin="anonymous"></script>
  <script>
    const W = 800, H = 500;
    const PADDLE_W = 100, PADDLE_H = 14;
    const BALL_R = 7;
    const BRICK_W = 72, BRICK_H = 20, BRICK_PAD = 4;
    const COLS = 10, ROWS = 6;
    const BALL_SPEED = 300;

    const BRICK_COLORS = [0xff0055, 0xff6600, 0xffee00, 0x00ff66, 0x00ddff, 0xcc44ff];
    const BRICK_HP =     [3,        2,        2,        1,        1,        1];
    const BRICK_SCORE =  [50,       40,       30,       20,       15,       10];

    let paddle, balls, bricks, powerups;
    let cursors, score, lives, levelNum;
    let scoreText, livesText, msgText, levelText;
    let gameState, ballOnPaddle;
    let goPanel;

    const config = {
      type: Phaser.AUTO,
      width: W,
      height: H,
      parent: 'game-container',
      backgroundColor: '#0a0a2e',
      physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false, checkCollision: { down: false } } },
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
      scene: { preload, create, update }
    };

    function preload() {
      const g = this.make.graphics({ add: false });

      // Paddle: sleek metallic chrome with neon cyan trim
      g.fillStyle(0x00ffff, 0.3);
      g.fillRoundedRect(0, 0, PADDLE_W, PADDLE_H, 7);
      g.fillStyle(0x3a4a6a);
      g.fillRoundedRect(1, 1, PADDLE_W - 2, PADDLE_H - 2, 6);
      g.fillStyle(0x5a6a8a);
      g.fillRoundedRect(2, 2, PADDLE_W - 4, 6, 4);
      g.fillStyle(0x7a8aaa);
      g.fillRoundedRect(4, 2, PADDLE_W - 8, 3, 2);
      g.fillStyle(0x00ffff, 0.7);
      g.fillRect(8, 0, PADDLE_W - 16, 1);
      g.generateTexture('paddle', PADDLE_W, PADDLE_H);
      g.clear();

      // Ball: glowing cyan/white orb
      g.fillStyle(0x00aaff);
      g.fillCircle(BALL_R, BALL_R, BALL_R);
      g.fillStyle(0x44ddff);
      g.fillCircle(BALL_R, BALL_R, BALL_R - 1);
      g.fillStyle(0xaaeeff);
      g.fillCircle(BALL_R, BALL_R, BALL_R - 3);
      g.fillStyle(0xffffff);
      g.fillCircle(BALL_R, BALL_R, BALL_R - 4);
      g.fillStyle(0xffffff, 0.9);
      g.fillCircle(BALL_R - 2, BALL_R - 2, 2);
      g.generateTexture('ball', BALL_R * 2, BALL_R * 2);
      g.clear();

      // Brick: white base with bevel for tinting — bright edge, slightly darker center
      g.fillStyle(0xffffff);
      g.fillRoundedRect(0, 0, BRICK_W, BRICK_H, 4);
      g.fillStyle(0xcccccc);
      g.fillRoundedRect(2, 2, BRICK_W - 4, BRICK_H - 4, 3);
      g.fillStyle(0xffffff, 0.45);
      g.fillRoundedRect(3, 2, BRICK_W - 6, (BRICK_H - 4) / 2, 2);
      g.generateTexture('brick', BRICK_W, BRICK_H);
      g.clear();

      // Powerup: neon glowing orb
      g.fillStyle(0xffffff, 0.2);
      g.fillCircle(10, 10, 10);
      g.fillStyle(0xffffff, 0.5);
      g.fillCircle(10, 10, 7);
      g.fillStyle(0xffffff);
      g.fillCircle(10, 10, 4);
      g.fillStyle(0xffffff, 0.85);
      g.fillCircle(9, 9, 2);
      g.generateTexture('powerup', 20, 20);
      g.clear();

      // Particle: small bright dot
      g.fillStyle(0xffffff, 0.6);
      g.fillCircle(4, 4, 4);
      g.fillStyle(0xffffff);
      g.fillCircle(4, 4, 3);
      g.generateTexture('particle', 8, 8);
      g.clear();

      g.destroy();
    }

    function create() {
      const bg = this.add.graphics();
      bg.fillStyle(0x0a0a2e);
      bg.fillRect(0, 0, W, H);

      bg.lineStyle(1, 0x141440, 0.35);
      for (let x = 0; x <= W; x += 40) {
        bg.moveTo(x, 0);
        bg.lineTo(x, H);
      }
      for (let y = 0; y <= H; y += 40) {
        bg.moveTo(0, y);
        bg.lineTo(W, y);
      }
      bg.strokePath();

      const starColors = [0x00ffff, 0xff00ff, 0xff0055, 0x00ff66, 0xffee00];
      for (let i = 0; i < 40; i++) {
        bg.fillStyle(starColors[i % starColors.length], Phaser.Math.FloatBetween(0.04, 0.15));
        bg.fillCircle(
          Phaser.Math.Between(0, W),
          Phaser.Math.Between(0, H),
          Phaser.Math.Between(1, 2)
        );
      }

      score = 0;
      lives = 1;
      levelNum = 1;
      gameState = 'playing';

      paddle = this.physics.add.sprite(W / 2, H - 36, 'paddle');
      paddle.setImmovable(true);
      paddle.setCollideWorldBounds(true);
      paddle.body.allowGravity = false;

      balls = this.physics.add.group();
      bricks = this.physics.add.staticGroup();
      powerups = this.physics.add.group();

      buildLevel(this);
      spawnBall(this, true);

      this.physics.add.collider(balls, paddle, hitPaddle, null, this);
      this.physics.add.collider(balls, bricks, hitBrick, null, this);
      this.physics.add.overlap(powerups, paddle, collectPowerup, null, this);

      scoreText = this.add.text(12, H - 24, 'Score: 0', {
        fontSize: '16px', fontFamily: 'Segoe UI', fill: '#00ffff', stroke: '#000', strokeThickness: 2
      }).setDepth(10);

      livesText = this.add.text(W - 12, H - 24, '', {
        fontSize: '16px', fontFamily: 'Segoe UI', fill: '#ff0055', stroke: '#000', strokeThickness: 2
      }).setOrigin(1, 0).setDepth(10);

      levelText = this.add.text(W / 2, H - 24, 'Level 1', {
        fontSize: '16px', fontFamily: 'Segoe UI', fill: '#ffee00', stroke: '#000', strokeThickness: 2
      }).setOrigin(0.5, 0).setDepth(10);

      msgText = this.add.text(W / 2, H / 2, '', {
        fontSize: '28px', fontFamily: 'Segoe UI', fill: '#fff', stroke: '#0a0a2e', strokeThickness: 4, align: 'center'
      }).setOrigin(0.5).setDepth(20).setVisible(false);

      goPanel = {};
      goPanel.overlay = this.add.graphics().setDepth(30).setVisible(false);
      goPanel.overlay.fillStyle(0x000000, 0.7);
      goPanel.overlay.fillRect(0, 0, W, H);

      const panelX = W / 2, panelY = H / 2;
      const panelW = 320, panelH = 240;

      goPanel.box = this.add.graphics().setDepth(31).setVisible(false);
      goPanel.box.fillStyle(0x0f0f30, 0.95);
      goPanel.box.fillRoundedRect(panelX - panelW / 2, panelY - panelH / 2, panelW, panelH, 16);
      goPanel.box.lineStyle(2, 0x00ffff, 0.6);
      goPanel.box.strokeRoundedRect(panelX - panelW / 2, panelY - panelH / 2, panelW, panelH, 16);

      goPanel.title = this.add.text(panelX, panelY - 80, 'GAME OVER', {
        fontSize: '36px', fontFamily: 'Segoe UI', fontStyle: 'bold',
        fill: '#ff0055', stroke: '#000', strokeThickness: 4
      }).setOrigin(0.5).setDepth(32).setVisible(false);

      goPanel.scoreLabel = this.add.text(panelX, panelY - 30, '', {
        fontSize: '22px', fontFamily: 'Segoe UI', fill: '#00ffff', stroke: '#000', strokeThickness: 3
      }).setOrigin(0.5).setDepth(32).setVisible(false);

      goPanel.levelLabel = this.add.text(panelX, panelY + 5, '', {
        fontSize: '16px', fontFamily: 'Segoe UI', fill: '#ffee00', stroke: '#000', strokeThickness: 2
      }).setOrigin(0.5).setDepth(32).setVisible(false);

      goPanel.btn = this.add.graphics().setDepth(32).setVisible(false);
      goPanel.btn.fillStyle(0x00ffff, 0.15);
      goPanel.btn.fillRoundedRect(panelX - 80, panelY + 40, 160, 44, 10);
      goPanel.btn.lineStyle(2, 0x00ffff, 0.8);
      goPanel.btn.strokeRoundedRect(panelX - 80, panelY + 40, 160, 44, 10);

      goPanel.btnText = this.add.text(panelX, panelY + 62, 'PLAY AGAIN', {
        fontSize: '20px', fontFamily: 'Segoe UI', fontStyle: 'bold',
        fill: '#ffffff', stroke: '#000', strokeThickness: 2
      }).setOrigin(0.5).setDepth(33).setVisible(false);

      goPanel.hint = this.add.text(panelX, panelY + 100, 'Click or press SPACE', {
        fontSize: '13px', fontFamily: 'Segoe UI', fill: '#aaaaaa'
      }).setOrigin(0.5).setDepth(32).setVisible(false);

      goPanel.btnZone = this.add.rectangle(panelX, panelY + 62, 160, 44, 0x000000, 0)
        .setDepth(34).setInteractive({ useHandCursor: true }).setVisible(false);
      goPanel.btnZone.on('pointerover', () => {
        goPanel.btnText.setFill('#00ffff');
      });
      goPanel.btnZone.on('pointerout', () => {
        goPanel.btnText.setFill('#ffffff');
      });
      goPanel.btnZone.on('pointerdown', () => {
        if (gameState === 'gameover' || gameState === 'win') {
          gameState = 'playing';
          this.scene.restart();
        }
      });

      cursors = this.input.keyboard.createCursorKeys();
      this.input.keyboard.addKey('SPACE');

      this.input.on('pointermove', (pointer) => {
        paddle.x = Phaser.Math.Clamp(pointer.x, PADDLE_W / 2, W - PADDLE_W / 2);
        if (ballOnPaddle) {
          const b = balls.getFirstAlive();
          if (b) b.x = paddle.x;
        }
      });

      this.input.on('pointerdown', () => {
        if (ballOnPaddle) launchBall();
        if (gameState === 'gameover' || gameState === 'win') {
          gameState = 'playing';
          this.scene.restart();
        }
      });

      this.input.keyboard.on('keydown-SPACE', () => {
        if (ballOnPaddle) launchBall();
        if (gameState === 'gameover' || gameState === 'win') {
          gameState = 'playing';
          this.scene.restart();
        }
      });
    }

    function buildLevel(scene) {
      bricks.clear(true, true);
      const offsetX = (W - COLS * (BRICK_W + BRICK_PAD) + BRICK_PAD) / 2;
      const offsetY = 50;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const x = offsetX + c * (BRICK_W + BRICK_PAD) + BRICK_W / 2;
          const y = offsetY + r * (BRICK_H + BRICK_PAD) + BRICK_H / 2;
          const b = bricks.create(x, y, 'brick');
          b.setDisplaySize(BRICK_W, BRICK_H);
          b.setTint(BRICK_COLORS[r]);
          b.hp = BRICK_HP[r] + Math.floor((levelNum - 1) * 0.3);
          b.maxHp = b.hp;
          b.scoreVal = BRICK_SCORE[r] * levelNum;
          b.row = r;
        }
      }
    }

    function spawnBall(scene, onPaddle) {
      const b = balls.create(paddle.x, paddle.y - PADDLE_H / 2 - BALL_R - 2, 'ball');
      b.setCircle(BALL_R);
      b.setCollideWorldBounds(true);
      b.setBounce(1);
      b.body.allowGravity = false;
      b.body.maxSpeed = BALL_SPEED * 1.8;
      if (onPaddle) {
        ballOnPaddle = true;
        b.setVelocity(0, 0);
      } else {
        ballOnPaddle = false;
        const angle = Phaser.Math.FloatBetween(-0.8, 0.8);
        b.setVelocity(Math.sin(angle) * BALL_SPEED, -BALL_SPEED);
      }
      return b;
    }

    function launchBall() {
      ballOnPaddle = false;
      const b = balls.getFirstAlive();
      if (b) {
        const angle = Phaser.Math.FloatBetween(-0.6, 0.6);
        b.setVelocity(Math.sin(angle) * BALL_SPEED, -BALL_SPEED);
      }
    }

    function hitPaddle(b, p) {
      if (this.cache.audio.exists('hitSfx')) this.sound.play('hitSfx', { volume: 0.3 });

      const diff = (b.x - p.x) / (PADDLE_W / 2);
      const angle = diff * 1.2;
      const speed = Phaser.Math.Distance.Between(0, 0, b.body.velocity.x, b.body.velocity.y) || BALL_SPEED;
      const clampedSpeed = Phaser.Math.Clamp(speed, BALL_SPEED * 0.9, BALL_SPEED * 1.5);
      b.setVelocity(Math.sin(angle) * clampedSpeed, -Math.abs(Math.cos(angle) * clampedSpeed));
    }

    function hitBrick(b, brick) {
      const scene = b.scene;
      brick.hp--;

      if (brick.hp <= 0) {
        score += brick.scoreVal;
        scoreText.setText('Score: ' + score);

        if (scene.cache.audio.exists('coinSfx')) scene.sound.play('coinSfx', { volume: 0.5 });

        for (let i = 0; i < 6; i++) {
          const p = scene.add.circle(brick.x, brick.y, Phaser.Math.Between(2, 5), BRICK_COLORS[brick.row], 0.9);
          scene.tweens.add({
            targets: p,
            x: brick.x + Phaser.Math.Between(-40, 40),
            y: brick.y + Phaser.Math.Between(-40, 40),
            alpha: 0, scale: 0, duration: 400,
            onComplete: () => p.destroy()
          });
        }

        if (Math.random() < 0.15) {
          const pw = powerups.create(brick.x, brick.y, 'powerup');
          pw.setVelocityY(120);
          const types = ['wide', 'multi', 'slow'];
          pw.powerType = types[Phaser.Math.Between(0, types.length - 1)];
          const tints = { wide: 0x00ff66, multi: 0x00ccff, slow: 0xffee00 };
          pw.setTint(tints[pw.powerType]);
        }

        brick.destroy();

        if (bricks.countActive() === 0) {
          levelNum++;
          if (levelNum > 5) {
            gameState = 'win';
            balls.clear(true, true);

            goPanel.title.setText('YOU WIN!').setFill('#00ff66');
            goPanel.scoreLabel.setText('Final Score: ' + score);
            goPanel.levelLabel.setText('All 5 Levels Cleared!');

            goPanel.overlay.setVisible(true);
            goPanel.box.setVisible(true);
            goPanel.title.setVisible(true).setScale(0.5).setAlpha(0);
            goPanel.scoreLabel.setVisible(true).setAlpha(0);
            goPanel.levelLabel.setVisible(true).setAlpha(0);
            goPanel.btn.setVisible(true).setAlpha(0);
            goPanel.btnText.setVisible(true).setAlpha(0);
            goPanel.hint.setVisible(true).setAlpha(0);
            goPanel.btnZone.setVisible(true);

            scene.tweens.add({ targets: goPanel.title, scale: 1, alpha: 1, duration: 400, ease: 'Back.easeOut' });
            scene.tweens.add({ targets: goPanel.scoreLabel, alpha: 1, duration: 300, delay: 200 });
            scene.tweens.add({ targets: goPanel.levelLabel, alpha: 1, duration: 300, delay: 350 });
            scene.tweens.add({ targets: [goPanel.btn, goPanel.btnText], alpha: 1, duration: 300, delay: 500 });
            scene.tweens.add({ targets: goPanel.hint, alpha: 1, duration: 300, delay: 650 });
          } else {
            levelText.setText('Level ' + levelNum);
            buildLevel(scene);
            balls.clear(true, true);
            powerups.clear(true, true);
            spawnBall(scene, true);
            showMsg(scene, 'Level ' + levelNum + '!', 1500);
          }
        }
      } else {
        if (scene.cache.audio.exists('hitSfx')) scene.sound.play('hitSfx', { volume: 0.25 });
        const alpha = 0.4 + 0.6 * (brick.hp / brick.maxHp);
        brick.setAlpha(alpha);
        scene.tweens.add({ targets: brick, scaleX: 0.9, scaleY: 0.9, duration: 50, yoyo: true });
      }
    }

    function collectPowerup(pu, p) {
      const scene = pu.scene;
      if (scene.cache.audio.exists('coinSfx')) scene.sound.play('coinSfx', { volume: 0.4 });

      showMsg(scene, pu.powerType.toUpperCase() + '!', 800);

      if (pu.powerType === 'wide') {
        paddle.setDisplaySize(PADDLE_W * 1.5, PADDLE_H);
        paddle.body.setSize(PADDLE_W * 1.5, PADDLE_H);
        scene.time.delayedCall(8000, () => {
          if (paddle && paddle.active) {
            paddle.setDisplaySize(PADDLE_W, PADDLE_H);
            paddle.body.setSize(PADDLE_W, PADDLE_H);
          }
        });
      } else if (pu.powerType === 'multi') {
        const activeBalls = balls.getChildren().filter(b => b.active);
        activeBalls.forEach(b => {
          const nb = spawnBall(scene, false);
          nb.setPosition(b.x, b.y);
          nb.setVelocity(
            -b.body.velocity.x + Phaser.Math.Between(-30, 30),
            b.body.velocity.y
          );
        });
      } else if (pu.powerType === 'slow') {
        balls.getChildren().forEach(b => {
          if (b.active) {
            const vx = b.body.velocity.x * 0.6;
            const vy = b.body.velocity.y * 0.6;
            b.setVelocity(vx, vy);
          }
        });
        scene.time.delayedCall(5000, () => {
          balls.getChildren().forEach(b => {
            if (b.active) {
              const speed = Phaser.Math.Distance.Between(0, 0, b.body.velocity.x, b.body.velocity.y);
              if (speed < BALL_SPEED * 0.8) {
                const ratio = BALL_SPEED / Math.max(speed, 1);
                b.setVelocity(b.body.velocity.x * ratio, b.body.velocity.y * ratio);
              }
            }
          });
        });
      }

      for (let i = 0; i < 8; i++) {
        const c = scene.add.circle(pu.x, pu.y, Phaser.Math.Between(2, 6), 0xffffff, 0.8);
        scene.tweens.add({
          targets: c,
          x: pu.x + Phaser.Math.Between(-30, 30),
          y: pu.y + Phaser.Math.Between(-30, 30),
          alpha: 0, scale: 0, duration: 350,
          onComplete: () => c.destroy()
        });
      }

      pu.destroy();
    }

    function showMsg(scene, text, duration) {
      msgText.setText(text).setVisible(true);
      scene.time.delayedCall(duration, () => { msgText.setVisible(false); });
    }

    function loseBall(scene) {
      if (scene.cache.audio.exists('explosionSfx')) scene.sound.play('explosionSfx', { volume: 0.5 });

      gameState = 'gameover';
      balls.clear(true, true);
      powerups.clear(true, true);

      goPanel.scoreLabel.setText('Score: ' + score);
      goPanel.levelLabel.setText('Reached Level ' + levelNum);

      goPanel.overlay.setVisible(true);
      goPanel.box.setVisible(true);
      goPanel.title.setVisible(true).setScale(0.5).setAlpha(0);
      goPanel.scoreLabel.setVisible(true).setAlpha(0);
      goPanel.levelLabel.setVisible(true).setAlpha(0);
      goPanel.btn.setVisible(true).setAlpha(0);
      goPanel.btnText.setVisible(true).setAlpha(0);
      goPanel.hint.setVisible(true).setAlpha(0);
      goPanel.btnZone.setVisible(true);

      scene.tweens.add({ targets: goPanel.title, scale: 1, alpha: 1, duration: 400, ease: 'Back.easeOut' });
      scene.tweens.add({ targets: goPanel.scoreLabel, alpha: 1, duration: 300, delay: 200 });
      scene.tweens.add({ targets: goPanel.levelLabel, alpha: 1, duration: 300, delay: 350 });
      scene.tweens.add({ targets: [goPanel.btn, goPanel.btnText], alpha: 1, duration: 300, delay: 500 });
      scene.tweens.add({ targets: goPanel.hint, alpha: 1, duration: 300, delay: 650 });

      scene.cameras.main.shake(200, 0.015);
    }

    function update() {
      if (gameState !== 'playing') return;

      const padSpeed = 400;
      if (cursors.left.isDown) {
        paddle.x = Math.max(paddle.x - padSpeed * (1 / 60), PADDLE_W / 2);
      } else if (cursors.right.isDown) {
        paddle.x = Math.min(paddle.x + padSpeed * (1 / 60), W - PADDLE_W / 2);
      }
      paddle.body.updateFromGameObject();

      if (ballOnPaddle) {
        const b = balls.getFirstAlive();
        if (b) {
          b.x = paddle.x;
          b.y = paddle.y - PADDLE_H / 2 - BALL_R - 2;
        }
      }

      balls.getChildren().forEach(b => {
        if (!b.active) return;
        if (b.y > H + 20) {
          b.destroy();
          if (balls.countActive() === 0) loseBall(this);
        }

        const speed = Phaser.Math.Distance.Between(0, 0, b.body.velocity.x, b.body.velocity.y);
        if (!ballOnPaddle && speed > 0 && speed < BALL_SPEED * 0.8) {
          const ratio = BALL_SPEED / speed;
          b.setVelocity(b.body.velocity.x * ratio, b.body.velocity.y * ratio);
        }

        if (b.body.velocity.y === 0 && !ballOnPaddle) {
          b.setVelocityY(b.y < H / 2 ? BALL_SPEED * 0.5 : -BALL_SPEED * 0.5);
        }
      });

      powerups.getChildren().forEach(p => {
        if (p.active && p.y > H + 30) p.destroy();
      });
    }

    const game = new Phaser.Game(config);
  </script>
</body>
</html>
