<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fb923c 0%, #f59e0b 45%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }
    #shell {
      position: relative;
      width: 800px;
      max-width: 100vw;
      max-height: 100vh;
    }
    #game-container {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.45);
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      min-width: 260px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.84);
      color: #f8fafc;
      line-height: 1.45;
      font-size: 14px;
    }
    #toast {
      position: absolute;
      top: 86px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 22;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.92);
      color: #fff;
      padding: 10px 14px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    #toast.visible { opacity: 1; }
    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 25;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.72);
    }
    #overlay.visible { display: flex; }
    .card {
      width: min(90vw, 420px);
      padding: 24px;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.96);
      color: white;
      text-align: center;
      border: 2px solid rgba(255,255,255,0.12);
    }
    .card h1 { margin-bottom: 10px; }
    .card p { margin-bottom: 16px; line-height: 1.5; }
    .card button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #fde68a;
      color: #111827;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="shell">
    <div id="game-container"></div>
    <div id="hud"></div>
    <div id="toast"></div>
    <div id="overlay">
      <div class="card">
        <h1 id="overlay-title">Challenge Complete!</h1>
        <p id="overlay-copy">You nailed the moving hoops and finished the trick-shot round.</p>
        <button id="restart-btn">Play Again</button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.86.0/dist/phaser.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      var hud = document.getElementById('hud');
      var toast = document.getElementById('toast');
      var overlay = document.getElementById('overlay');
      var overlayTitle = document.getElementById('overlay-title');
      var overlayCopy = document.getElementById('overlay-copy');
      var restartBtn = document.getElementById('restart-btn');

      function showToast(text) {
        toast.textContent = text;
        toast.classList.add('visible');
        clearTimeout(showToast._timer);
        showToast._timer = setTimeout(function () {
          toast.classList.remove('visible');
        }, 1200);
      }

      restartBtn.addEventListener('click', function () {
        window.location.reload();
      });

      class TrickShotArenaScene extends Phaser.Scene {
        constructor() {
          super('TrickShotArenaScene');
        }

        create() {
          this.score = 0;
          this.round = 1;
          this.maxRounds = 6;
          this.shotsLeft = 6;
          this.gameEnded = false;
          this.shotActive = false;

          this.drawCourt();
          this.makeTextures();
          this.createPlayer();
          this.createHoop();
          this.createAimMeter();
          this.cursors = this.input.keyboard.createCursorKeys();
          this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
          this.input.keyboard.on('keydown-SPACE', this.takeShot, this);
          this.updateHud();
        }

        makeTextures() {
          var scene = this;

          function createCanvasTexture(key, width, height, drawFn) {
            var canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            var ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, width, height);
            ctx.imageSmoothingEnabled = true;
            drawFn(ctx, width, height);
            scene.textures.addCanvas(key, canvas);
          }

          createCanvasTexture('shooter-token', 40, 40, function(ctx, width, height) {
            ctx.save();
            ctx.globalAlpha = 0.18;
            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.ellipse(width / 2, height - 6, 11, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            var hoodie = ctx.createLinearGradient(0, 6, 0, height - 6);
            hoodie.addColorStop(0, '#334155');
            hoodie.addColorStop(1, '#0f172a');
            ctx.fillStyle = hoodie;
            ctx.beginPath();
            ctx.arc(width / 2, 20, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#020617';
            ctx.stroke();

            ctx.fillStyle = '#f8fafc';
            ctx.beginPath();
            ctx.arc(15, 16, 3.5, 0, Math.PI * 2);
            ctx.arc(25, 16, 3.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.arc(16, 17, 1.5, 0, Math.PI * 2);
            ctx.arc(26, 17, 1.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(width / 2, 20, 12, Math.PI * 0.15, Math.PI * 0.85, true);
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.22)';
            ctx.beginPath();
            ctx.arc(24, 10, 4, 0, Math.PI * 2);
            ctx.fill();
          });

          createCanvasTexture('ball-token', 28, 28, function(ctx, width, height) {
            ctx.save();
            ctx.globalAlpha = 0.16;
            ctx.fillStyle = '#7c2d12';
            ctx.beginPath();
            ctx.ellipse(width / 2, height - 5, 8, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            var ballGradient = ctx.createRadialGradient(10, 8, 2, 14, 14, 12);
            ballGradient.addColorStop(0, '#fdba74');
            ballGradient.addColorStop(1, '#ea580c');
            ctx.fillStyle = ballGradient;
            ctx.beginPath();
            ctx.arc(14, 14, 11, 0, Math.PI * 2);
            ctx.fill();

            ctx.lineWidth = 2;
            ctx.strokeStyle = '#7c2d12';
            ctx.stroke();

            ctx.strokeStyle = 'rgba(124,45,18,0.95)';
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.arc(14, 14, 10.2, Math.PI * 0.18, Math.PI * 1.82);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(3, 14);
            ctx.quadraticCurveTo(14, 9, 25, 14);
            ctx.moveTo(14, 3);
            ctx.quadraticCurveTo(9, 14, 14, 25);
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.26)';
            ctx.beginPath();
            ctx.arc(10, 8, 3, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        drawCourt() {
          this.cameras.main.setBackgroundColor('#ea580c');
          var g = this.add.graphics();
          g.fillStyle(0xb45309, 1);
          g.fillRect(0, 0, 800, 560);
          g.fillStyle(0xf59e0b, 1);
          g.fillRoundedRect(40, 60, 720, 460, 20);
          g.lineStyle(4, 0xfffbeb, 0.82);
          g.strokeRoundedRect(40, 60, 720, 460, 20);
          g.strokeCircle(400, 290, 70);
          g.lineBetween(400, 60, 400, 520);
          g.strokeRect(130, 180, 120, 220);
          g.strokeRect(550, 180, 120, 220);
          g.lineStyle(3, 0xfef3c7, 0.4);
          g.lineBetween(120, 128, 680, 128);
          g.lineBetween(120, 452, 680, 452);
        }

        createPlayer() {
          this.player = this.add.image(400, 468, 'shooter-token');
          this.ball = this.add.image(400, 432, 'ball-token');
        }

        createHoop() {
          this.hoopX = 400;
          this.hoopY = 138;
          this.hoopDirection = 1;
          this.rim = this.add.rectangle(this.hoopX, this.hoopY, 92, 10, 0xdc2626);
          this.backboard = this.add.rectangle(this.hoopX, this.hoopY - 22, 82, 12, 0xe2e8f0);
          this.net = this.add.rectangle(this.hoopX, this.hoopY + 16, 54, 22, 0xf8fafc, 0.25);
        }

        createAimMeter() {
          this.meterBg = this.add.rectangle(694, 300, 18, 220, 0x0f172a, 0.85);
          this.meterFill = this.add.rectangle(694, 396, 12, 48, 0x22d3ee, 1);
          this.meterDirection = -1;
          this.meterPower = 0.4;
        }

        updateHud() {
          hud.innerHTML =
            '<strong>Vibe 2D Trick Shot Arena</strong><br>' +
            'Score: ' + this.score + ' | Round: ' + this.round + '/' + this.maxRounds + '<br>' +
            'Shots Left: ' + this.shotsLeft + ' | Accuracy Goal: Sink the moving hoop';
        }

        takeShot() {
          if (this.gameEnded || this.shotActive || this.shotsLeft <= 0) return;

          this.shotActive = true;
          this.shotsLeft -= 1;

          var dx = (this.hoopX - this.ball.x) * 0.5;
          var peakY = this.ball.y - (160 + this.meterPower * 130);
          var missOffset = Math.abs(this.ball.x - this.hoopX) * 0.06;
          var targetX = this.hoopX + Phaser.Math.Between(-6, 6) + missOffset;
          var targetY = this.hoopY + 12;
          var self = this;

          this.tweens.add({
            targets: this.ball,
            x: this.ball.x + dx * 0.55,
            y: peakY,
            scale: 0.92,
            duration: 280,
            ease: 'Sine.easeOut',
            onComplete: function () {
              self.tweens.add({
                targets: self.ball,
                x: targetX,
                y: targetY,
                scale: 0.84,
                duration: 360,
                ease: 'Sine.easeIn',
                onComplete: function () {
                  self.resolveShot();
                },
              });
            },
          });

          this.updateHud();
        }

        resolveShot() {
          var madeShot = Math.abs(this.ball.x - this.hoopX) < 26;
          if (madeShot) {
            this.score += 2;
            showToast('Swish!');
            this.tweens.add({
              targets: [this.rim, this.net],
              scaleY: 1.2,
              yoyo: true,
              duration: 120,
            });
          } else {
            showToast('Close! Try the timing again.');
          }

          this.round += 1;
          this.shotActive = false;

          if (this.round > this.maxRounds || this.shotsLeft <= 0) {
            this.finishGame();
            return;
          }

          this.ball.setPosition(this.player.x, this.player.y - 36);
          this.ball.setScale(1);
          this.updateHud();
        }

        finishGame() {
          this.gameEnded = true;
          if (this.score >= 8) {
            overlayTitle.textContent = 'Challenge Complete!';
            overlayCopy.textContent = 'You stacked enough clean trick shots to win the arena round.';
          } else {
            overlayTitle.textContent = 'Keep Practicing!';
            overlayCopy.textContent = 'You landed some shots, but the arena wants a higher score next time.';
          }
          overlay.classList.add('visible');
        }

        update(time, delta) {
          if (this.gameEnded) return;

          if (this.cursors.left.isDown) {
            this.player.x = Math.max(170, this.player.x - 220 * (delta / 1000));
          } else if (this.cursors.right.isDown) {
            this.player.x = Math.min(630, this.player.x + 220 * (delta / 1000));
          }

          if (!this.shotActive) {
            this.ball.x = this.player.x;
            this.ball.y = this.player.y - 36;
          }

          this.hoopX += this.hoopDirection * 110 * (delta / 1000);
          if (this.hoopX > 600 || this.hoopX < 200) {
            this.hoopDirection *= -1;
          }
          this.rim.x = this.hoopX;
          this.backboard.x = this.hoopX;
          this.net.x = this.hoopX;

          this.meterPower += this.meterDirection * 0.75 * (delta / 1000);
          if (this.meterPower > 1) {
            this.meterPower = 1;
            this.meterDirection = -1;
          } else if (this.meterPower < 0.2) {
            this.meterPower = 0.2;
            this.meterDirection = 1;
          }
          this.meterFill.height = 40 + this.meterPower * 110;
          this.meterFill.y = 450 - this.meterFill.height / 2;
        }
      }

      new Phaser.Game({
        type: Phaser.AUTO,
        width: 800,
        height: 560,
        parent: 'game-container',
        backgroundColor: '#ea580c',
        scene: [TrickShotArenaScene],
      });
    })();
  </script>
</body>
</html>
