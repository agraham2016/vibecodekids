<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 50%, #e17055 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
    #game-container { border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .hint { margin-top: 12px; color: rgba(0,0,0,0.6); font-size: 13px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.86.0/dist/phaser.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="game-container"></div>
  <div class="hint">Tap fruit to slice! Avoid bombs • 60 seconds • Score 100 to win</div>
  <script>
    const W = 800, H = 500;
    const FRUIT_R = 28;
    const TARGET_SCORE = 100;
    const GAME_TIME = 60000;
    const BOMB_PENALTY = 20;

    class FruitSliceScene extends Phaser.Scene {
      preload() {
        var g = this.make.graphics({ add: false });

        // Apple (red circle with green leaf)
        g.clear(); g.fillStyle(0xe74c3c); g.fillCircle(32, 34, 28);
        g.fillStyle(0x27ae60); g.fillRect(28, 2, 6, 12);
        g.fillStyle(0x2ecc71); g.fillEllipse(38, 8, 14, 8);
        g.generateTexture('apple', 64, 64); g.clear();

        // Lemon (yellow oval)
        g.fillStyle(0xf1c40f); g.fillEllipse(32, 32, 56, 44);
        g.fillStyle(0xf39c12); g.fillEllipse(32, 32, 40, 30);
        g.generateTexture('lemon', 64, 64); g.clear();

        // Lime (green circle)
        g.fillStyle(0x2ecc71); g.fillCircle(32, 32, 26);
        g.fillStyle(0x27ae60); g.fillCircle(32, 32, 18);
        g.lineStyle(2, 0x1abc9c); g.strokeCircle(32, 32, 12);
        g.generateTexture('lime', 64, 64); g.clear();

        // Banana (yellow curved shape)
        g.fillStyle(0xf1c40f); g.fillRoundedRect(10, 20, 44, 20, 10);
        g.fillStyle(0xf39c12); g.fillRoundedRect(14, 24, 36, 12, 6);
        g.fillStyle(0x7f6b00); g.fillRect(48, 18, 6, 4);
        g.generateTexture('banana', 64, 64); g.clear();

        // Strawberry (red triangle-ish with dots)
        g.fillStyle(0xe74c3c); g.fillTriangle(32, 58, 10, 16, 54, 16);
        g.fillStyle(0xe74c3c); g.fillCircle(32, 22, 18);
        g.fillStyle(0x27ae60); g.fillTriangle(26, 10, 32, 0, 38, 10);
        g.fillStyle(0xf5f5f5, 0.8);
        g.fillCircle(26, 28, 2); g.fillCircle(38, 28, 2);
        g.fillCircle(32, 38, 2); g.fillCircle(28, 46, 2); g.fillCircle(36, 46, 2);
        g.generateTexture('strawberry', 64, 64); g.clear();

        // Bomb (dark circle with fuse)
        g.fillStyle(0x2d3436); g.fillCircle(32, 36, 24);
        g.fillStyle(0x636e72); g.fillCircle(26, 30, 6);
        g.fillStyle(0xdfe6e9); g.fillCircle(24, 28, 3);
        g.lineStyle(3, 0x636e72); g.lineBetween(32, 12, 38, 4);
        g.fillStyle(0xe17055); g.fillCircle(38, 4, 5);
        g.fillStyle(0xfdcb6e); g.fillCircle(38, 4, 3);
        g.generateTexture('bomb', 64, 64); g.clear();

        // Slice particle
        g.fillStyle(0xffffff); g.fillCircle(4, 4, 4);
        g.generateTexture('slice-particle', 8, 8);

        g.destroy();
      }

      create() {
        var bg = this.add.graphics();
        bg.fillStyle(0xffeaa7); bg.fillRect(0, 0, W, H);
        for (var i = 0; i < 30; i++) {
          bg.fillStyle(0xfdcb6e, 0.3);
          bg.fillCircle(Phaser.Math.Between(0, W), Phaser.Math.Between(0, H), Phaser.Math.Between(20, 50));
        }

        this.score = 0;
        this.gameOver = false;
        this.lives = 3;
        this.fruits = this.add.group();

        this.livesText = this.add.text(W / 2, 12, '❤️❤️❤️', { fontSize: '22px' }).setOrigin(0.5, 0).setDepth(10);
        this.scoreText = this.add.text(12, 12, 'Score: 0', { fontSize: '22px', fill: '#2d3436', stroke: '#fff', strokeThickness: 3 }).setDepth(10);
        this.timeText = this.add.text(W - 12, 12, '60s', { fontSize: '22px', fill: '#e17055', stroke: '#fff', strokeThickness: 3 }).setOrigin(1, 0).setDepth(10);
        this.msgText = this.add.text(W / 2, H / 2, '', { fontSize: '28px', fill: '#2d3436', stroke: '#fff', strokeThickness: 4, align: 'center' }).setOrigin(0.5).setDepth(20).setVisible(false);

        this.startTime = Date.now();
        this.spawnFruit();
        this.spawnTimer = this.time.addEvent({ delay: 800, callback: () => this.spawnFruit(), loop: true });
      }

      spawnFruit() {
        if (this.gameOver) return;
        var isBomb = Math.random() < 0.15;
        var key = isBomb ? 'bomb' : Phaser.Utils.Array.GetRandom(['apple', 'lemon', 'lime', 'banana', 'strawberry']);
        var dir = Math.random() < 0.5 ? 1 : -1;
        var startX = dir < 0 ? W + FRUIT_R : -FRUIT_R;
        var endX = dir < 0 ? -FRUIT_R : W + FRUIT_R;
        var y = Phaser.Math.Between(FRUIT_R * 2, H - FRUIT_R * 2);
        var speed = Phaser.Math.Between(80, 180) * dir;

        var fruit = this.add.image(startX, y, key).setDisplaySize(FRUIT_R * 2, FRUIT_R * 2);
        fruit.isBomb = isBomb;
        fruit.setInteractive({ useHandCursor: true });
        fruit.on('pointerdown', () => {
          if (this.gameOver) return;
          if (fruit.isBomb) {
            this.score = Math.max(0, this.score - BOMB_PENALTY);
            this.scoreText.setText('Score: ' + this.score);
            this.lives--;
            this.livesText.setText('❤️'.repeat(Math.max(0, this.lives)));
            this.cameras.main.shake(150, 0.015);
            this.showSliceEffect(fruit.x, fruit.y, 0x2d3436);
            fruit.destroy();
            if (this.lives <= 0) this.lose();
          } else {
            this.score += 12;
            this.scoreText.setText('Score: ' + this.score);
            this.showSliceEffect(fruit.x, fruit.y, 0xfdcb6e);
            this.tweens.add({ targets: fruit, scaleX: 0.3, scaleY: 0.3, alpha: 0, duration: 150, onComplete: () => fruit.destroy() });
            if (this.score >= TARGET_SCORE) this.win();
          }
        });
        this.fruits.add(fruit);

        var duration = Math.abs((endX - startX) / speed) * 1000;
        this.tweens.add({
          targets: fruit, x: endX, duration: duration,
          onComplete: () => { if (fruit.active) fruit.destroy(); }
        });
      }

      showSliceEffect(x, y, tint) {
        for (var i = 0; i < 6; i++) {
          var p = this.add.image(x, y, 'slice-particle').setTint(tint).setDepth(15);
          this.tweens.add({
            targets: p,
            x: x + Phaser.Math.Between(-40, 40),
            y: y + Phaser.Math.Between(-40, 40),
            alpha: 0, scaleX: 0.3, scaleY: 0.3,
            duration: 300, onComplete: () => p.destroy()
          });
        }
      }

      win() {
        this.gameOver = true;
        this.spawnTimer.remove();
        this.msgText.setText('SLICED! 🎉\nScore: ' + this.score + '\nTap to play again').setTint(0x55efc4).setVisible(true);
        this.input.once('pointerdown', () => this.scene.restart());
      }

      lose() {
        this.gameOver = true;
        this.spawnTimer.remove();
        this.msgText.setText('GAME OVER 💥\nScore: ' + this.score + '\nTap to restart').setVisible(true);
        this.input.once('pointerdown', () => this.scene.restart());
      }

      update() {
        if (this.gameOver) return;
        var elapsed = (Date.now() - this.startTime) / 1000;
        var left = Math.max(0, Math.ceil(GAME_TIME / 1000 - elapsed));
        this.timeText.setText(left + 's');
        if (left <= 0 && this.score < TARGET_SCORE) this.lose();
      }
    }

    new Phaser.Game({
      type: Phaser.AUTO, width: W, height: H,
      parent: 'game-container', backgroundColor: '#ffeaa7',
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
      scene: FruitSliceScene
    });
  </script>
</body>
</html>
