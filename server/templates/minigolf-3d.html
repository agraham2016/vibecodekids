<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: linear-gradient(180deg, #065f46 0%, #047857 50%, #022c22 100%); font-family: Arial, sans-serif; touch-action: none; }
    #game-container { width: 100vw; height: 100vh; }
    #hud {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      min-width: 200px; padding: 14px 16px; border-radius: 18px;
      background: rgba(15, 23, 42, 0.78); color: #e2e8f0;
      line-height: 1.5; font-size: 15px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.35);
    }
    #toast {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 20;
      padding: 12px 18px; border-radius: 999px;
      background: rgba(14, 165, 233, 0.92); color: #fff; font-weight: bold;
      opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
    }
    #toast.visible { opacity: 1; }
    #overlay {
      display: none; position: fixed; inset: 0; z-index: 25;
      align-items: center; justify-content: center; padding: 24px;
      background: rgba(15, 23, 42, 0.7); color: #fff;
    }
    #overlay.visible { display: flex; }
    .card {
      width: min(92vw, 420px); padding: 28px; border-radius: 24px;
      background: rgba(15, 23, 42, 0.96); text-align: center;
      border: 2px solid rgba(255,255,255,0.15);
    }
    .card h1 { margin-bottom: 10px; font-size: 32px; }
    .card p { margin-bottom: 16px; line-height: 1.5; }
    .card button {
      border: 0; border-radius: 999px; padding: 12px 24px;
      background: #34d399; color: #022c22; font-weight: bold; font-size: 16px; cursor: pointer;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="game-container"></div>
  <div id="hud"></div>
  <div id="toast"></div>
  <div id="overlay">
    <div class="card">
      <h1 id="overlay-title">Great Round!</h1>
      <p id="overlay-copy"></p>
      <button id="restart-btn">Play Again</button>
    </div>
  </div>
  <script>
  (function () {
    var container = document.getElementById('game-container');
    var hud = document.getElementById('hud');
    var toastEl = document.getElementById('toast');
    var overlay = document.getElementById('overlay');
    var overlayCopy = document.getElementById('overlay-copy');
    document.getElementById('restart-btn').onclick = function () { location.reload(); };

    function toast(t) {
      toastEl.textContent = t; toastEl.classList.add('visible');
      clearTimeout(toast._t);
      toast._t = setTimeout(function () { toastEl.classList.remove('visible'); }, 1400);
    }

    var HOLES = [
      { len: 12, par: 2, obstacles: [] },
      { len: 16, par: 3, obstacles: [{ x: 0, z: -8, w: 2.5, d: 0.6 }] },
      { len: 20, par: 3, obstacles: [{ x: -1.2, z: -10, w: 1, d: 2 }, { x: 1.2, z: -14, w: 1, d: 2 }] }
    ];
    var WALL_H = 0.6, WALL_T = 0.3, FAIR_W = 5, BALL_R = 0.18, HOLE_R = 0.4;
    var FRICTION = 0.985, MIN_V = 0.005, MAX_POWER = 0.35;

    var scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x022c22, 30, 60);
    var camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    var sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(5, 12, 5); sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    scene.add(sun);

    var greenMat = new THREE.MeshStandardMaterial({ color: 0x16a34a });
    var wallMat = new THREE.MeshStandardMaterial({ color: 0x78350f });
    var holeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    var obsMat = new THREE.MeshStandardMaterial({ color: 0x92400e });
    var ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.25 });
    var flagMat = new THREE.MeshStandardMaterial({ color: 0xef4444 });

    var courseGroup = new THREE.Group();
    scene.add(courseGroup);

    var ball = new THREE.Mesh(new THREE.SphereGeometry(BALL_R, 16, 16), ballMat);
    ball.castShadow = true;
    scene.add(ball);

    var aimLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
      new THREE.LineBasicMaterial({ color: 0xfde68a, linewidth: 2 })
    );
    aimLine.visible = false;
    scene.add(aimLine);

    var curHole = 0, strokes = 0, totalStrokes = 0, ballVx = 0, ballVz = 0, putting = false;
    var dragging = false, dragStart = { x: 0, y: 0 }, dragEnd = { x: 0, y: 0 };
    var holePos = new THREE.Vector3(), ballStart = new THREE.Vector3();
    var walls = [], obstacles = [];

    function buildHole(idx) {
      while (courseGroup.children.length) courseGroup.remove(courseGroup.children[0]);
      walls = []; obstacles = [];
      var h = HOLES[idx], hw = FAIR_W / 2;

      var fairway = new THREE.Mesh(new THREE.PlaneGeometry(FAIR_W, h.len), greenMat);
      fairway.rotation.x = -Math.PI / 2; fairway.position.set(0, 0, -h.len / 2);
      fairway.receiveShadow = true;
      courseGroup.add(fairway);

      var lw = new THREE.Mesh(new THREE.BoxGeometry(WALL_T, WALL_H, h.len), wallMat);
      lw.position.set(-hw - WALL_T / 2, WALL_H / 2, -h.len / 2);
      lw.castShadow = true; courseGroup.add(lw);
      var rw = new THREE.Mesh(new THREE.BoxGeometry(WALL_T, WALL_H, h.len), wallMat);
      rw.position.set(hw + WALL_T / 2, WALL_H / 2, -h.len / 2);
      rw.castShadow = true; courseGroup.add(rw);
      var bw = new THREE.Mesh(new THREE.BoxGeometry(FAIR_W + WALL_T * 2, WALL_H, WALL_T), wallMat);
      bw.position.set(0, WALL_H / 2, -h.len - WALL_T / 2);
      bw.castShadow = true; courseGroup.add(bw);

      walls.push(
        { axis: 'x', val: -hw + BALL_R, side: 1 },
        { axis: 'x', val: hw - BALL_R, side: -1 },
        { axis: 'z', val: -h.len + BALL_R, side: 1 }
      );

      var holeMesh = new THREE.Mesh(new THREE.CylinderGeometry(HOLE_R, HOLE_R, 0.02, 24), holeMat);
      holeMesh.position.set(0, 0.01, -h.len + 1.2);
      courseGroup.add(holeMesh);
      holePos.set(0, 0, -h.len + 1.2);

      var pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.2, 8), wallMat);
      pole.position.set(0, 0.6, -h.len + 1.2);
      courseGroup.add(pole);
      var flag = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.3), flagMat);
      flag.position.set(0.25, 1.1, -h.len + 1.2);
      courseGroup.add(flag);

      h.obstacles.forEach(function (o) {
        var box = new THREE.Mesh(new THREE.BoxGeometry(o.w, 0.5, o.d), obsMat);
        box.position.set(o.x, 0.25, o.z); box.castShadow = true;
        courseGroup.add(box);
        obstacles.push({ x: o.x, z: o.z, hw: o.w / 2, hd: o.d / 2 });
      });

      ballStart.set(0, BALL_R, -0.8);
      ball.position.copy(ballStart);
      ballVx = 0; ballVz = 0; strokes = 0; putting = false;
      positionCamera(h.len);
      updateHud();
      toast('Hole ' + (idx + 1) + '  —  Par ' + h.par);
    }

    function positionCamera(len) {
      camera.position.set(0, len * 0.6, 4);
      camera.lookAt(0, 0, -len / 2);
    }

    function updateHud() {
      var totalPar = 0;
      for (var i = 0; i <= curHole; i++) totalPar += HOLES[i].par;
      hud.innerHTML =
        '<b>Hole ' + (curHole + 1) + ' / 3</b><br>' +
        'Strokes: ' + strokes + '<br>' +
        'Par: ' + HOLES[curHole].par + '<br>' +
        '<span style="opacity:.7">Total: ' + totalStrokes + '</span>';
    }

    function getPointer(e) {
      var t = e.touches ? e.touches[0] || e.changedTouches[0] : e;
      return { x: t.clientX, y: t.clientY };
    }

    function onDown(e) {
      if (putting) return;
      e.preventDefault();
      var p = getPointer(e);
      dragging = true; dragStart.x = p.x; dragStart.y = p.y;
      dragEnd.x = p.x; dragEnd.y = p.y;
      aimLine.visible = true;
    }
    function onMove(e) {
      if (!dragging) return;
      var p = getPointer(e);
      dragEnd.x = p.x; dragEnd.y = p.y;
      updateAimLine();
    }
    function onUp(e) {
      if (!dragging) return;
      dragging = false; aimLine.visible = false;
      var dx = dragStart.x - dragEnd.x, dy = dragStart.y - dragEnd.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 8) return;
      var power = Math.min(dist / 300, 1) * MAX_POWER;
      var ang = Math.atan2(dx, dy);
      ballVx = Math.sin(ang) * power;
      ballVz = -Math.cos(ang) * power;
      putting = true; strokes++; totalStrokes++;
      updateHud();
    }

    function updateAimLine() {
      var dx = dragStart.x - dragEnd.x, dy = dragStart.y - dragEnd.y;
      var dist = Math.min(Math.sqrt(dx * dx + dy * dy) / 300, 1) * 3;
      var ang = Math.atan2(dx, dy);
      var pts = aimLine.geometry.attributes.position.array;
      pts[0] = ball.position.x; pts[1] = BALL_R; pts[2] = ball.position.z;
      pts[3] = ball.position.x + Math.sin(ang) * dist;
      pts[4] = BALL_R;
      pts[5] = ball.position.z - Math.cos(ang) * dist;
      aimLine.geometry.attributes.position.needsUpdate = true;
    }

    renderer.domElement.addEventListener('mousedown', onDown);
    renderer.domElement.addEventListener('mousemove', onMove);
    renderer.domElement.addEventListener('mouseup', onUp);
    renderer.domElement.addEventListener('touchstart', onDown, { passive: false });
    renderer.domElement.addEventListener('touchmove', onMove, { passive: false });
    renderer.domElement.addEventListener('touchend', onUp);

    function collide() {
      var bx = ball.position.x, bz = ball.position.z, hw = FAIR_W / 2 - BALL_R;
      if (bx < -hw) { ball.position.x = -hw; ballVx = Math.abs(ballVx) * 0.7; }
      if (bx > hw) { ball.position.x = hw; ballVx = -Math.abs(ballVx) * 0.7; }
      var backZ = -HOLES[curHole].len + BALL_R;
      if (bz < backZ) { ball.position.z = backZ; ballVz = Math.abs(ballVz) * 0.7; }
      if (bz > -BALL_R) { ball.position.z = -BALL_R; ballVz = -Math.abs(ballVz) * 0.7; }

      obstacles.forEach(function (o) {
        var ox = bx - o.x, oz = bz - o.z;
        var cx = Math.max(-o.hw, Math.min(o.hw, ox));
        var cz = Math.max(-o.hd, Math.min(o.hd, oz));
        var ddx = ox - cx, ddz = oz - cz, d2 = ddx * ddx + ddz * ddz;
        if (d2 < BALL_R * BALL_R && d2 > 0) {
          var d = Math.sqrt(d2);
          var nx = ddx / d, nz = ddz / d;
          ball.position.x = o.x + cx + nx * BALL_R;
          ball.position.z = o.z + cz + nz * BALL_R;
          var dot = ballVx * nx + ballVz * nz;
          ballVx = (ballVx - 2 * dot * nx) * 0.7;
          ballVz = (ballVz - 2 * dot * nz) * 0.7;
        }
      });
    }

    function checkHole() {
      var dx = ball.position.x - holePos.x, dz = ball.position.z - holePos.z;
      if (dx * dx + dz * dz < HOLE_R * HOLE_R && Math.sqrt(ballVx * ballVx + ballVz * ballVz) < 0.15) {
        ballVx = 0; ballVz = 0; putting = false;
        var diff = strokes - HOLES[curHole].par;
        var msg = diff <= -1 ? 'Birdie!' : diff === 0 ? 'Par!' : 'Bogey';
        toast(msg);
        setTimeout(nextHole, 1200);
      }
    }

    function nextHole() {
      curHole++;
      if (curHole >= HOLES.length) {
        var totalPar = HOLES.reduce(function (s, h) { return s + h.par; }, 0);
        var diff = totalStrokes - totalPar;
        var label = diff < 0 ? diff + ' under par' : diff === 0 ? 'Even par' : '+' + diff + ' over par';
        overlayCopy.textContent = 'Total strokes: ' + totalStrokes + '  (' + label + ')';
        overlay.classList.add('visible');
        return;
      }
      buildHole(curHole);
    }

    function animate() {
      requestAnimationFrame(animate);
      if (putting) {
        ball.position.x += ballVx;
        ball.position.z += ballVz;
        ballVx *= FRICTION; ballVz *= FRICTION;
        collide();
        checkHole();
        if (Math.abs(ballVx) < MIN_V && Math.abs(ballVz) < MIN_V) {
          ballVx = 0; ballVz = 0; putting = false;
        }
      }
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', function () {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    buildHole(0);
    animate();
  })();
  </script>
</body>
</html>
