<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root { --game-primary:#00ffff; --game-secondary:#4400ff; --game-bg:#0a0a20; --game-text:#fff; --game-accent:#0f0; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:linear-gradient(180deg,#0a0a20,#1a0a30); min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; touch-action: none; }
    canvas { border-radius:10px; box-shadow:0 0 30px rgba(0,255,255,.25); }
    .hint { margin-top:14px; color:rgba(255,255,255,.5); font-size:14px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.86.0/dist/phaser.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- GAME_TITLE -->Space Shooter<!-- /GAME_TITLE -->
  <!-- PLAYER_CHARACTER -->spaceship<!-- /PLAYER_CHARACTER -->
  <!-- OBSTACLES -->aliens<!-- /OBSTACLES -->
  <div id="game"></div>
  <div class="hint">Arrow keys to move &bull; SPACE to shoot</div>
  <script>
  class ShooterScene extends Phaser.Scene {
    preload() {
      const g = this.make.graphics({ add: false });

      // --- Player ship: blue triangular with cockpit and engine glow ---
      g.fillStyle(0x003399);
      g.beginPath();
      g.moveTo(24, 2); g.lineTo(4, 42); g.lineTo(16, 34);
      g.lineTo(32, 34); g.lineTo(44, 42);
      g.closePath(); g.fillPath();
      g.fillStyle(0x0055cc);
      g.beginPath();
      g.moveTo(24, 2); g.lineTo(10, 38); g.lineTo(18, 32);
      g.lineTo(30, 32); g.lineTo(38, 38);
      g.closePath(); g.fillPath();
      g.fillStyle(0x00bbff);
      g.beginPath();
      g.moveTo(24, 10); g.lineTo(19, 24); g.lineTo(29, 24);
      g.closePath(); g.fillPath();
      g.fillStyle(0x4488ff, 0.7);
      g.fillCircle(18, 40, 4);
      g.fillCircle(30, 40, 4);
      g.fillStyle(0xaaddff, 0.9);
      g.fillCircle(18, 40, 2);
      g.fillCircle(30, 40, 2);
      g.generateTexture('ship', 48, 48); g.clear();

      // --- Enemy 1: red aggressive V-wing ---
      g.fillStyle(0x990000);
      g.beginPath();
      g.moveTo(24, 44); g.lineTo(2, 6); g.lineTo(18, 18);
      g.lineTo(30, 18); g.lineTo(46, 6);
      g.closePath(); g.fillPath();
      g.fillStyle(0xdd2222);
      g.beginPath();
      g.moveTo(24, 40); g.lineTo(14, 18); g.lineTo(34, 18);
      g.closePath(); g.fillPath();
      g.fillStyle(0xff6666);
      g.fillCircle(24, 26, 4);
      g.generateTexture('enemy', 48, 48); g.clear();

      // --- Enemy 2: orange diamond interceptor ---
      g.fillStyle(0xcc5500);
      g.beginPath();
      g.moveTo(24, 44); g.lineTo(4, 24); g.lineTo(24, 4); g.lineTo(44, 24);
      g.closePath(); g.fillPath();
      g.fillStyle(0xff8833);
      g.beginPath();
      g.moveTo(24, 36); g.lineTo(12, 24); g.lineTo(24, 12); g.lineTo(36, 24);
      g.closePath(); g.fillPath();
      g.fillStyle(0xffbb66);
      g.fillRect(20, 20, 8, 8);
      g.generateTexture('enemy2', 48, 48); g.clear();

      // --- Enemy 3: green angular dart ---
      g.fillStyle(0x007700);
      g.beginPath();
      g.moveTo(24, 44); g.lineTo(2, 14); g.lineTo(14, 4);
      g.lineTo(24, 16); g.lineTo(34, 4); g.lineTo(46, 14);
      g.closePath(); g.fillPath();
      g.fillStyle(0x22aa22);
      g.beginPath();
      g.moveTo(24, 38); g.lineTo(12, 16); g.lineTo(24, 20); g.lineTo(36, 16);
      g.closePath(); g.fillPath();
      g.fillStyle(0x66dd66);
      g.fillCircle(24, 28, 4);
      g.generateTexture('enemy3', 48, 48); g.clear();

      // --- Bullet: cyan laser bolt ---
      g.fillStyle(0x00cccc);
      g.fillRect(1, 0, 6, 16);
      g.fillStyle(0x00ffff);
      g.fillRect(2, 1, 4, 14);
      g.fillStyle(0xaaffff);
      g.fillRect(3, 2, 2, 12);
      g.generateTexture('bullet', 8, 16); g.clear();

      // --- Meteor: brown rocky asteroid with craters ---
      g.fillStyle(0x7B4A1B);
      g.beginPath();
      g.moveTo(24, 2); g.lineTo(36, 6); g.lineTo(44, 16);
      g.lineTo(42, 32); g.lineTo(34, 42); g.lineTo(20, 46);
      g.lineTo(8, 40); g.lineTo(2, 28); g.lineTo(4, 14); g.lineTo(14, 4);
      g.closePath(); g.fillPath();
      g.fillStyle(0x9B6A3B);
      g.beginPath();
      g.moveTo(24, 8); g.lineTo(34, 12); g.lineTo(38, 20);
      g.lineTo(34, 32); g.lineTo(24, 38); g.lineTo(14, 34);
      g.lineTo(10, 24); g.lineTo(14, 14);
      g.closePath(); g.fillPath();
      g.fillStyle(0x5B3A0B);
      g.fillCircle(20, 18, 5);
      g.fillCircle(32, 28, 4);
      g.fillCircle(15, 33, 3);
      g.fillCircle(30, 14, 3);
      g.generateTexture('meteor', 48, 48); g.clear();

      // --- Powerup: blue shield orb ---
      g.fillStyle(0x0066dd, 0.4);
      g.fillCircle(16, 16, 14);
      g.lineStyle(2, 0x00aaff, 1);
      g.strokeCircle(16, 16, 14);
      g.fillStyle(0x00bbff);
      g.beginPath();
      g.moveTo(16, 4); g.lineTo(7, 14); g.lineTo(7, 23);
      g.lineTo(16, 30); g.lineTo(25, 23); g.lineTo(25, 14);
      g.closePath(); g.fillPath();
      g.fillStyle(0x88ddff);
      g.beginPath();
      g.moveTo(16, 8); g.lineTo(11, 15); g.lineTo(11, 20);
      g.lineTo(16, 25); g.lineTo(21, 20); g.lineTo(21, 15);
      g.closePath(); g.fillPath();
      g.generateTexture('powerup', 32, 32); g.clear();

      // --- Star particle (white glow) ---
      g.fillStyle(0xffffff, 0.3);
      g.fillCircle(5, 5, 5);
      g.fillStyle(0xffffff, 0.7);
      g.fillCircle(5, 5, 3);
      g.fillStyle(0xffffff);
      g.fillCircle(5, 5, 1);
      g.generateTexture('star', 10, 10); g.clear();

      // --- Explosion / generic particle ---
      g.fillStyle(0xffffff, 0.6);
      g.fillCircle(4, 4, 4);
      g.fillStyle(0xffffff);
      g.fillCircle(4, 4, 2);
      g.generateTexture('particle', 8, 8); g.clear();

      g.destroy();
    }

    create() {
      this.score = 0; this.lives = 3; this.wave = 1;
      this.gameOver = false; this.lastFired = 0;
      this.waveKills = 0; this.enemiesPerWave = 8;
      this.enemySpeed = 90; this.spawnDelay = 1200;
      this.shielded = false;

      const g = this.make.graphics({ add: false });
      g.fillStyle(0x060618); g.fillRect(0, 0, 800, 500);
      for (let i = 0; i < 120; i++) {
        const b = Phaser.Math.Between(80, 255);
        g.fillStyle(Phaser.Display.Color.GetColor(b, b, b));
        g.fillRect(Phaser.Math.Between(0, 800), Phaser.Math.Between(0, 500), Math.random() < .15 ? 2 : 1, 1);
      }
      g.generateTexture('bg', 800, 500); g.clear();
      [0xffff44, 0xffaa00, 0xff4444, 0x884422].forEach((c, i) => {
        g.fillStyle(c); g.fillCircle(24, 24, 8 + i * 7);
        g.generateTexture('exp' + i, 48, 48); g.clear();
      });
      g.destroy();
      this._expFrames = ['exp0','exp1','exp2','exp3'];

      this.add.image(400, 250, 'bg');
      this.player = this.physics.add.sprite(400, 460, 'ship').setDisplaySize(48, 48).setCollideWorldBounds(true);
      this.bullets = this.physics.add.group({ maxSize: 30 });
      this.enemies = this.physics.add.group();
      this.meteors = this.physics.add.group();
      this.powerups = this.physics.add.group();

      this.exploder = this.add.particles(0, 0, 'particle', {
        speed: { min: 80, max: 200 }, lifespan: 350, scale: { start: 1.2, end: 0 },
        emitting: false, quantity: 12, tint: [0xff4444, 0xffaa00, 0xffff44]
      });

      this.physics.add.overlap(this.bullets, this.enemies, this.hitEnemy, null, this);
      this.physics.add.overlap(this.player, this.enemies, this.hitPlayer, null, this);
      this.physics.add.overlap(this.bullets, this.meteors, this.hitMeteor, null, this);
      this.physics.add.overlap(this.player, this.meteors, this.hitPlayer, null, this);
      this.physics.add.overlap(this.player, this.powerups, this.collectPowerup, null, this);

      const ts = { fontFamily:'Segoe UI', fontSize:'18px' };
      const sh = (c) => ({ offsetX:0, offsetY:0, color:c, blur:8, fill:true });
      this.scoreText = this.add.text(12,8,'Score: 0',{ ...ts, fill:'#0ff', shadow:sh('#0ff') });
      this.livesText = this.add.text(788,8,'Lives: 3',{ ...ts, fill:'#f46', shadow:sh('#f46') }).setOrigin(1,0);
      this.waveText = this.add.text(400,8,'Wave 1',{ ...ts, fontSize:'16px', fill:'#ff4', shadow:sh('#ff4') }).setOrigin(.5,0);

      this.cursors = this.input.keyboard.createCursorKeys();
      this.resetSpawnTimer();
    }

    resetSpawnTimer() {
      if (this.spawnTimer) this.spawnTimer.remove();
      this.spawnTimer = this.time.addEvent({
        delay: this.spawnDelay, callback: this.spawnEnemy, callbackScope: this, loop: true
      });
      if (this.meteorTimer) this.meteorTimer.remove();
      this.meteorTimer = this.time.addEvent({
        delay: 3200, callback: this.spawnMeteor, callbackScope: this, loop: true
      });
      if (this.powerupTimer) this.powerupTimer.remove();
      this.powerupTimer = this.time.addEvent({
        delay: 14000, callback: this.spawnPowerup, callbackScope: this, loop: true
      });
    }

    update(time) {
      if (this.gameOver) return;
      if (this.cursors.left.isDown) this.player.setVelocityX(-300);
      else if (this.cursors.right.isDown) this.player.setVelocityX(300);
      else this.player.setVelocityX(0);

      if (this.cursors.space.isDown && time > this.lastFired + 220) {
        const b = this.bullets.create(this.player.x, this.player.y - 18, 'bullet');
        if (b) { b.setVelocityY(-420); b.body.setSize(4,12); }
        this.lastFired = time;
      }

      this.bullets.children.each(b => { if (b.active && b.y < -10) b.destroy(); });
      this.enemies.children.each(e => {
        if (e.active && e.y > 530) { e.destroy(); this.loseLife(); }
      });
      this.meteors.children.each(m => {
        if (m.active && m.y > 530) m.destroy();
      });
      this.powerups.children.each(p => {
        if (p.active && p.y > 530) p.destroy();
      });
    }

    spawnEnemy() {
      if (this.gameOver) return;
      const tex = Phaser.Math.RND.pick(['enemy', 'enemy2', 'enemy3']);
      const e = this.enemies.create(Phaser.Math.Between(30,770), -20, tex);
      e.setDisplaySize(40, 40);
      e.setVelocityY(this.enemySpeed + Phaser.Math.Between(-15,15));
      e.setVelocityX(Phaser.Math.Between(-30,30));
    }

    spawnMeteor() {
      if (this.gameOver) return;
      const m = this.meteors.create(Phaser.Math.Between(30,770), -30, 'meteor');
      m.setDisplaySize(44, 44);
      m.setVelocityY(Phaser.Math.Between(60, 130));
      m.setVelocityX(Phaser.Math.Between(-40, 40));
      m.setAngularVelocity(Phaser.Math.Between(-60, 60));
      m.hp = 2;
    }

    spawnPowerup() {
      if (this.gameOver) return;
      const p = this.powerups.create(Phaser.Math.Between(40,760), -20, 'powerup');
      p.setDisplaySize(28, 28);
      p.setVelocityY(80);
    }

    hitEnemy(bullet, enemy) {
      try { this.sound.play('explosionSfx'); } catch {}
      this.exploder.emitParticleAt(enemy.x, enemy.y);
      this.playExplosion(enemy.x, enemy.y);
      bullet.destroy(); enemy.destroy();
      this.score += 10 * this.wave;
      this.scoreText.setText('Score: ' + this.score);
      if (++this.waveKills >= this.enemiesPerWave) this.nextWave();
    }

    hitMeteor(bullet, meteor) {
      bullet.destroy();
      meteor.hp--;
      if (meteor.hp <= 0) {
        this.exploder.emitParticleAt(meteor.x, meteor.y);
        this.playExplosion(meteor.x, meteor.y);
        meteor.destroy();
        this.score += 20 * this.wave;
        this.scoreText.setText('Score: ' + this.score);
      }
    }

    collectPowerup(_player, powerup) {
      powerup.destroy();
      this.shielded = true;
      this.player.setTint(0x00aaff);
      this.time.delayedCall(5000, () => {
        this.shielded = false;
        if (!this.gameOver) this.player.clearTint();
      });
    }

    hitPlayer(_player, enemy) {
      try { this.sound.play('hitSfx'); } catch {}
      this.exploder.emitParticleAt(enemy.x, enemy.y);
      this.playExplosion(enemy.x, enemy.y);
      enemy.destroy();
      if (this.shielded) {
        this.shielded = false;
        this.player.clearTint();
        return;
      }
      this.loseLife();
    }

    playExplosion(x, y) {
      const spr = this.add.image(x, y, 'exp0').setDepth(10);
      let i = 0;
      this.time.addEvent({ delay: 80, repeat: 3, callback: () => {
        i++; if (i < 4) spr.setTexture('exp' + i); else spr.destroy();
      }});
    }

    loseLife() {
      if (--this.lives <= 0) return this.showGameOver();
      this.livesText.setText('Lives: ' + this.lives);
      this.player.setAlpha(.4);
      this.time.delayedCall(600, () => { if (!this.gameOver) this.player.setAlpha(1); });
    }

    nextWave() {
      this.wave++; this.waveKills = 0;
      this.enemySpeed += 20; this.enemiesPerWave += 2;
      this.spawnDelay = Math.max(400, this.spawnDelay - 120);
      this.resetSpawnTimer();
      this.waveText.setText('Wave ' + this.wave);
    }

    showGameOver() {
      this.gameOver = true; this.lives = 0;
      this.livesText.setText('Lives: 0');
      this.physics.pause(); this.player.setTint(0xff0000);
      this.add.rectangle(400, 250, 800, 500, 0x000000, .7);
      this.add.text(400, 190, 'GAME OVER', { fontSize:'44px', fill:'#f46', fontFamily:'Segoe UI',
        fontStyle:'bold', shadow:{ offsetX:0,offsetY:0,color:'#f00',blur:16,fill:true } }).setOrigin(.5);
      this.add.text(400, 250, 'Score: ' + this.score, { fontSize:'26px', fill:'#fff', fontFamily:'Segoe UI' }).setOrigin(.5);
      this.add.text(400, 310, 'Press SPACE to restart', { fontSize:'18px', fill:'#0ff', fontFamily:'Segoe UI' }).setOrigin(.5);
      this.input.keyboard.once('keydown-SPACE', () => this.scene.restart());
    }
  }

  new Phaser.Game({
    type: Phaser.AUTO, width: 800, height: 500, parent: 'game',
    backgroundColor: '#060618',
    physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: ShooterScene
  });
  </script>
</body>
</html>
